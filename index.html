                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function TriangulationDashboard({ transcripts, tags, artifacts, analysisCanvases, sessions, assignmentMeta, onExportAssignment, onImportAssignment, onExportReturn, onImportReturn }) {
            const [coderId, setCoderId] = useState('');
            const [threshold, setThreshold] = useState(0.5);
            const [importing, setImporting] = useState(false);

            const primaryThemeSet = useMemo(() => {
                const out = new Set();
                (analysisCanvases || []).forEach(c => (c.themes || []).forEach(t => out.add((t.name || '').trim().toLowerCase())));
                return out;
            }, [analysisCanvases]);

            const primaryArtifactCodeSet = useMemo(() => {
                const out = new Set();
                (artifacts || []).forEach(a => (a.codes || []).forEach(code => out.add(`${a.id}::${code}`)));
                return out;
            }, [artifacts]);

            const overlapRatio = (a, b) => {
                const start = Math.max(a.start, b.start);
                const end = Math.min(a.end, b.end);
                const intersection = Math.max(0, end - start);
                const union = Math.max(a.end, b.end) - Math.min(a.start, b.start);
                return union > 0 ? (intersection / union) : 0;
            };

            const sessionStats = useMemo(() => {
                return (sessions || []).map(session => {
                    const coTags = session.tags || [];
                    const usedCo = new Set();
                    let matched = 0;

                    (tags || []).forEach((pTag) => {
                        let bestIdx = -1;
                        let bestOverlap = 0;
                        coTags.forEach((cTag, idx) => {
                            if (usedCo.has(idx)) return;
                            if (pTag.transcriptId !== cTag.transcriptId) return;
                            if ((pTag.tagName || '') !== (cTag.tagName || '')) return;
                            if (!Number.isFinite(pTag.start) || !Number.isFinite(pTag.end) || !Number.isFinite(cTag.start) || !Number.isFinite(cTag.end)) return;
                            const ov = overlapRatio(pTag, cTag);
                            if (ov >= threshold && ov > bestOverlap) {
                                bestOverlap = ov;
                                bestIdx = idx;
                            }
                        });
                        if (bestIdx >= 0) {
                            usedCo.add(bestIdx);
                            matched += 1;
                        }
                    });

                    const primaryOnly = (tags || []).length - matched;
                    const coOnly = coTags.length - usedCo.size;
                    const agreementBase = Math.max((tags || []).length, coTags.length, 1);
                    const agreementPct = Math.round((matched / agreementBase) * 1000) / 10;

                    const coThemeSet = new Set();
                    (session.analysisCanvases || []).forEach(c => (c.themes || []).forEach(t => coThemeSet.add((t.name || '').trim().toLowerCase())));
                    let sharedThemes = 0;
                    primaryThemeSet.forEach(name => { if (coThemeSet.has(name)) sharedThemes += 1; });

                    const coArtifactSet = new Set();
                    (session.artifactCodes || []).forEach(a => (a.codes || []).forEach(code => coArtifactSet.add(`${a.artifactId}::${code}`)));
                    let sharedArtifactCodes = 0;
                    primaryArtifactCodeSet.forEach(key => { if (coArtifactSet.has(key)) sharedArtifactCodes += 1; });

                    return {
                        id: session.id,
                        coderId: session.coderId,
                        importedAt: session.importedAt,
                        matched,
                        primaryOnly,
                        coOnly,
                        agreementPct,
                        sharedThemes,
                        primaryThemes: primaryThemeSet.size,
                        coThemes: coThemeSet.size,
                        sharedArtifactCodes,
                        primaryArtifactCodes: primaryArtifactCodeSet.size,
                        coArtifactCodes: coArtifactSet.size,
                        coTagCount: coTags.length
                    };
                });
            }, [sessions, tags, threshold, primaryThemeSet, primaryArtifactCodeSet]);

            const importAssignmentFile = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                setImporting(true);
                try {
                    await onImportAssignment(file);
                    alert('Triangulation assignment imported. You can now code independently.');
                } catch (err) {
                    alert('Failed to import assignment package.');
                } finally {
                    setImporting(false);
                    e.target.value = '';
                }
            };

            const importReturnFile = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                setImporting(true);
                try {
                    await onImportReturn(file);
                    alert('Co-rater return imported.');
                } catch (err) {
                    alert('Failed to import co-rater return package.');
                } finally {
                    setImporting(false);
                    e.target.value = '';
                }
            };

            const exportReturn = () => {
                if (!coderId.trim()) {
                    alert('Enter a coder ID first.');
                    return;
                }
                onExportReturn(coderId.trim());
            };

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-7xl mx-auto space-y-6">
                        <div className="bg-white border rounded-2xl p-6 shadow-soft">
                            <h2 className="text-3xl font-display">Triangulation</h2>
                            <p className="text-slate-500 mt-2">Export a blind co-rater package, import co-rater returns, and review overlap-based agreement and theme convergence.</p>
                        </div>

                        <div className="grid lg:grid-cols-2 gap-6">
                            <section className="bg-white border rounded-2xl p-5 shadow-soft space-y-4">
                                <h3 className="text-lg font-bold">Main Researcher</h3>
                                <button onClick={onExportAssignment} className="w-full bg-tide hover:bg-teal-600 text-white px-4 py-3 rounded-lg font-semibold">Export Co-rater Assignment (No Codes)</button>
                                <label className="block w-full text-center bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-3 rounded-lg font-semibold cursor-pointer">
                                    Import Co-rater Return
                                    <input type="file" accept=".qtrr,.json" className="hidden" onChange={importReturnFile} disabled={importing} />
                                </label>
                                <p className="text-xs text-slate-500">Supports multiple co-raters. Duplicate submissions are blocked per coder + package id.</p>
                            </section>

                            <section className="bg-white border rounded-2xl p-5 shadow-soft space-y-4">
                                <h3 className="text-lg font-bold">Co-rater Workflow</h3>
                                <label className="block w-full text-center bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-4 py-3 rounded-lg font-semibold cursor-pointer">
                                    Import Assignment Package
                                    <input type="file" accept=".qtri,.json" className="hidden" onChange={importAssignmentFile} disabled={importing} />
                                </label>
                                <input value={coderId} onChange={(e) => setCoderId(e.target.value)} placeholder="Your coder ID (e.g., Coder_B)" className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink" />
                                <button onClick={exportReturn} className="w-full bg-ink hover:bg-slate-800 text-white px-4 py-3 rounded-lg font-semibold">Export My Return Package</button>
                                <p className="text-xs text-slate-500">Current assignment: {assignmentMeta?.packageId || 'None imported in this workspace'}</p>
                            </section>
                        </div>

                        <section className="bg-white border rounded-2xl p-5 shadow-soft space-y-4">
                            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                                <h3 className="text-lg font-bold">Agreement Analysis</h3>
                                <label className="text-sm text-slate-600 flex items-center gap-2">
                                    Overlap threshold
                                    <input type="number" min="0.1" max="1" step="0.05" value={threshold} onChange={(e) => setThreshold(Math.min(1, Math.max(0.1, Number(e.target.value) || 0.5)))} className="w-20 border rounded p-1.5" />
                                </label>
                            </div>

                            {sessionStats.length === 0 ? (
                                <p className="text-slate-500 text-sm">No co-rater returns imported yet.</p>
                            ) : (
                                <div className="grid md:grid-cols-2 gap-4">
                                    {sessionStats.map(s => (
                                        <article key={s.id} className="border rounded-xl p-4 bg-slate-50">
                                            <div className="flex items-center justify-between mb-2">
                                                <h4 className="font-bold text-ink">{s.coderId}</h4>
                                                <span className="text-xs text-slate-500">{new Date(s.importedAt).toLocaleString()}</span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 text-sm">
                                                <p><span className="font-semibold">Agreement:</span> {s.agreementPct}%</p>
                                                <p><span className="font-semibold">Co-rater tags:</span> {s.coTagCount}</p>
                                                <p><span className="font-semibold">Matched tags:</span> {s.matched}</p>
                                                <p><span className="font-semibold">Primary only:</span> {s.primaryOnly}</p>
                                                <p><span className="font-semibold">Co-rater only:</span> {s.coOnly}</p>
                                                <p><span className="font-semibold">Shared themes:</span> {s.sharedThemes}</p>
                                                <p><span className="font-semibold">Theme sets:</span> {s.primaryThemes} / {s.coThemes}</p>
                                                <p><span className="font-semibold">Shared artifact codes:</span> {s.sharedArtifactCodes}</p>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            )}
                        </section>
                    </div>
                </div>
            );
        }

        function Codebook({ tags, transcripts, participants, artifacts }) {
            const [searchTerm, setSearchTerm] = useState('');
            const tableData = useMemo(() => {
                const participantCodeById = {};
                (participants || []).forEach(p => { participantCodeById[p.id] = p.pseudonym || p.id; });
                const transcriptRows = tags.map(tag => {
                    const parent = transcripts.find(t => t.id === tag.transcriptId);
                    return {
                        ...tag,
                        sourceType: 'Transcript',
                        transcriptLabel: parent?.participantId ? (participantCodeById[parent.participantId] || parent.participantId) : `Transcript ${String(tag.transcriptId).slice(-4)}`,
                        folder: parent?.folder || 'Uncategorized',
                        subfolder: parent?.subfolder || 'General',
                        category: tag.category || 'Uncategorized'
                    };
                });

                const artifactRows = (artifacts || []).flatMap(art => (art.codes || []).map(codeName => ({
                    id: `${art.id}_${codeName}`,
                    sourceType: 'Artifact',
                    tagName: codeName,
                    category: art.folder || 'Artifact',
                    transcriptLabel: art.name,
                    folder: art.folder || 'Uncategorized',
                    subfolder: 'Project Artifact',
                    textSnippet: art.notes || 'No artifact note provided.',
                    memo: ''
                })));

                return [...transcriptRows, ...artifactRows].filter(item =>
                    item.tagName.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.category.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.textSnippet.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (item.memo && item.memo.toLowerCase().includes(searchTerm.toLowerCase()))
                ).sort((a, b) => a.category.localeCompare(b.category) || a.tagName.localeCompare(b.tagName));
            }, [tags, transcripts, participants, artifacts, searchTerm]);

            const uniqueCodeCount = useMemo(() => new Set(tableData.map(t => t.tagName)).size, [tableData]);

            return (
                <div className="p-8 h-full overflow-y-auto flex flex-col">
                    <div className="max-w-[1400px] mx-auto w-full flex-1 flex flex-col pt-2">
                        <div className="flex justify-between items-end mb-8 bg-white p-6 rounded-2xl shadow-soft border">
                            <div>
                                <h2 className="text-3xl font-display">Codebook Manager</h2>
                                <p className="text-slate-500 mt-2">{tableData.length} code entries across {uniqueCodeCount} unique codes (transcripts + artifacts).</p>
                            </div>
                        </div>
                        <input type="text" placeholder="Search categories, codes, memos, or quotes..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full max-w-lg p-3 mb-6 border rounded-xl shadow-sm outline-none focus:ring-2 focus:ring-tide" />

                        <div className="bg-white border rounded-2xl shadow-sm overflow-hidden flex-1 flex flex-col">
                            <div className="overflow-x-auto flex-1">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 border-b text-slate-600 uppercase text-xs tracking-wider">
                                            <th className="p-4 font-bold w-32">Category</th>
                                            <th className="p-4 font-bold w-40">Code</th>
                                            <th className="p-4 font-bold w-48">Source</th>
                                            <th className="p-4 font-bold">Quote & Memo</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y text-sm">
                                        {tableData.length === 0 ? <tr><td colSpan="4" className="p-12 text-center text-slate-400 italic">No codes match your search.</td></tr> : tableData.map((row, idx) => (
                                            <tr key={idx} className="hover:bg-slate-50 align-top">
                                                <td className="p-4 text-slate-500 font-bold uppercase text-[10px]">{row.category}</td>
                                                <td className="p-4"><span className="bg-teal-100 border border-teal-200 text-teal-800 px-3 py-1 rounded-full text-xs font-bold">{row.tagName}</span></td>
                                                <td className="p-4 text-slate-700">
                                                    <span className="font-bold block">{row.transcriptLabel}</span>
                                                    <span className={`text-[10px] mt-1 inline-block px-2 py-0.5 rounded-full ${row.sourceType === 'Artifact' ? 'bg-amber-100 text-amber-800' : 'bg-slate-100 text-slate-700'}`}>{row.sourceType}</span>
                                                    <span className="text-xs text-slate-400 mt-1 block">{row.folder} / {row.subfolder}</span>
                                                </td>
                                                <td className="p-4">
                                                    <p className="italic text-slate-700 mb-2 leading-relaxed">"{row.textSnippet}"</p>
                                                    {row.memo && <p className="text-sm text-slate-600">{row.memo}</p>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
