<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualiApp - Offline Qualitative Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: '#102a43',
                        tide: '#0f766e',
                        ember: '#c2410c',
                        mist: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        display: ['Fraunces', 'serif']
                    },
                    boxShadow: {
                        soft: '0 10px 35px rgba(16, 42, 67, 0.12)'
                    },
                    backgroundImage: {
                        hero: 'radial-gradient(circle at 20% 20%, rgba(15,118,110,0.15), transparent 45%), radial-gradient(circle at 80% 10%, rgba(194,65,12,0.15), transparent 40%), linear-gradient(180deg, #f8fafc 0%, #eef6f6 100%)'
                    }
                }
            }
        };
    </script>
    <style>
        .qa-interviewer {
            background: transparent;
            color: #9ca3af;
            font-weight: 500;
        }

        .code-surface .qa-interviewer {
            background: transparent;
            color: #9ca3af;
            opacity: 0.85;
        }

        .qa-timecode-bookmark {
            display: inline-block;
            padding: 0 0.4rem;
            margin: 0 0.15rem;
            border-radius: 0.45rem;
            border: 1px solid #cbd5e1;
            background: #eff6ff;
            color: #1e3a8a;
            font-size: 0.82em;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .qa-timecode-bookmark:hover {
            background: #dbeafe;
            border-color: #93c5fd;
        }
    </style>
</head>
<body class="bg-mist text-ink font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const dbName = 'QualiMacDB_v7';
        const participantPinKey = 'quali_participant_pin_hash';
        const recoveryQuestionKey = 'quali_recovery_question';
        const recoveryAnswerHashKey = 'quali_recovery_answer_hash';

        const normalizeRecoveryAnswer = (value) => String(value || '').trim().toLowerCase();

        const openDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('data')) db.createObjectStore('data');
                if (!db.objectStoreNames.contains('files')) db.createObjectStore('files');
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });

        const dbGet = async (store, key) => {
            const db = await openDB();
            return new Promise((res) => {
                const req = db.transaction(store).objectStore(store).get(key);
                req.onsuccess = () => res(req.result);
            });
        };

        const dbSet = async (store, key, val) => {
            const db = await openDB();
            return new Promise((res, rej) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).put(val, key);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
            });
        };

        const dbDelete = async (store, key) => {
            const db = await openDB();
            return new Promise((res) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).delete(key);
                req.onsuccess = () => res();
            });
        };

        const dbClear = async (store) => {
            const db = await openDB();
            return new Promise((res, rej) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).clear();
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
            });
        };

        const dbGetAllEntries = async (store) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const os = tx.objectStore(store);
                const out = [];
                const req = os.openCursor();
                req.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (!cursor) return resolve(out);
                    out.push({ key: cursor.key, value: cursor.value });
                    cursor.continue();
                };
                req.onerror = () => reject(req.error);
            });
        };

        const toBase64 = (buffer) => {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        };

        const fromBase64 = (b64) => {
            const binary = atob(b64);
            const out = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
            return out.buffer;
        };

        const blobToBase64 = (blob) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => {
                const dataUrl = reader.result;
                resolve(dataUrl.split(',')[1]);
            };
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(blob);
        });

        const deriveKey = async (password, salt, usages) => {
            const enc = new TextEncoder();
            const material = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' },
                material,
                { name: 'AES-GCM', length: 256 },
                false,
                usages
            );
        };

        const encryptPayload = async (payload, password) => {
            const enc = new TextEncoder();
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt, ['encrypt']);
            const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(payload)));
            return {
                version: 1,
                algorithm: 'AES-GCM-256',
                kdf: 'PBKDF2-SHA256-150000',
                salt: toBase64(salt),
                iv: toBase64(iv),
                data: toBase64(ciphertext)
            };
        };

        const decryptPayload = async (encryptedBlob, password) => {
            const dec = new TextDecoder();
            const salt = new Uint8Array(fromBase64(encryptedBlob.salt));
            const iv = new Uint8Array(fromBase64(encryptedBlob.iv));
            const data = fromBase64(encryptedBlob.data);
            const key = await deriveKey(password, salt, ['decrypt']);
            const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
            return JSON.parse(dec.decode(plaintext));
        };

        const stringHash = async (value) => {
            const enc = new TextEncoder();
            const digest = await crypto.subtle.digest('SHA-256', enc.encode(value));
            return toBase64(digest);
        };

        const offlineDataNotice = 'Offline app: QualiApp runs fully in your browser. All project data is stored only on this device in your browser storage unless you explicitly export a backup file.';
        const appVersionLabel = 'v7.7.0';
        const appVersionUpdatedAt = '2026-04-13 00:00 UTC';
        const appLicenseNote = 'Licensed under Creative Commons Attribution-NonCommercial-ShareAlike (CC BY-NC-SA).';
        const sourceFilterTypeLabels = {
            transcript: 'Transcripts',
            artifact: 'Artifacts',
            observation: 'Onsite Observations'
        };
        const sourceFilterTypeBadgeClassNames = {
            transcript: 'bg-slate-100 text-slate-700 border-slate-200',
            artifact: 'bg-amber-100 text-amber-800 border-amber-200',
            observation: 'bg-violet-100 text-violet-800 border-violet-200'
        };

        const buildSourceFilterId = (type, id) => `${type}:${id}`;
        const normalizeSourceFilterIdList = (ids) => Array.from(new Set((ids || []).map((id) => String(id || '')).filter(Boolean)));

        const resolveSourceFilterPresetSelection = (preset, availableIds) => {
            const currentIds = normalizeSourceFilterIdList(availableIds);
            const selectedSet = new Set(normalizeSourceFilterIdList(preset?.selectedIds));
            const availableSetAtSave = new Set(normalizeSourceFilterIdList(preset?.availableIds || preset?.selectedIds));
            return currentIds.filter((id) => selectedSet.has(id) || !availableSetAtSave.has(id));
        };

        function SourceItemFilterPanel({ title = 'Source Filter', description, groups, selectedIds, onToggleItem, onSelectAll, onClearAll, onToggleGroup, presets = [], onApplyPreset, onSavePreset, onDeletePreset }) {
            const selectedSet = new Set(selectedIds);
            const totalItemCount = groups.reduce((sum, group) => sum + group.items.length, 0);
            const selectedCount = groups.reduce((sum, group) => sum + group.items.filter((item) => selectedSet.has(item.filterId)).length, 0);
            const allItemIds = useMemo(() => groups.flatMap((group) => group.items.map((item) => item.filterId)), [groups]);
            const [presetName, setPresetName] = useState('');
            const [selectedPresetId, setSelectedPresetId] = useState('');
            const [isExpanded, setIsExpanded] = useState(true);

            useEffect(() => {
                if (selectedPresetId && !presets.some((preset) => preset.id === selectedPresetId)) {
                    setSelectedPresetId('');
                }
            }, [presets, selectedPresetId]);

            const handleManualToggleItem = (filterId) => {
                setSelectedPresetId('');
                onToggleItem(filterId);
            };

            const handleManualSelectAll = () => {
                setSelectedPresetId('');
                onSelectAll();
            };

            const handleManualClearAll = () => {
                setSelectedPresetId('');
                onClearAll();
            };

            const handleManualToggleGroup = (type) => {
                setSelectedPresetId('');
                onToggleGroup(type);
            };

            const handlePresetChange = (presetId) => {
                setSelectedPresetId(presetId);
                if (!presetId) return;
                const preset = presets.find((entry) => entry.id === presetId);
                if (!preset) return;
                onApplyPreset(resolveSourceFilterPresetSelection(preset, allItemIds));
            };

            const handleSavePreset = () => {
                const cleaned = String(presetName || '').trim();
                if (!cleaned) return;
                const existing = presets.find((preset) => preset.name.toLowerCase() === cleaned.toLowerCase());
                if (existing && !confirm(`Overwrite filter group "${existing.name}"?`)) return;

                const presetId = existing?.id || `source_filter_preset_${Date.now()}`;
                onSavePreset({
                    id: presetId,
                    name: cleaned,
                    selectedIds: allItemIds.filter((id) => selectedSet.has(id)),
                    availableIds: allItemIds,
                    updatedAt: new Date().toISOString()
                });
                setSelectedPresetId(presetId);
                setPresetName('');
            };

            const handleDeletePreset = () => {
                if (!selectedPresetId) return;
                const preset = presets.find((entry) => entry.id === selectedPresetId);
                if (!preset) return;
                if (!confirm(`Delete filter group "${preset.name}"?`)) return;
                onDeletePreset(selectedPresetId);
                setSelectedPresetId('');
            };

            return (
                <div className="bg-white border rounded-2xl p-5 shadow-soft mb-6">
                    <div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between mb-4">
                        <div className="flex-1">
                            <div className="flex items-start gap-3">
                                <button
                                    type="button"
                                    onClick={() => setIsExpanded(!isExpanded)}
                                    className="mt-0.5 p-1 text-slate-400 hover:text-slate-600 transition"
                                    title={isExpanded ? 'Collapse' : 'Expand'}
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className={`w-5 h-5 transition-transform ${isExpanded ? '' : '-rotate-90'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
                                </button>
                                <div>
                                    <h3 className="font-bold text-ink">{title}</h3>
                                    {description && <p className="text-sm text-slate-500 mt-1">{description}</p>}
                                    <p className="text-xs text-slate-400 mt-1">{selectedCount} of {totalItemCount} items included.</p>
                                </div>
                            </div>
                        </div>
                        {isExpanded && (
                            <div className="flex flex-wrap gap-2">
                                <button type="button" onClick={handleManualSelectAll} className="text-xs font-semibold text-tide hover:text-teal-700">Select All</button>
                                <button type="button" onClick={handleManualClearAll} className="text-xs font-semibold text-slate-500 hover:text-slate-700">Clear All</button>
                            </div>
                        )}
                    </div>

                    {isExpanded && (
                        <>
                            <div className="mb-4 grid gap-3 xl:grid-cols-[minmax(0,1.2fr)_minmax(0,1fr)]">
                                <div className="rounded-2xl border border-slate-200 bg-slate-50/70 p-3">
                                    <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1.5">Saved Filter Group</label>
                                    <div className="flex flex-col gap-2 md:flex-row">
                                        <select value={selectedPresetId} onChange={(e) => handlePresetChange(e.target.value)} className="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-tide">
                                            <option value="">Custom selection</option>
                                            {presets.map((preset) => <option key={preset.id} value={preset.id}>{preset.name}</option>)}
                                        </select>
                                        <button type="button" onClick={handleDeletePreset} disabled={!selectedPresetId} className="rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50">Delete</button>
                                    </div>
                                </div>
                                <div className="rounded-2xl border border-slate-200 bg-slate-50/70 p-3">
                                    <label className="block text-xs font-bold uppercase tracking-wide text-slate-500 mb-1.5">Save Current Checks As</label>
                                    <div className="flex flex-col gap-2 md:flex-row">
                                        <input value={presetName} onChange={(e) => setPresetName(e.target.value)} placeholder="e.g. Interviews only" className="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-tide" />
                                        <button type="button" onClick={handleSavePreset} className="rounded-xl bg-ink px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-800">Save Group</button>
                                    </div>
                                </div>
                            </div>

                            <div className="grid gap-4 lg:grid-cols-3">
                                {groups.map((group) => {
                                    const groupSelectedCount = group.items.filter((item) => selectedSet.has(item.filterId)).length;
                                    return (
                                        <div key={group.type} className="rounded-2xl border border-slate-200 bg-slate-50/70 p-3">
                                            <div className="flex items-center justify-between gap-3 mb-3">
                                                <div>
                                                    <span className={`inline-flex items-center rounded-full border px-2.5 py-1 text-[11px] font-semibold ${sourceFilterTypeBadgeClassNames[group.type] || 'bg-slate-100 text-slate-700 border-slate-200'}`}>
                                                        {group.label}
                                                    </span>
                                                    <p className="text-xs text-slate-500 mt-1">{groupSelectedCount} of {group.items.length} included</p>
                                                </div>
                                                <button type="button" onClick={() => handleManualToggleGroup(group.type)} className="text-[11px] font-semibold text-tide hover:text-teal-700">
                                                    {groupSelectedCount === group.items.length ? 'Clear Group' : 'Select Group'}
                                                </button>
                                            </div>
                                            <div className="space-y-2 max-h-64 overflow-y-auto pr-1">
                                                {group.items.map((item) => (
                                                    <label key={item.filterId} className="flex items-start gap-3 rounded-xl border border-slate-200 bg-white px-3 py-2 cursor-pointer hover:border-slate-300">
                                                        <input
                                                            type="checkbox"
                                                            checked={selectedSet.has(item.filterId)}
                                                            onChange={() => handleManualToggleItem(item.filterId)}
                                                            className="mt-0.5 h-4 w-4 rounded border-slate-300 text-tide focus:ring-tide"
                                                        />
                                                        <span className="min-w-0">
                                                            <span className="block text-sm font-medium text-slate-800 break-words">{item.label}</span>
                                                            {item.meta && <span className="block text-xs text-slate-500 mt-0.5 break-words">{item.meta}</span>}
                                                        </span>
                                                    </label>
                                                ))}
                                                {group.items.length === 0 && <p className="text-xs text-slate-400 italic">No items available.</p>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function AppFooter({ dark = false }) {
            return (
                <footer className={`w-full px-4 py-3 text-center text-xs border-t ${dark ? 'bg-slate-950 text-slate-300 border-slate-800' : 'bg-white/80 text-slate-600 border-slate-200'}`}>
                    <p>{offlineDataNotice}</p>
                    <p className="mt-1">Version {appVersionLabel} • Updated {appVersionUpdatedAt}</p>
                    <p className="mt-1">{appLicenseNote}</p>
                </footer>
            );
        }

        function LockScreen({ onUnlock }) {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [showRecovery, setShowRecovery] = useState(false);
            const [recoveryQuestion, setRecoveryQuestion] = useState('');
            const [recoveryAnswer, setRecoveryAnswer] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [confirmNewPassword, setConfirmNewPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const saved = localStorage.getItem('quali_pin');
                if (saved && btoa(password) === saved) onUnlock();
                else setError('Incorrect password.');
            };

            useEffect(() => {
                setRecoveryQuestion(localStorage.getItem(recoveryQuestionKey) || '');
            }, []);

            const handleResetFromRecovery = async () => {
                const savedHash = localStorage.getItem(recoveryAnswerHashKey);
                if (!savedHash || !recoveryQuestion) {
                    setError('Recovery is not configured on this device.');
                    return;
                }
                if (newPassword.length < 4) {
                    setError('New password must be at least 4 characters.');
                    return;
                }
                if (newPassword !== confirmNewPassword) {
                    setError('New password and confirmation do not match.');
                    return;
                }
                const answerHash = await stringHash(normalizeRecoveryAnswer(recoveryAnswer));
                if (answerHash !== savedHash) {
                    setError('Recovery answer is incorrect.');
                    return;
                }

                localStorage.setItem('quali_pin', btoa(newPassword));
                setError('Password reset successful. You can now unlock.');
                setShowRecovery(false);
                setRecoveryAnswer('');
                setNewPassword('');
                setConfirmNewPassword('');
            };

            return (
                <div className="h-screen w-screen bg-ink text-white flex flex-col">
                    <div className="flex-1 flex items-center justify-center p-4">
                        <form onSubmit={handleSubmit} className="bg-slate-900/90 p-8 rounded-2xl shadow-soft max-w-sm w-full text-center border border-slate-700">
                            <h2 className="text-3xl font-display mb-2">QualiApp Locked</h2>
                            <p className="text-slate-400 mb-6 text-sm">Local-only workspace protection.</p>
                            <input
                                type="password"
                                autoFocus
                                value={password}
                                onChange={e => setPassword(e.target.value)}
                                className="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-center text-xl mb-4 focus:outline-none focus:ring-2 focus:ring-tide"
                                placeholder="Enter password"
                            />
                            {error && <p className="text-red-300 text-sm mb-4">{error}</p>}
                            <button type="submit" className="w-full bg-tide hover:bg-teal-600 text-white font-bold py-3 rounded-lg transition">
                                Unlock
                            </button>
                            <button
                                type="button"
                                onClick={() => setShowRecovery(prev => !prev)}
                                className="w-full mt-3 text-sm text-slate-300 hover:text-white underline"
                            >
                                Forgot password?
                            </button>

                            {showRecovery && (
                                <div className="mt-4 p-4 rounded-lg bg-slate-800 border border-slate-700 space-y-3 text-left">
                                    <p className="text-xs text-slate-300 font-semibold">Recovery question</p>
                                    <p className="text-sm text-white">{recoveryQuestion || 'No recovery question saved.'}</p>
                                    <input
                                        type="text"
                                        value={recoveryAnswer}
                                        onChange={(e) => setRecoveryAnswer(e.target.value)}
                                        placeholder="Recovery answer"
                                        className="w-full p-2 rounded bg-slate-900 border border-slate-600 text-sm"
                                    />
                                    <input
                                        type="password"
                                        value={newPassword}
                                        onChange={(e) => setNewPassword(e.target.value)}
                                        placeholder="New password"
                                        className="w-full p-2 rounded bg-slate-900 border border-slate-600 text-sm"
                                    />
                                    <input
                                        type="password"
                                        value={confirmNewPassword}
                                        onChange={(e) => setConfirmNewPassword(e.target.value)}
                                        placeholder="Confirm new password"
                                        className="w-full p-2 rounded bg-slate-900 border border-slate-600 text-sm"
                                    />
                                    <button type="button" onClick={handleResetFromRecovery} className="w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2 rounded">
                                        Reset Password
                                    </button>
                                </div>
                            )}
                        </form>
                    </div>
                    <AppFooter dark={true} />
                </div>
            );
        }

        function WelcomeScreen({ hasPassword, hasRecovery, onStartNew, onRestoreExisting, onConfigureNewProjectSecurity }) {
            const [showHelp, setShowHelp] = useState(false);
            const [showSetupSecurity, setShowSetupSecurity] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [confirmPasswordInput, setConfirmPasswordInput] = useState('');
            const [recoveryQuestion, setRecoveryQuestion] = useState('');
            const [recoveryAnswer, setRecoveryAnswer] = useState('');
            const [setupError, setSetupError] = useState('');

            const beginNewProjectSetup = async () => {
                setSetupError('');
                if (passwordInput.length < 4) {
                    setSetupError('Password must be at least 4 characters.');
                    return;
                }
                if (passwordInput !== confirmPasswordInput) {
                    setSetupError('Password confirmation does not match.');
                    return;
                }
                if (!recoveryQuestion.trim() || !recoveryAnswer.trim()) {
                    setSetupError('Recovery question and answer are required.');
                    return;
                }

                await onConfigureNewProjectSecurity({
                    password: passwordInput,
                    recoveryQuestion: recoveryQuestion.trim(),
                    recoveryAnswer: recoveryAnswer.trim()
                });

                setPasswordInput('');
                setConfirmPasswordInput('');
                setRecoveryQuestion('');
                setRecoveryAnswer('');
                setShowSetupSecurity(false);
                onStartNew();
            };

            return (
                <div className="h-screen w-screen bg-hero text-ink flex flex-col">
                    <div className="flex-1 p-6 md:p-10 overflow-y-auto">
                        <div className="max-w-5xl mx-auto flex justify-end mb-3">
                            <button
                                type="button"
                                onClick={() => setShowHelp(true)}
                                className="w-10 h-10 rounded-full border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 text-lg font-bold"
                                title="How to use QualiApp"
                            >
                                ?
                            </button>
                        </div>
                        <div className="max-w-5xl mx-auto grid lg:grid-cols-[1.2fr,1fr] gap-6 pt-8">
                            <section className="bg-white border rounded-2xl p-8 shadow-soft">
                                <h1 className="text-4xl font-display">Welcome to QualiApp</h1>
                                <p className="text-slate-500 mt-3">Start a new project or restore an existing backup. New projects now begin with quick password and recovery setup.</p>

                                <div className="mt-6 p-4 rounded-xl bg-teal-50 border-2 border-teal-200 text-teal-900">
                                    <p className="text-sm font-semibold">Your data stays on your device.</p>
                                    <p className="text-sm mt-1">QualiApp works entirely offline in your browser. Transcript and coding data are saved locally in this browser on this device unless you choose to export a backup file.</p>
                                </div>

                                <div className="mt-8 flex flex-col sm:flex-row gap-3">
                                    <button onClick={() => setShowSetupSecurity(true)} className="bg-tide hover:bg-teal-600 text-white px-5 py-3 rounded-xl font-semibold">Start New Project</button>
                                    <button onClick={onRestoreExisting} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-5 py-3 rounded-xl font-semibold">Open Existing Project</button>
                                </div>

                                <div className="mt-8 p-4 rounded-xl bg-amber-50 border border-amber-200 text-amber-900 text-sm">
                                    Private/incognito sessions may clear data when the browser closes. Use Backup regularly.
                                </div>
                            </section>

                            <section className="bg-white border rounded-2xl p-6 shadow-soft space-y-4">
                                <h2 className="text-2xl font-display">Simple Onboarding</h2>
                                <p className="text-sm text-slate-500">1) Start New Project 2) Set password 3) Add recovery question 4) Begin coding.</p>
                                <div className="rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-600">
                                    <p>Password set: {hasPassword ? 'Yes' : 'No'}</p>
                                    <p>Recovery set: {hasRecovery ? 'Yes' : 'No'}</p>
                                </div>
                                <button onClick={() => setShowHelp(true)} className="w-full bg-ink hover:bg-slate-800 text-white py-3 rounded-lg font-semibold">Open Quick Help</button>
                            </section>
                        </div>

                        {showHelp && (
                            <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl shadow-soft border w-full max-w-xl p-6 space-y-3">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-2xl font-display">How to use QualiApp</h3>
                                        <button onClick={() => setShowHelp(false)} className="text-slate-400 hover:text-slate-700 text-xl">×</button>
                                    </div>
                                    <ol className="list-decimal list-inside text-sm text-slate-700 space-y-2">
                                        <li>Click Start New Project.</li>
                                        <li>Create your app password and recovery question.</li>
                                        <li>Add transcripts in Transcripts workspace.</li>
                                        <li>Code transcript text in the editor.</li>
                                        <li>Review outputs in Analysis Canvas and Codebook.</li>
                                        <li>Use Backup and Restore regularly.</li>
                                    </ol>
                                    <div className="pt-2 flex justify-end">
                                        <button onClick={() => setShowHelp(false)} className="px-4 py-2 rounded-lg bg-ink text-white font-semibold">Close</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showSetupSecurity && (
                            <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50">
                                <div className="bg-white rounded-2xl shadow-soft border w-full max-w-lg p-6 space-y-4">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-2xl font-display">Secure New Project</h3>
                                        <button onClick={() => setShowSetupSecurity(false)} className="text-slate-400 hover:text-slate-700 text-xl">×</button>
                                    </div>
                                    <p className="text-sm text-slate-500">Set a password now, then add a recovery question in case you forget it.</p>
                                    <input
                                        type="password"
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        placeholder="Password (min 4 chars)"
                                        className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink"
                                    />
                                    <input
                                        type="password"
                                        value={confirmPasswordInput}
                                        onChange={(e) => setConfirmPasswordInput(e.target.value)}
                                        placeholder="Confirm password"
                                        className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink"
                                    />
                                    <input
                                        type="text"
                                        value={recoveryQuestion}
                                        onChange={(e) => setRecoveryQuestion(e.target.value)}
                                        placeholder="Recovery question (e.g., First school?)"
                                        className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink"
                                    />
                                    <input
                                        type="text"
                                        value={recoveryAnswer}
                                        onChange={(e) => setRecoveryAnswer(e.target.value)}
                                        placeholder="Recovery answer"
                                        className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink"
                                    />
                                    {setupError && <p className="text-sm text-red-600">{setupError}</p>}
                                    <div className="flex justify-end gap-2">
                                        <button onClick={() => setShowSetupSecurity(false)} className="px-4 py-2 rounded-lg bg-slate-100 text-slate-700 font-semibold">Cancel</button>
                                        <button onClick={beginNewProjectSetup} className="px-4 py-2 rounded-lg bg-tide text-white font-semibold hover:bg-teal-600">Save and Start</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <AppFooter />
                </div>
            );
        }

        function App() {
            const [startupState, setStartupState] = useState('checking');
            const [hasAppPassword, setHasAppPassword] = useState(false);
            const [hasRecoverySetup, setHasRecoverySetup] = useState(false);
            const [showRecoveryPrompt, setShowRecoveryPrompt] = useState(false);
            const [recoveryQuestionInput, setRecoveryQuestionInput] = useState('');
            const [recoveryAnswerInput, setRecoveryAnswerInput] = useState('');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [view, setView] = useState('dashboard');
            const [transcripts, setTranscripts] = useState([]);
            const [transcriptFolders, setTranscriptFolders] = useState([]);
            const [tags, setTags] = useState([]);
            const [globalArtifacts, setGlobalArtifacts] = useState([]);
            const [activityTypes, setActivityTypes] = useState(['Edited', 'First Review', 'Coded', 'Member Checked']);
            const [participants, setParticipants] = useState([]);
            const [analysisCanvases, setAnalysisCanvases] = useState([]);
            const [sourceFilterPresets, setSourceFilterPresets] = useState([]);
            const [triangulationSessions, setTriangulationSessions] = useState([]);
            const [triangulationAssignmentMeta, setTriangulationAssignmentMeta] = useState(null);
            const [codeDefinitions, setCodeDefinitions] = useState({});
            const [categoryDefinitions, setCategoryDefinitions] = useState({});
            const [observations, setObservations] = useState([]);
            const [observationTags, setObservationTags] = useState([]);
            const [activeObservationId, setActiveObservationId] = useState(null);
            const [activeId, setActiveId] = useState(null);
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                const detectStartupState = async () => {
                    const savedPin = localStorage.getItem('quali_pin');
                    const savedRecoveryQuestion = localStorage.getItem(recoveryQuestionKey);
                    const savedRecoveryAnswerHash = localStorage.getItem(recoveryAnswerHashKey);
                    const hasRecovery = !!(savedRecoveryQuestion && savedRecoveryAnswerHash);
                    const existingTranscripts = await dbGet('data', 'transcripts') || [];
                    const existingTags = await dbGet('data', 'tags') || [];
                    const existingArtifacts = await dbGet('data', 'global_artifacts') || [];
                    const existingParticipants = await dbGet('data', 'participants') || [];
                    const existingCanvases = await dbGet('data', 'analysis_canvases') || [];
                    const hasProjectData = existingTranscripts.length > 0 || existingTags.length > 0 || existingArtifacts.length > 0 || existingParticipants.length > 0 || existingCanvases.length > 0;

                    setHasAppPassword(!!savedPin);
                    setHasRecoverySetup(hasRecovery);
                    setShowRecoveryPrompt(!!savedPin && !hasRecovery);
                    if (hasProjectData && savedPin) {
                        setStartupState('locked');
                        return;
                    }
                    if (hasProjectData) {
                        setStartupState('open');
                        return;
                    }
                    setStartupState('welcome');
                };

                detectStartupState();
            }, []);

            useEffect(() => {
                let timeout;
                const IDLE_TIME = 20 * 60 * 1000;
                const resetTimer = () => {
                    clearTimeout(timeout);
                    if (startupState === 'open' && hasAppPassword) timeout = setTimeout(() => setStartupState('locked'), IDLE_TIME);
                };
                window.addEventListener('mousemove', resetTimer);
                window.addEventListener('keydown', resetTimer);
                resetTimer();
                return () => {
                    clearTimeout(timeout);
                    window.removeEventListener('mousemove', resetTimer);
                    window.removeEventListener('keydown', resetTimer);
                };
            }, [startupState, hasAppPassword]);

            useEffect(() => {
                const loadData = async () => {
                    setTranscripts(await dbGet('data', 'transcripts') || []);
                    setTranscriptFolders(await dbGet('data', 'transcript_folders') || []);
                    setTags(await dbGet('data', 'tags') || []);
                    setGlobalArtifacts(await dbGet('data', 'global_artifacts') || []);
                    setParticipants(await dbGet('data', 'participants') || []);
                    setAnalysisCanvases(await dbGet('data', 'analysis_canvases') || []);
                    setSourceFilterPresets(await dbGet('data', 'source_filter_presets') || []);
                    setTriangulationSessions(await dbGet('data', 'triangulation_sessions') || []);
                    setTriangulationAssignmentMeta(await dbGet('data', 'triangulation_assignment_meta') || null);
                    setCodeDefinitions(await dbGet('data', 'code_definitions') || {});
                    setCategoryDefinitions(await dbGet('data', 'category_definitions') || {});
                    setObservations(await dbGet('data', 'observations') || []);
                    setObservationTags(await dbGet('data', 'observation_tags') || []);
                    const savedActivityTypes = await dbGet('data', 'activityTypes');
                    if (savedActivityTypes) setActivityTypes(savedActivityTypes);
                    setIsReady(true);
                };
                if (startupState === 'open') loadData();
            }, [startupState]);

            useEffect(() => {
                if (isReady && startupState === 'open') {
                    dbSet('data', 'transcripts', transcripts);
                    dbSet('data', 'transcript_folders', transcriptFolders);
                    dbSet('data', 'tags', tags);
                    dbSet('data', 'global_artifacts', globalArtifacts);
                    dbSet('data', 'activityTypes', activityTypes);
                    dbSet('data', 'participants', participants);
                    dbSet('data', 'analysis_canvases', analysisCanvases);
                    dbSet('data', 'source_filter_presets', sourceFilterPresets);
                    dbSet('data', 'triangulation_sessions', triangulationSessions);
                    dbSet('data', 'triangulation_assignment_meta', triangulationAssignmentMeta);
                    dbSet('data', 'code_definitions', codeDefinitions);
                    dbSet('data', 'category_definitions', categoryDefinitions);
                    dbSet('data', 'observations', observations);
                    dbSet('data', 'observation_tags', observationTags);
                }
            }, [transcripts, transcriptFolders, tags, globalArtifacts, activityTypes, participants, analysisCanvases, sourceFilterPresets, triangulationSessions, triangulationAssignmentMeta, codeDefinitions, categoryDefinitions, observations, observationTags, isReady, startupState]);

            const handleSaveSourceFilterPreset = (preset) => {
                const cleanedName = String(preset?.name || '').trim();
                if (!cleanedName) return;
                const nextPreset = {
                    id: preset.id,
                    name: cleanedName,
                    selectedIds: normalizeSourceFilterIdList(preset.selectedIds),
                    availableIds: normalizeSourceFilterIdList(preset.availableIds),
                    updatedAt: preset.updatedAt || new Date().toISOString()
                };
                setSourceFilterPresets((prev) => {
                    const remaining = prev.filter((entry) => entry.id !== nextPreset.id);
                    return [...remaining, nextPreset].sort((a, b) => a.name.localeCompare(b.name));
                });
            };

            const handleDeleteSourceFilterPreset = (presetId) => {
                setSourceFilterPresets((prev) => prev.filter((entry) => entry.id !== presetId));
            };

            const activeTranscript = transcripts.find(t => t.id === activeId);
            const folders = [...new Set([...transcriptFolders, ...transcripts.map(t => t.folder).filter(Boolean)])].sort((a, b) => a.localeCompare(b));
            const artifactSuggestionTags = useMemo(
                () => {
                    const fromCodes = (globalArtifacts || []).flatMap((art) => (art.codes || []).map((codeName) => ({
                        tagName: codeName,
                        category: art.folder || ''
                    })));
                    const fromFolders = (globalArtifacts || []).map((art) => ({
                        tagName: '',
                        category: art.folder || ''
                    }));
                    return [...fromCodes, ...fromFolders];
                },
                [globalArtifacts]
            );
            const crossSourceTagSuggestions = useMemo(
                () => [...tags, ...observationTags, ...artifactSuggestionTags],
                [tags, observationTags, artifactSuggestionTags]
            );
            const crossSourceCodes = useMemo(
                () => Array.from(new Set(crossSourceTagSuggestions.map(t => (t.tagName || '').trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b)),
                [crossSourceTagSuggestions]
            );
            const crossSourceCategories = useMemo(
                () => Array.from(new Set(crossSourceTagSuggestions.map(t => (t.category || '').trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b)),
                [crossSourceTagSuggestions]
            );
            const codebookRefreshKey = useMemo(
                () => [
                    tags.length,
                    observationTags.length,
                    globalArtifacts.length,
                    Object.keys(codeDefinitions || {}).length,
                    Object.keys(categoryDefinitions || {}).length
                ].join('-'),
                [tags, observationTags, globalArtifacts, codeDefinitions, categoryDefinitions]
            );

            const handleCreateTranscript = async (data) => {
                const now = Date.now().toString();
                const targetFolder = (data.folder || '').trim() || 'Uncategorized';
                const newDoc = {
                    id: now,
                    title: data.title,
                    folder: targetFolder,
                    modality: data.modality || '',
                    subfolder: '',
                    content: '',
                    contentHtml: '',
                    speakerSegments: [],
                    notes: '',
                    artifacts: [],
                    hasAudio: !!data.audioFile,
                    participantId: data.participantId || null,
                    createdAt: new Date().toISOString(),
                    activityLog: [{ id: now + '_created', type: 'Created', note: 'Transcript initialized', timestamp: new Date().toISOString() }]
                };
                if (data.audioFile) await dbSet('files', `audio_${newDoc.id}`, data.audioFile);
                if (targetFolder !== 'Uncategorized' && !transcriptFolders.includes(targetFolder)) {
                    setTranscriptFolders([...transcriptFolders, targetFolder]);
                }
                setTranscripts([newDoc, ...transcripts]);
                setActiveId(newDoc.id);
                setView('editor');
            };

            const handleCreateFolder = (folderName) => {
                const cleaned = folderName.trim();
                if (!cleaned || cleaned === 'Uncategorized' || transcriptFolders.includes(cleaned)) return;
                setTranscriptFolders([...transcriptFolders, cleaned]);
            };

            const handleRenameFolder = (oldName, newName) => {
                if (!oldName || oldName === 'Uncategorized') return;
                const cleaned = newName.trim();
                if (!cleaned || cleaned === oldName) return;
                if (cleaned === 'Uncategorized') {
                    alert('Cannot rename a folder to Uncategorized.');
                    return;
                }

                const allFolderNames = [...new Set([...transcriptFolders, ...transcripts.map(t => t.folder).filter(Boolean)])];
                const targetExists = allFolderNames.includes(cleaned);
                if (targetExists && !confirm(`Folder "${cleaned}" already exists. Merge "${oldName}" into it?`)) return;

                const nextFolders = transcriptFolders
                    .filter(f => f !== oldName)
                    .concat(targetExists ? [] : [cleaned]);
                setTranscriptFolders(nextFolders);
                setTranscripts(transcripts.map(t => (t.folder || 'Uncategorized') === oldName ? { ...t, folder: cleaned, subfolder: '' } : t));
            };

            const handleDeleteFolder = (folderName) => {
                if (!folderName || folderName === 'Uncategorized') return;
                const count = transcripts.filter(t => (t.folder || 'Uncategorized') === folderName).length;
                const ok = count > 0
                    ? confirm(`Folder "${folderName}" contains ${count} transcript(s). Delete this folder and move them to Uncategorized?`)
                    : confirm(`Delete empty folder "${folderName}"?`);
                if (!ok) return;

                setTranscriptFolders(transcriptFolders.filter(f => f !== folderName));
                if (count > 0) {
                    setTranscripts(transcripts.map(t => (t.folder || 'Uncategorized') === folderName ? { ...t, folder: 'Uncategorized', subfolder: '' } : t));
                }
            };

            const handleMoveTranscriptToFolder = (transcriptId, folderName) => {
                const targetFolder = folderName.trim() || 'Uncategorized';
                if (targetFolder !== 'Uncategorized' && !transcriptFolders.includes(targetFolder)) {
                    setTranscriptFolders([...transcriptFolders, targetFolder]);
                }
                setTranscripts(transcripts.map(t => t.id === transcriptId ? { ...t, folder: targetFolder, subfolder: '' } : t));
            };

            const handleRenameTranscript = (transcriptId, title) => {
                const nextTitle = title.trim();
                if (!nextTitle) return;
                setTranscripts(transcripts.map(t => t.id === transcriptId ? { ...t, title: nextTitle } : t));
            };

            const handleDeleteTranscript = async (id) => {
                if (confirm('Delete transcript and all attached files?')) {
                    const t = transcripts.find(x => x.id === id);
                    if (t) {
                        await dbDelete('files', `audio_${id}`);
                        for (const a of (t.artifacts || [])) await dbDelete('files', `artifact_${a.id}`);
                    }
                    setTranscripts(transcripts.filter(t => t.id !== id));
                    setTags(tags.filter(t => t.transcriptId !== id));
                }
            };

            const estimateBackupSize = async () => {
                try {
                    // Get all files from the files store
                    const fileEntries = await dbGetAllEntries('files');
                    let filesSize = 0;
                    for (const entry of fileEntries) {
                        const value = entry.value;
                        if (!(value instanceof Blob)) continue;
                        filesSize += value.size;
                    }

                    // Estimate data size (in JSON format)
                    const dataPayload = {
                        transcripts,
                        transcriptFolders,
                        tags,
                        globalArtifacts,
                        activityTypes,
                        participants,
                        analysisCanvases,
                        sourceFilterPresets,
                        triangulationSessions,
                        triangulationAssignmentMeta,
                        codeDefinitions,
                        categoryDefinitions,
                        observations,
                        observationTags
                    };
                    const dataString = JSON.stringify(dataPayload);
                    const dataSize = new Blob([dataString]).size;

                    // Estimate security section
                    const securitySize = new Blob([JSON.stringify({
                        appPin: localStorage.getItem('quali_pin') || null,
                        participantPinHash: localStorage.getItem(participantPinKey) || null,
                        recoveryQuestion: localStorage.getItem(recoveryQuestionKey) || null,
                        recoveryAnswerHash: localStorage.getItem(recoveryAnswerHashKey) || null
                    })]).size;

                    // Calculate base size
                    const baseSize = dataSize + securitySize;

                    // Files are serialized as base64 in the backup (1.33x larger)
                    const serializedFilesSize = filesSize * 1.33;

                    // Add JSON structure overhead and encryption overhead
                    const totalSize = baseSize + serializedFilesSize + 1000; // 1KB buffer for structure

                    return totalSize;
                } catch (err) {
                    console.error('Error estimating backup size:', err);
                    return 0;
                }
            };

            const handleBackupDownload = async (backupPassword) => {
                const fileEntries = await dbGetAllEntries('files');
                const serializedFiles = [];
                for (const entry of fileEntries) {
                    const value = entry.value;
                    if (!(value instanceof Blob)) continue;
                    serializedFiles.push({
                        key: String(entry.key),
                        type: value.type || 'application/octet-stream',
                        name: value.name || null,
                        lastModified: value.lastModified || null,
                        bytes: await blobToBase64(value)
                    });
                }

                const payload = {
                    exportedAt: new Date().toISOString(),
                    data: {
                        transcripts,
                        transcriptFolders,
                        tags,
                        globalArtifacts,
                        activityTypes,
                        participants,
                        analysisCanvases,
                        sourceFilterPresets,
                        triangulationSessions,
                        triangulationAssignmentMeta,
                        codeDefinitions,
                        categoryDefinitions,
                        observations,
                        observationTags
                    },
                    files: serializedFiles,
                    security: {
                        appPin: localStorage.getItem('quali_pin') || null,
                        participantPinHash: localStorage.getItem(participantPinKey) || null,
                        recoveryQuestion: localStorage.getItem(recoveryQuestionKey) || null,
                        recoveryAnswerHash: localStorage.getItem(recoveryAnswerHashKey) || null
                    }
                };

                const encrypted = await encryptPayload(payload, backupPassword);
                const blob = new Blob([JSON.stringify(encrypted, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `QualiApp_Backup_${new Date().toISOString().slice(0, 10)}.qbk`;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            const handleRestoreUpload = async (file, backupPassword) => {
                const text = await file.text();
                const encrypted = JSON.parse(text);
                const payload = await decryptPayload(encrypted, backupPassword);

                const d = payload.data || {};
                setTranscripts(d.transcripts || []);
                setTranscriptFolders(d.transcriptFolders || []);
                setTags(d.tags || []);
                setGlobalArtifacts(d.globalArtifacts || []);
                setActivityTypes(d.activityTypes || ['Edited', 'First Review', 'Coded', 'Member Checked']);
                setParticipants(d.participants || []);
                setAnalysisCanvases(d.analysisCanvases || []);
                setSourceFilterPresets(d.sourceFilterPresets || []);
                setTriangulationSessions(d.triangulationSessions || []);
                setTriangulationAssignmentMeta(d.triangulationAssignmentMeta || null);
                setCodeDefinitions(d.codeDefinitions || {});
                setCategoryDefinitions(d.categoryDefinitions || {});
                setObservations(d.observations || []);
                setObservationTags(d.observationTags || []);
                setActiveId(null);
                setActiveObservationId(null);
                setView('dashboard');
                setStartupState('open');

                await dbClear('files');
                for (const f of (payload.files || [])) {
                    const bytes = fromBase64(f.bytes);
                    const blob = f.name
                        ? new File([bytes], f.name, { type: f.type || 'application/octet-stream', lastModified: f.lastModified || Date.now() })
                        : new Blob([bytes], { type: f.type || 'application/octet-stream' });
                    await dbSet('files', f.key, blob);
                }

                if (payload.security) {
                    if (payload.security.appPin) localStorage.setItem('quali_pin', payload.security.appPin);
                    if (payload.security.participantPinHash) localStorage.setItem(participantPinKey, payload.security.participantPinHash);
                    if (payload.security.recoveryQuestion) localStorage.setItem(recoveryQuestionKey, payload.security.recoveryQuestion);
                    if (payload.security.recoveryAnswerHash) localStorage.setItem(recoveryAnswerHashKey, payload.security.recoveryAnswerHash);
                    setHasAppPassword(!!localStorage.getItem('quali_pin'));
                    setHasRecoverySetup(!!(localStorage.getItem(recoveryQuestionKey) && localStorage.getItem(recoveryAnswerHashKey)));
                    setShowRecoveryPrompt(!!localStorage.getItem('quali_pin') && !(localStorage.getItem(recoveryQuestionKey) && localStorage.getItem(recoveryAnswerHashKey)));
                }
            };

            const handleSetAppPassword = async (password) => {
                localStorage.setItem('quali_pin', btoa(password));
                setHasAppPassword(true);
                const hasRecovery = !!(localStorage.getItem(recoveryQuestionKey) && localStorage.getItem(recoveryAnswerHashKey));
                setHasRecoverySetup(hasRecovery);
                if (!hasRecovery) setShowRecoveryPrompt(true);
                alert('App password saved.');
            };

            const handleSetRecovery = async (question, answer) => {
                const cleanQuestion = String(question || '').trim();
                const cleanAnswer = normalizeRecoveryAnswer(answer);
                if (!cleanQuestion || !cleanAnswer) return;
                const hashedAnswer = await stringHash(cleanAnswer);
                localStorage.setItem(recoveryQuestionKey, cleanQuestion);
                localStorage.setItem(recoveryAnswerHashKey, hashedAnswer);
                setHasRecoverySetup(true);
                setShowRecoveryPrompt(false);
            };

            const handleConfigureNewProjectSecurity = async ({ password, recoveryQuestion, recoveryAnswer }) => {
                await handleSetAppPassword(password);
                await handleSetRecovery(recoveryQuestion, recoveryAnswer);
            };

            const computeProjectFingerprint = async () => {
                const stable = {
                    transcripts: transcripts.map(t => ({ id: t.id, title: t.title, folder: t.folder, content: t.content || '' })),
                    artifacts: globalArtifacts.map(a => ({ id: a.id, name: a.name, folder: a.folder || '', notes: a.notes || '' })),
                    participants: participants.map(p => ({ id: p.id, pseudonym: p.pseudonym || '' }))
                };
                return stringHash(JSON.stringify(stable));
            };

            const handleExportTriangulationAssignment = async () => {
                try {
                    const fileEntries = await dbGetAllEntries('files');
                    const serializedFiles = [];
                    for (const entry of fileEntries) {
                        const value = entry.value;
                        if (!(value instanceof Blob)) continue;
                        serializedFiles.push({
                            key: String(entry.key),
                            type: value.type || 'application/octet-stream',
                            name: value.name || null,
                            lastModified: value.lastModified || null,
                            bytes: await blobToBase64(value)
                        });
                    }

                    const packageId = `tri_${Date.now()}`;
                    const fingerprint = await computeProjectFingerprint();
                    const sanitizedParticipants = participants.map(p => ({ id: p.id, pseudonym: p.pseudonym || `P-${String(p.id).slice(-4)}` }));
                    const sanitizedArtifacts = globalArtifacts.map(a => ({ ...a, codes: [] }));
                    const payload = {
                        type: 'triangulation-assignment',
                        version: 1,
                        packageId,
                        createdAt: new Date().toISOString(),
                        projectFingerprint: fingerprint,
                        data: {
                            transcripts,
                            transcriptFolders,
                            tags: [],
                            globalArtifacts: sanitizedArtifacts,
                            activityTypes,
                            participants: sanitizedParticipants,
                            analysisCanvases: []
                        },
                        files: serializedFiles
                    };

                    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `QualiApp_Triangulation_Assignment_${new Date().toISOString().slice(0, 10)}.qtri`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                } catch (err) {
                    alert('Failed to export triangulation assignment package.');
                }
            };

            const handleImportTriangulationAssignment = async (file) => {
                const text = await file.text();
                const payload = JSON.parse(text);
                if (payload.type !== 'triangulation-assignment') throw new Error('Invalid assignment package');

                const d = payload.data || {};
                setTranscripts(d.transcripts || []);
                setTranscriptFolders(d.transcriptFolders || []);
                setTags(d.tags || []);
                setGlobalArtifacts(d.globalArtifacts || []);
                setActivityTypes(d.activityTypes || ['Edited', 'First Review', 'Coded', 'Member Checked']);
                setParticipants(d.participants || []);
                setAnalysisCanvases(d.analysisCanvases || []);
                setSourceFilterPresets(d.sourceFilterPresets || []);
                setTriangulationSessions([]);
                setTriangulationAssignmentMeta({
                    packageId: payload.packageId,
                    projectFingerprint: payload.projectFingerprint,
                    importedAt: new Date().toISOString()
                });
                setActiveId(null);
                setView('dashboard');
                setStartupState('open');

                await dbClear('files');
                for (const f of (payload.files || [])) {
                    const bytes = fromBase64(f.bytes);
                    const blob = f.name
                        ? new File([bytes], f.name, { type: f.type || 'application/octet-stream', lastModified: f.lastModified || Date.now() })
                        : new Blob([bytes], { type: f.type || 'application/octet-stream' });
                    await dbSet('files', f.key, blob);
                }
            };

            const handleExportTriangulationReturn = async (coderId) => {
                if (!triangulationAssignmentMeta?.packageId) {
                    alert('Import a triangulation assignment package first.');
                    return;
                }

                const artifactCodes = globalArtifacts.map(a => ({ artifactId: a.id, artifactName: a.name, codes: a.codes || [] }));
                const payload = {
                    type: 'triangulation-return',
                    version: 1,
                    packageId: triangulationAssignmentMeta.packageId,
                    projectFingerprint: triangulationAssignmentMeta.projectFingerprint,
                    coderId: coderId.trim(),
                    createdAt: new Date().toISOString(),
                    tags,
                    artifactCodes,
                    analysisCanvases
                };

                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `QualiApp_Triangulation_Return_${coderId.trim().replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.qtrr`;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            const handleImportTriangulationReturn = async (file) => {
                const text = await file.text();
                const payload = JSON.parse(text);
                if (payload.type !== 'triangulation-return') throw new Error('Invalid co-rater return package');
                if (!payload.coderId) throw new Error('Missing coder id');

                const currentFingerprint = await computeProjectFingerprint();
                if (payload.projectFingerprint && payload.projectFingerprint !== currentFingerprint) {
                    const proceed = confirm('Project fingerprint differs from this workspace. Import anyway?');
                    if (!proceed) return;
                }

                const duplicate = triangulationSessions.some(s => s.packageId === payload.packageId && s.coderId === payload.coderId);
                if (duplicate) {
                    alert('This co-rater submission is already imported.');
                    return;
                }

                const session = {
                    id: `session_${Date.now()}`,
                    coderId: payload.coderId,
                    packageId: payload.packageId || null,
                    projectFingerprint: payload.projectFingerprint || null,
                    importedAt: new Date().toISOString(),
                    tags: payload.tags || [],
                    artifactCodes: payload.artifactCodes || [],
                    analysisCanvases: payload.analysisCanvases || []
                };
                setTriangulationSessions([session, ...triangulationSessions]);
            };

            const handleDownloadApp = async () => {
                try {
                    const appUrl = new URL('./index.html', window.location.href).toString();
                    const res = await fetch(appUrl, { cache: 'no-store' });
                    if (!res.ok) throw new Error('Failed to fetch app file');
                    const html = await res.text();
                    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'QualiApp.html';
                    a.click();
                    URL.revokeObjectURL(a.href);
                } catch (err) {
                    alert('Unable to download app file from this location. If opened via file://, use your file manager to copy index.html directly.');
                }
            };

            if (startupState === 'checking') return <div className="h-screen w-screen bg-hero flex flex-col"><div className="flex-1 flex items-center justify-center">Loading...</div><AppFooter /></div>;
            if (startupState === 'welcome') return <WelcomeScreen hasPassword={hasAppPassword} hasRecovery={hasRecoverySetup} onConfigureNewProjectSecurity={handleConfigureNewProjectSecurity} onStartNew={() => setStartupState('open')} onRestoreExisting={() => { setStartupState('open'); setView('backup'); }} />;
            if (startupState === 'locked') return <LockScreen onUnlock={() => setStartupState('open')} />;
            if (!isReady) return <div className="h-screen w-screen bg-hero flex flex-col"><div className="flex-1 flex items-center justify-center">Loading...</div><AppFooter /></div>;

            return (
                <div className="h-screen bg-hero relative flex flex-col">
                    <div className="flex flex-1 min-h-0">
                        <aside className={`${isSidebarCollapsed ? 'w-16' : 'w-72'} bg-ink text-slate-200 flex flex-col shadow-soft z-10 transition-all duration-200`}>
                            <div className={`p-4 border-b border-slate-700/60 ${isSidebarCollapsed ? 'flex items-center justify-center' : 'p-6'}`}>
                                <div className="w-full flex items-start justify-between gap-2">
                                    {!isSidebarCollapsed && (
                                        <div>
                                            <h1 className="text-3xl font-display text-white leading-none">QualiApp</h1>
                                            <p className="text-xs mt-2 text-slate-400">Offline Qualitative Studio</p>
                                        </div>
                                    )}
                                    <button
                                        type="button"
                                        onClick={() => setIsSidebarCollapsed(prev => !prev)}
                                        className="p-2 rounded-lg hover:bg-slate-800 text-slate-300"
                                        title={isSidebarCollapsed ? 'Expand menu' : 'Collapse menu'}
                                    >
                                        {isSidebarCollapsed ? '»' : '«'}
                                    </button>
                                </div>
                            </div>
                            {!isSidebarCollapsed && (
                                <>
                            <nav className="flex-1 px-4 py-4 space-y-2 text-sm">
                                <NavButton active={view === 'dashboard'} label="Transcripts" onClick={() => setView('dashboard')} />
                                <NavButton active={view === 'artifacts'} label="Project Artifacts" onClick={() => setView('artifacts')} />
                                <NavButton active={view === 'observations'} label="Onsite Observations" onClick={() => setView('observations')} />
                                <NavButton active={view === 'participants'} label="Participant Coding" onClick={() => setView('participants')} />
                                <NavButton active={view === 'analysis'} label="Analysis Canvas" onClick={() => setView('analysis')} />
                                <NavButton active={view === 'codebook'} label="Codebook" onClick={() => setView('codebook')} />
                                <NavButton active={view === 'triangulation'} label="Triangulation" onClick={() => setView('triangulation')} />
                                <NavButton active={view === 'backup'} label="Backup & Restore" onClick={() => setView('backup')} />
                            </nav>
                            <div className="p-4 border-t border-slate-700/60 space-y-2">
                                {hasAppPassword ? (
                                    <button onClick={() => setStartupState('locked')} className="w-full bg-slate-800 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">Lock App</button>
                                ) : (
                                    <button onClick={() => {
                                        const p = prompt('Set an app password (min 4 chars):', '');
                                        if (p && p.length >= 4) handleSetAppPassword(p);
                                    }} className="w-full bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">Set App Password</button>
                                )}
                            </div>
                                </>
                            )}
                        </aside>

                        <main className="flex-1 overflow-hidden flex flex-col relative">
                            {showRecoveryPrompt && startupState === 'open' && (
                                <div className="absolute inset-0 z-40 bg-slate-900/55 flex items-center justify-center p-4">
                                    <div className="w-full max-w-lg bg-white rounded-2xl border shadow-soft p-6 space-y-4">
                                        <h3 className="text-2xl font-display">Add Password Recovery</h3>
                                        <p className="text-sm text-slate-500">Your app has a password but no recovery setup. Add a recovery question and answer now.</p>
                                        <input
                                            type="text"
                                            value={recoveryQuestionInput}
                                            onChange={(e) => setRecoveryQuestionInput(e.target.value)}
                                            placeholder="Recovery question"
                                            className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink"
                                        />
                                        <input
                                            type="text"
                                            value={recoveryAnswerInput}
                                            onChange={(e) => setRecoveryAnswerInput(e.target.value)}
                                            placeholder="Recovery answer"
                                            className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink"
                                        />
                                        <div className="flex justify-end gap-2">
                                            <button onClick={() => setShowRecoveryPrompt(false)} className="px-4 py-2 rounded-lg bg-slate-100 text-slate-700 font-semibold">Later</button>
                                            <button
                                                onClick={async () => {
                                                    if (!recoveryQuestionInput.trim() || !recoveryAnswerInput.trim()) {
                                                        alert('Please enter both recovery question and answer.');
                                                        return;
                                                    }
                                                    await handleSetRecovery(recoveryQuestionInput, recoveryAnswerInput);
                                                    setRecoveryQuestionInput('');
                                                    setRecoveryAnswerInput('');
                                                    alert('Recovery setup saved.');
                                                }}
                                                className="px-4 py-2 rounded-lg bg-tide text-white font-semibold hover:bg-teal-600"
                                            >
                                                Save Recovery
                                            </button>
