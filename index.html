<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualiApp - Offline Qualitative Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: '#102a43',
                        tide: '#0f766e',
                        ember: '#c2410c',
                        mist: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        display: ['Fraunces', 'serif']
                    },
                    boxShadow: {
                        soft: '0 10px 35px rgba(16, 42, 67, 0.12)'
                    },
                    backgroundImage: {
                        hero: 'radial-gradient(circle at 20% 20%, rgba(15,118,110,0.15), transparent 45%), radial-gradient(circle at 80% 10%, rgba(194,65,12,0.15), transparent 40%), linear-gradient(180deg, #f8fafc 0%, #eef6f6 100%)'
                    }
                }
            }
        };
    </script>
    <style>
        .qa-interviewer {
            background: transparent;
            color: #d4a017;
            font-weight: 500;
        }

        .code-surface .qa-interviewer {
            background: transparent;
            color: #d4a017;
            opacity: 0.85;
        }
    </style>
</head>
<body class="bg-mist text-ink font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const dbName = 'QualiMacDB_v7';
        const participantPinKey = 'quali_participant_pin_hash';

        const openDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('data')) db.createObjectStore('data');
                if (!db.objectStoreNames.contains('files')) db.createObjectStore('files');
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });

        const dbGet = async (store, key) => {
            const db = await openDB();
            return new Promise((res) => {
                const req = db.transaction(store).objectStore(store).get(key);
                req.onsuccess = () => res(req.result);
            });
        };

        const dbSet = async (store, key, val) => {
            const db = await openDB();
            return new Promise((res, rej) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).put(val, key);
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
            });
        };

        const dbDelete = async (store, key) => {
            const db = await openDB();
            return new Promise((res) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).delete(key);
                req.onsuccess = () => res();
            });
        };

        const dbClear = async (store) => {
            const db = await openDB();
            return new Promise((res, rej) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).clear();
                req.onsuccess = () => res();
                req.onerror = () => rej(req.error);
            });
        };

        const dbGetAllEntries = async (store) => {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(store, 'readonly');
                const os = tx.objectStore(store);
                const out = [];
                const req = os.openCursor();
                req.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (!cursor) return resolve(out);
                    out.push({ key: cursor.key, value: cursor.value });
                    cursor.continue();
                };
                req.onerror = () => reject(req.error);
            });
        };

        const toBase64 = (buffer) => {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        };

        const fromBase64 = (b64) => {
            const binary = atob(b64);
            const out = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
            return out.buffer;
        };

        const blobToBase64 = (blob) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => {
                const dataUrl = reader.result;
                resolve(dataUrl.split(',')[1]);
            };
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(blob);
        });

        const deriveKey = async (password, salt, usages) => {
            const enc = new TextEncoder();
            const material = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' },
                material,
                { name: 'AES-GCM', length: 256 },
                false,
                usages
            );
        };

        const encryptPayload = async (payload, password) => {
            const enc = new TextEncoder();
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt, ['encrypt']);
            const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(payload)));
            return {
                version: 1,
                algorithm: 'AES-GCM-256',
                kdf: 'PBKDF2-SHA256-150000',
                salt: toBase64(salt),
                iv: toBase64(iv),
                data: toBase64(ciphertext)
            };
        };

        const decryptPayload = async (encryptedBlob, password) => {
            const dec = new TextDecoder();
            const salt = new Uint8Array(fromBase64(encryptedBlob.salt));
            const iv = new Uint8Array(fromBase64(encryptedBlob.iv));
            const data = fromBase64(encryptedBlob.data);
            const key = await deriveKey(password, salt, ['decrypt']);
            const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
            return JSON.parse(dec.decode(plaintext));
        };

        const stringHash = async (value) => {
            const enc = new TextEncoder();
            const digest = await crypto.subtle.digest('SHA-256', enc.encode(value));
            return toBase64(digest);
        };

        function LockScreen({ onUnlock }) {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const saved = localStorage.getItem('quali_pin');
                if (saved && btoa(password) === saved) onUnlock();
                else setError('Incorrect password.');
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-ink text-white">
                    <form onSubmit={handleSubmit} className="bg-slate-900/90 p-8 rounded-2xl shadow-soft max-w-sm w-full text-center border border-slate-700">
                        <h2 className="text-3xl font-display mb-2">QualiApp Locked</h2>
                        <p className="text-slate-400 mb-6 text-sm">Local-only workspace protection.</p>
                        <input
                            type="password"
                            autoFocus
                            value={password}
                            onChange={e => setPassword(e.target.value)}
                            className="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-center text-xl mb-4 focus:outline-none focus:ring-2 focus:ring-tide"
                            placeholder="Enter password"
                        />
                        {error && <p className="text-red-300 text-sm mb-4">{error}</p>}
                        <button type="submit" className="w-full bg-tide hover:bg-teal-600 text-white font-bold py-3 rounded-lg transition">
                            Unlock
                        </button>
                    </form>
                </div>
            );
        }

        function WelcomeScreen({ hasPassword, onStartNew, onRestoreExisting, onSetPassword }) {
            const [passwordInput, setPasswordInput] = useState('');

            const saveOptionalPassword = () => {
                if (!passwordInput.trim()) return;
                if (passwordInput.length < 4) {
                    alert('Password must be at least 4 characters.');
                    return;
                }
                onSetPassword(passwordInput);
                setPasswordInput('');
            };

            return (
                <div className="h-screen w-screen bg-hero text-ink p-6 md:p-10 overflow-y-auto">
                    <div className="max-w-5xl mx-auto grid lg:grid-cols-[1.2fr,1fr] gap-6 pt-8">
                        <section className="bg-white border rounded-2xl p-8 shadow-soft">
                            <h1 className="text-4xl font-display">Welcome to QualiApp</h1>
                            <p className="text-slate-500 mt-3">Start a new project right away or restore an existing backup. Password protection is optional and can be enabled anytime.</p>

                            <div className="mt-8 flex flex-col sm:flex-row gap-3">
                                <button onClick={onStartNew} className="bg-tide hover:bg-teal-600 text-white px-5 py-3 rounded-xl font-semibold">Start New Project</button>
                                <button onClick={onRestoreExisting} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-5 py-3 rounded-xl font-semibold">Open Existing Project</button>
                            </div>

                            <div className="mt-8 p-4 rounded-xl bg-amber-50 border border-amber-200 text-amber-900 text-sm">
                                Private/incognito sessions may clear data when the browser closes. Use Backup regularly.
                            </div>
                        </section>

                        <section className="bg-white border rounded-2xl p-6 shadow-soft space-y-4">
                            <h2 className="text-2xl font-display">Optional Security</h2>
                            <p className="text-sm text-slate-500">Set an app password if this device is shared. Not required to begin coding.</p>
                            <input
                                type="password"
                                value={passwordInput}
                                onChange={(e) => setPasswordInput(e.target.value)}
                                placeholder={hasPassword ? 'Update app password' : 'Set app password (optional)'}
                                className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ink"
                            />
                            <button onClick={saveOptionalPassword} className="w-full bg-ink hover:bg-slate-800 text-white py-3 rounded-lg font-semibold">{hasPassword ? 'Update Password' : 'Set Password'}</button>
                        </section>
                    </div>
                </div>
            );
        }

        function App() {
            const [startupState, setStartupState] = useState('checking');
            const [hasAppPassword, setHasAppPassword] = useState(false);
            const [view, setView] = useState('dashboard');
            const [transcripts, setTranscripts] = useState([]);
            const [transcriptFolders, setTranscriptFolders] = useState([]);
            const [tags, setTags] = useState([]);
            const [globalArtifacts, setGlobalArtifacts] = useState([]);
            const [activityTypes, setActivityTypes] = useState(['Edited', 'First Review', 'Coded', 'Member Checked']);
            const [participants, setParticipants] = useState([]);
            const [analysisCanvases, setAnalysisCanvases] = useState([]);
            const [triangulationSessions, setTriangulationSessions] = useState([]);
            const [triangulationAssignmentMeta, setTriangulationAssignmentMeta] = useState(null);
            const [activeId, setActiveId] = useState(null);
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                const detectStartupState = async () => {
                    const savedPin = localStorage.getItem('quali_pin');
                    const existingTranscripts = await dbGet('data', 'transcripts') || [];
                    const existingTags = await dbGet('data', 'tags') || [];
                    const existingArtifacts = await dbGet('data', 'global_artifacts') || [];
                    const existingParticipants = await dbGet('data', 'participants') || [];
                    const existingCanvases = await dbGet('data', 'analysis_canvases') || [];
                    const hasProjectData = existingTranscripts.length > 0 || existingTags.length > 0 || existingArtifacts.length > 0 || existingParticipants.length > 0 || existingCanvases.length > 0;

                    setHasAppPassword(!!savedPin);
                    if (hasProjectData && savedPin) {
                        setStartupState('locked');
                        return;
                    }
                    if (hasProjectData) {
                        setStartupState('open');
                        return;
                    }
                    setStartupState('welcome');
                };

                detectStartupState();
            }, []);

            useEffect(() => {
                let timeout;
                const IDLE_TIME = 20 * 60 * 1000;
                const resetTimer = () => {
                    clearTimeout(timeout);
                    if (startupState === 'open' && hasAppPassword) timeout = setTimeout(() => setStartupState('locked'), IDLE_TIME);
                };
                window.addEventListener('mousemove', resetTimer);
                window.addEventListener('keydown', resetTimer);
                resetTimer();
                return () => {
                    clearTimeout(timeout);
                    window.removeEventListener('mousemove', resetTimer);
                    window.removeEventListener('keydown', resetTimer);
                };
            }, [startupState, hasAppPassword]);

            useEffect(() => {
                const loadData = async () => {
                    setTranscripts(await dbGet('data', 'transcripts') || []);
                    setTranscriptFolders(await dbGet('data', 'transcript_folders') || []);
                    setTags(await dbGet('data', 'tags') || []);
                    setGlobalArtifacts(await dbGet('data', 'global_artifacts') || []);
                    setParticipants(await dbGet('data', 'participants') || []);
                    setAnalysisCanvases(await dbGet('data', 'analysis_canvases') || []);
                    setTriangulationSessions(await dbGet('data', 'triangulation_sessions') || []);
                    setTriangulationAssignmentMeta(await dbGet('data', 'triangulation_assignment_meta') || null);
                    const savedActivityTypes = await dbGet('data', 'activityTypes');
                    if (savedActivityTypes) setActivityTypes(savedActivityTypes);
                    setIsReady(true);
                };
                if (startupState === 'open') loadData();
            }, [startupState]);

            useEffect(() => {
                if (isReady && startupState === 'open') {
                    dbSet('data', 'transcripts', transcripts);
                    dbSet('data', 'transcript_folders', transcriptFolders);
                    dbSet('data', 'tags', tags);
                    dbSet('data', 'global_artifacts', globalArtifacts);
                    dbSet('data', 'activityTypes', activityTypes);
                    dbSet('data', 'participants', participants);
                    dbSet('data', 'analysis_canvases', analysisCanvases);
                    dbSet('data', 'triangulation_sessions', triangulationSessions);
                    dbSet('data', 'triangulation_assignment_meta', triangulationAssignmentMeta);
                }
            }, [transcripts, transcriptFolders, tags, globalArtifacts, activityTypes, participants, analysisCanvases, triangulationSessions, triangulationAssignmentMeta, isReady, startupState]);

            const activeTranscript = transcripts.find(t => t.id === activeId);
            const folders = [...new Set([...transcriptFolders, ...transcripts.map(t => t.folder).filter(Boolean)])].sort((a, b) => a.localeCompare(b));

            const handleCreateTranscript = async (data) => {
                const now = Date.now().toString();
                const targetFolder = (data.folder || '').trim() || 'Uncategorized';
                const newDoc = {
                    id: now,
                    title: data.title,
                    folder: targetFolder,
                    subfolder: '',
                    content: '',
                    contentHtml: '',
                    speakerSegments: [],
                    notes: '',
                    artifacts: [],
                    hasAudio: !!data.audioFile,
                    participantId: data.participantId || null,
                    createdAt: new Date().toISOString(),
                    activityLog: [{ id: now + '_created', type: 'Created', note: 'Transcript initialized', timestamp: new Date().toISOString() }]
                };
                if (data.audioFile) await dbSet('files', `audio_${newDoc.id}`, data.audioFile);
                if (targetFolder !== 'Uncategorized' && !transcriptFolders.includes(targetFolder)) {
                    setTranscriptFolders([...transcriptFolders, targetFolder]);
                }
                setTranscripts([newDoc, ...transcripts]);
                setActiveId(newDoc.id);
                setView('editor');
            };

            const handleCreateFolder = (folderName) => {
                const cleaned = folderName.trim();
                if (!cleaned || cleaned === 'Uncategorized' || transcriptFolders.includes(cleaned)) return;
                setTranscriptFolders([...transcriptFolders, cleaned]);
            };

            const handleRenameFolder = (oldName, newName) => {
                if (!oldName || oldName === 'Uncategorized') return;
                const cleaned = newName.trim();
                if (!cleaned || cleaned === oldName) return;
                if (cleaned === 'Uncategorized') {
                    alert('Cannot rename a folder to Uncategorized.');
                    return;
                }

                const allFolderNames = [...new Set([...transcriptFolders, ...transcripts.map(t => t.folder).filter(Boolean)])];
                const targetExists = allFolderNames.includes(cleaned);
                if (targetExists && !confirm(`Folder "${cleaned}" already exists. Merge "${oldName}" into it?`)) return;

                const nextFolders = transcriptFolders
                    .filter(f => f !== oldName)
                    .concat(targetExists ? [] : [cleaned]);
                setTranscriptFolders(nextFolders);
                setTranscripts(transcripts.map(t => (t.folder || 'Uncategorized') === oldName ? { ...t, folder: cleaned, subfolder: '' } : t));
            };

            const handleDeleteFolder = (folderName) => {
                if (!folderName || folderName === 'Uncategorized') return;
                const count = transcripts.filter(t => (t.folder || 'Uncategorized') === folderName).length;
                const ok = count > 0
                    ? confirm(`Folder "${folderName}" contains ${count} transcript(s). Delete this folder and move them to Uncategorized?`)
                    : confirm(`Delete empty folder "${folderName}"?`);
                if (!ok) return;

                setTranscriptFolders(transcriptFolders.filter(f => f !== folderName));
                if (count > 0) {
                    setTranscripts(transcripts.map(t => (t.folder || 'Uncategorized') === folderName ? { ...t, folder: 'Uncategorized', subfolder: '' } : t));
                }
            };

            const handleMoveTranscriptToFolder = (transcriptId, folderName) => {
                const targetFolder = folderName.trim() || 'Uncategorized';
                if (targetFolder !== 'Uncategorized' && !transcriptFolders.includes(targetFolder)) {
                    setTranscriptFolders([...transcriptFolders, targetFolder]);
                }
                setTranscripts(transcripts.map(t => t.id === transcriptId ? { ...t, folder: targetFolder, subfolder: '' } : t));
            };

            const handleRenameTranscript = (transcriptId, title) => {
                const nextTitle = title.trim();
                if (!nextTitle) return;
                setTranscripts(transcripts.map(t => t.id === transcriptId ? { ...t, title: nextTitle } : t));
            };

            const handleDeleteTranscript = async (id) => {
                if (confirm('Delete transcript and all attached files?')) {
                    const t = transcripts.find(x => x.id === id);
                    if (t) {
                        await dbDelete('files', `audio_${id}`);
                        for (const a of (t.artifacts || [])) await dbDelete('files', `artifact_${a.id}`);
                    }
                    setTranscripts(transcripts.filter(t => t.id !== id));
                    setTags(tags.filter(t => t.transcriptId !== id));
                }
            };

            const handleBackupDownload = async (backupPassword) => {
                const fileEntries = await dbGetAllEntries('files');
                const serializedFiles = [];
                for (const entry of fileEntries) {
                    const value = entry.value;
                    if (!(value instanceof Blob)) continue;
                    serializedFiles.push({
                        key: String(entry.key),
                        type: value.type || 'application/octet-stream',
                        name: value.name || null,
                        lastModified: value.lastModified || null,
                        bytes: await blobToBase64(value)
                    });
                }

                const payload = {
                    exportedAt: new Date().toISOString(),
                    data: {
                        transcripts,
                        transcriptFolders,
                        tags,
                        globalArtifacts,
                        activityTypes,
                        participants,
                        analysisCanvases,
                        triangulationSessions,
                        triangulationAssignmentMeta
                    },
                    files: serializedFiles,
                    security: {
                        appPin: localStorage.getItem('quali_pin') || null,
                        participantPinHash: localStorage.getItem(participantPinKey) || null
                    }
                };

                const encrypted = await encryptPayload(payload, backupPassword);
                const blob = new Blob([JSON.stringify(encrypted, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `QualiApp_Backup_${new Date().toISOString().slice(0, 10)}.qbk`;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            const handleRestoreUpload = async (file, backupPassword) => {
                const text = await file.text();
                const encrypted = JSON.parse(text);
                const payload = await decryptPayload(encrypted, backupPassword);

                const d = payload.data || {};
                setTranscripts(d.transcripts || []);
                setTranscriptFolders(d.transcriptFolders || []);
                setTags(d.tags || []);
                setGlobalArtifacts(d.globalArtifacts || []);
                setActivityTypes(d.activityTypes || ['Edited', 'First Review', 'Coded', 'Member Checked']);
                setParticipants(d.participants || []);
                setAnalysisCanvases(d.analysisCanvases || []);
                setTriangulationSessions(d.triangulationSessions || []);
                setTriangulationAssignmentMeta(d.triangulationAssignmentMeta || null);
                setActiveId(null);
                setView('dashboard');
                setStartupState('open');

                await dbClear('files');
                for (const f of (payload.files || [])) {
                    const bytes = fromBase64(f.bytes);
                    const blob = f.name
                        ? new File([bytes], f.name, { type: f.type || 'application/octet-stream', lastModified: f.lastModified || Date.now() })
                        : new Blob([bytes], { type: f.type || 'application/octet-stream' });
                    await dbSet('files', f.key, blob);
                }

                if (payload.security) {
                    if (payload.security.appPin) localStorage.setItem('quali_pin', payload.security.appPin);
                    if (payload.security.participantPinHash) localStorage.setItem(participantPinKey, payload.security.participantPinHash);
                    setHasAppPassword(!!localStorage.getItem('quali_pin'));
                }
            };

            const handleSetAppPassword = (password) => {
                localStorage.setItem('quali_pin', btoa(password));
                setHasAppPassword(true);
                alert('App password saved.');
            };

            const computeProjectFingerprint = async () => {
                const stable = {
                    transcripts: transcripts.map(t => ({ id: t.id, title: t.title, folder: t.folder, content: t.content || '' })),
                    artifacts: globalArtifacts.map(a => ({ id: a.id, name: a.name, folder: a.folder || '', notes: a.notes || '' })),
                    participants: participants.map(p => ({ id: p.id, pseudonym: p.pseudonym || '' }))
                };
                return stringHash(JSON.stringify(stable));
            };

            const handleExportTriangulationAssignment = async () => {
                try {
                    const fileEntries = await dbGetAllEntries('files');
                    const serializedFiles = [];
                    for (const entry of fileEntries) {
                        const value = entry.value;
                        if (!(value instanceof Blob)) continue;
                        serializedFiles.push({
                            key: String(entry.key),
                            type: value.type || 'application/octet-stream',
                            name: value.name || null,
                            lastModified: value.lastModified || null,
                            bytes: await blobToBase64(value)
                        });
                    }

                    const packageId = `tri_${Date.now()}`;
                    const fingerprint = await computeProjectFingerprint();
                    const sanitizedParticipants = participants.map(p => ({ id: p.id, pseudonym: p.pseudonym || `P-${String(p.id).slice(-4)}` }));
                    const sanitizedArtifacts = globalArtifacts.map(a => ({ ...a, codes: [] }));
                    const payload = {
                        type: 'triangulation-assignment',
                        version: 1,
                        packageId,
                        createdAt: new Date().toISOString(),
                        projectFingerprint: fingerprint,
                        data: {
                            transcripts,
                            transcriptFolders,
                            tags: [],
                            globalArtifacts: sanitizedArtifacts,
                            activityTypes,
                            participants: sanitizedParticipants,
                            analysisCanvases: []
                        },
                        files: serializedFiles
                    };

                    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `QualiApp_Triangulation_Assignment_${new Date().toISOString().slice(0, 10)}.qtri`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                } catch (err) {
                    alert('Failed to export triangulation assignment package.');
                }
            };

            const handleImportTriangulationAssignment = async (file) => {
                const text = await file.text();
                const payload = JSON.parse(text);
                if (payload.type !== 'triangulation-assignment') throw new Error('Invalid assignment package');

                const d = payload.data || {};
                setTranscripts(d.transcripts || []);
                setTranscriptFolders(d.transcriptFolders || []);
                setTags(d.tags || []);
                setGlobalArtifacts(d.globalArtifacts || []);
                setActivityTypes(d.activityTypes || ['Edited', 'First Review', 'Coded', 'Member Checked']);
                setParticipants(d.participants || []);
                setAnalysisCanvases(d.analysisCanvases || []);
                setTriangulationSessions([]);
                setTriangulationAssignmentMeta({
                    packageId: payload.packageId,
                    projectFingerprint: payload.projectFingerprint,
                    importedAt: new Date().toISOString()
                });
                setActiveId(null);
                setView('dashboard');
                setStartupState('open');

                await dbClear('files');
                for (const f of (payload.files || [])) {
                    const bytes = fromBase64(f.bytes);
                    const blob = f.name
                        ? new File([bytes], f.name, { type: f.type || 'application/octet-stream', lastModified: f.lastModified || Date.now() })
                        : new Blob([bytes], { type: f.type || 'application/octet-stream' });
                    await dbSet('files', f.key, blob);
                }
            };

            const handleExportTriangulationReturn = async (coderId) => {
                if (!triangulationAssignmentMeta?.packageId) {
                    alert('Import a triangulation assignment package first.');
                    return;
                }

                const artifactCodes = globalArtifacts.map(a => ({ artifactId: a.id, artifactName: a.name, codes: a.codes || [] }));
                const payload = {
                    type: 'triangulation-return',
                    version: 1,
                    packageId: triangulationAssignmentMeta.packageId,
                    projectFingerprint: triangulationAssignmentMeta.projectFingerprint,
                    coderId: coderId.trim(),
                    createdAt: new Date().toISOString(),
                    tags,
                    artifactCodes,
                    analysisCanvases
                };

                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `QualiApp_Triangulation_Return_${coderId.trim().replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.qtrr`;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            const handleImportTriangulationReturn = async (file) => {
                const text = await file.text();
                const payload = JSON.parse(text);
                if (payload.type !== 'triangulation-return') throw new Error('Invalid co-rater return package');
                if (!payload.coderId) throw new Error('Missing coder id');

                const currentFingerprint = await computeProjectFingerprint();
                if (payload.projectFingerprint && payload.projectFingerprint !== currentFingerprint) {
                    const proceed = confirm('Project fingerprint differs from this workspace. Import anyway?');
                    if (!proceed) return;
                }

                const duplicate = triangulationSessions.some(s => s.packageId === payload.packageId && s.coderId === payload.coderId);
                if (duplicate) {
                    alert('This co-rater submission is already imported.');
                    return;
                }

                const session = {
                    id: `session_${Date.now()}`,
                    coderId: payload.coderId,
                    packageId: payload.packageId || null,
                    projectFingerprint: payload.projectFingerprint || null,
                    importedAt: new Date().toISOString(),
                    tags: payload.tags || [],
                    artifactCodes: payload.artifactCodes || [],
                    analysisCanvases: payload.analysisCanvases || []
                };
                setTriangulationSessions([session, ...triangulationSessions]);
            };

            const handleDownloadApp = async () => {
                try {
                    const appUrl = new URL('./index.html', window.location.href).toString();
                    const res = await fetch(appUrl, { cache: 'no-store' });
                    if (!res.ok) throw new Error('Failed to fetch app file');
                    const html = await res.text();
                    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'QualiApp.html';
                    a.click();
                    URL.revokeObjectURL(a.href);
                } catch (err) {
                    alert('Unable to download app file from this location. If opened via file://, use your file manager to copy index.html directly.');
                }
            };

            if (startupState === 'checking') return <div className="flex h-screen items-center justify-center">Loading...</div>;
            if (startupState === 'welcome') return <WelcomeScreen hasPassword={hasAppPassword} onSetPassword={handleSetAppPassword} onStartNew={() => setStartupState('open')} onRestoreExisting={() => { setStartupState('open'); setView('backup'); }} />;
            if (startupState === 'locked') return <LockScreen onUnlock={() => setStartupState('open')} />;
            if (!isReady) return <div className="flex h-screen items-center justify-center">Loading...</div>;

            return (
                <div className="flex h-screen bg-hero relative">
                    <aside className="w-72 bg-ink text-slate-200 flex flex-col shadow-soft z-10">
                        <div className="p-6 border-b border-slate-700/60">
                            <h1 className="text-3xl font-display text-white leading-none">QualiApp</h1>
                            <p className="text-xs mt-2 text-slate-400">Offline Qualitative Studio</p>
                        </div>
                        <nav className="flex-1 px-4 py-4 space-y-2 text-sm">
                            <NavButton active={view === 'dashboard'} label="Transcripts" onClick={() => setView('dashboard')} />
                            <NavButton active={view === 'artifacts'} label="Project Artifacts" onClick={() => setView('artifacts')} />
                            <NavButton active={view === 'participants'} label="Participant Coding" onClick={() => setView('participants')} />
                            <NavButton active={view === 'analysis'} label="Analysis Canvas" onClick={() => setView('analysis')} />
                            <NavButton active={view === 'codebook'} label="Codebook" onClick={() => setView('codebook')} />
                            <NavButton active={view === 'triangulation'} label="Triangulation" onClick={() => setView('triangulation')} />
                            <NavButton active={view === 'backup'} label="Backup & Restore" onClick={() => setView('backup')} />
                        </nav>
                        <div className="p-4 border-t border-slate-700/60 space-y-2">
                            {hasAppPassword ? (
                                <button onClick={() => setStartupState('locked')} className="w-full bg-slate-800 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">Lock App</button>
                            ) : (
                                <button onClick={() => {
                                    const p = prompt('Set an app password (min 4 chars):', '');
                                    if (p && p.length >= 4) handleSetAppPassword(p);
                                }} className="w-full bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">Set App Password</button>
                            )}
                        </div>
                    </aside>

                    <main className="flex-1 overflow-hidden flex flex-col relative">
                        {view === 'dashboard' && (
                            <Dashboard
                                transcripts={transcripts}
                                folders={folders}
                                onDownloadApp={handleDownloadApp}
                                onCreate={handleCreateTranscript}
                                onCreateFolder={handleCreateFolder}
                                onRenameFolder={handleRenameFolder}
                                onDeleteFolder={handleDeleteFolder}
                                onMoveTranscript={handleMoveTranscriptToFolder}
                                onRenameTranscript={handleRenameTranscript}
                                onOpen={(id) => { setActiveId(id); setView('editor'); }}
                                onDelete={handleDeleteTranscript}
                                participants={participants}
                            />
                        )}
                        {view === 'artifacts' && <ArtifactDashboard artifacts={globalArtifacts} onUpdate={setGlobalArtifacts} />}
                        {view === 'participants' && <ParticipantVault participants={participants} onUpdate={setParticipants} />}
                        {view === 'analysis' && <AnalysisBoard tags={tags} canvases={analysisCanvases} onUpdate={setAnalysisCanvases} artifacts={globalArtifacts} transcripts={transcripts} participants={participants} />}
                        {view === 'triangulation' && (
                            <TriangulationDashboard
                                transcripts={transcripts}
                                tags={tags}
                                artifacts={globalArtifacts}
                                analysisCanvases={analysisCanvases}
                                sessions={triangulationSessions}
                                assignmentMeta={triangulationAssignmentMeta}
                                onExportAssignment={handleExportTriangulationAssignment}
                                onImportAssignment={handleImportTriangulationAssignment}
                                onExportReturn={handleExportTriangulationReturn}
                                onImportReturn={handleImportTriangulationReturn}
                            />
                        )}
                        {view === 'backup' && <BackupDashboard onBackup={handleBackupDownload} onRestore={handleRestoreUpload} />}
                        {view === 'editor' && activeTranscript && (
                            <Editor
                                transcript={activeTranscript}
                                tags={tags.filter(t => t.transcriptId === activeTranscript.id)}
                                allTags={tags}
                                activityTypes={activityTypes}
                                onAddActivityType={(newType) => !activityTypes.includes(newType) && setActivityTypes([...activityTypes, newType])}
                                onBack={() => setView('dashboard')}
                                onUpdateTranscript={(updated) => setTranscripts(transcripts.map(t => t.id === updated.id ? updated : t))}
                                onAddTag={(tag) => setTags([...tags, tag])}
                                onUpdateTag={(updatedTag) => setTags(tags.map(t => t.id === updatedTag.id ? updatedTag : t))}
                                onRemoveTag={(tagId) => setTags(tags.filter(t => t.id !== tagId))}
                            />
                        )}
                        {view === 'codebook' && <Codebook tags={tags} transcripts={transcripts} participants={participants} artifacts={globalArtifacts} />}
                    </main>
                </div>
            );
        }

        function NavButton({ active, label, onClick }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full text-left px-4 py-3 rounded-xl transition font-medium ${active ? 'bg-tide text-white shadow' : 'hover:bg-slate-800 text-slate-200'}`}
                >
                    {label}
                </button>
            );
        }

        function BackupDashboard({ onBackup, onRestore }) {
            const [backupPassword, setBackupPassword] = useState('');
            const [restorePassword, setRestorePassword] = useState('');
            const [restoreFile, setRestoreFile] = useState(null);
            const [message, setMessage] = useState('');

            const backupNow = async () => {
                if (backupPassword.length < 6) return setMessage('Backup password must be at least 6 characters.');
                await onBackup(backupPassword);
                setMessage('Encrypted backup downloaded. Keep the password safe.');
                setBackupPassword('');
            };

            const restoreNow = async () => {
                if (!restoreFile) return setMessage('Choose a backup file first.');
                if (!restorePassword) return setMessage('Enter backup password.');
                try {
                    await onRestore(restoreFile, restorePassword);
                    setMessage('Backup restored successfully.');
                    setRestorePassword('');
                    setRestoreFile(null);
                } catch (err) {
                    setMessage('Restore failed. Wrong password or invalid backup file.');
                }
            };

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-4xl mx-auto space-y-6 pt-2">
                        <div className="bg-white border rounded-2xl p-7 shadow-soft">
                            <h2 className="text-4xl font-display">Backup & Restore</h2>
                            <p className="text-slate-500 mt-2">Create encrypted password-protected backups of your entire QualiApp instance, including all transcripts, codes, participants, artifacts, and media files.</p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            <div className="bg-white border rounded-2xl p-6 shadow-soft space-y-4">
                                <div>
                                    <h3 className="text-xl font-bold text-ink mb-2">Download Encrypted Backup</h3>
                                    <p className="text-sm text-slate-500 mb-4">Creates a .qbk file with all your data encrypted with AES-256-GCM. Store securely.</p>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-2">Backup Password (min 6 chars)</label>
                                    <input type="password" value={backupPassword} onChange={e => setBackupPassword(e.target.value)} placeholder="Enter a strong backup password" className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-tide" />
                                </div>
                                <button onClick={backupNow} className="w-full bg-tide hover:bg-teal-600 text-white px-4 py-3 rounded-lg font-bold transition">Download .qbk Backup</button>
                            </div>

                            <div className="bg-white border rounded-2xl p-6 shadow-soft space-y-4">
                                <div>
                                    <h3 className="text-xl font-bold text-ink mb-2">Restore from Backup</h3>
                                    <p className="text-sm text-slate-500 mb-4">Upload a previously downloaded .qbk file to restore a complete instance snapshot with all data and passwords.</p>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-2">Select Backup File</label>
                                    <input type="file" accept=".qbk,.json" onChange={e => setRestoreFile(e.target.files[0] || null)} className="w-full text-sm border rounded-lg p-3" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-2">Backup Password</label>
                                    <input type="password" value={restorePassword} onChange={e => setRestorePassword(e.target.value)} placeholder="Enter the backup password" className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ember" />
                                </div>
                                <button onClick={restoreNow} className="w-full bg-ember hover:bg-orange-700 text-white px-4 py-3 rounded-lg font-bold transition">Restore Instance</button>
                            </div>
                        </div>

                        {message && (
                            <div className={`p-4 rounded-2xl border ${message.includes('failed') || message.includes('Wrong') ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'}`}>
                                <p className="font-semibold">{message}</p>
                            </div>
                        )}

                        <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6">
                            <h4 className="font-bold text-blue-900 mb-2">Security & Privacy</h4>
                            <ul className="text-sm text-blue-800 space-y-1 list-disc list-inside">
                                <li>All backups are encrypted locally in your browser using AES-256-GCM</li>
                                <li>Backup passwords are never sent to any server</li>
                                <li>You control the backup password completely</li>
                                <li>Restore works without any network connection</li>
                                <li>Application and participant passwords are included in encrypted form</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        }

        function Dashboard({ transcripts, folders, onDownloadApp, onCreate, onCreateFolder, onRenameFolder, onDeleteFolder, onMoveTranscript, onRenameTranscript, onOpen, onDelete, participants }) {
            const [showModal, setShowModal] = useState(false);
            const [title, setTitle] = useState('');
            const [folder, setFolder] = useState('');
            const [audioFile, setAudioFile] = useState(null);
            const [selectedParticipantId, setSelectedParticipantId] = useState('');
            const [showParticipantInfo, setShowParticipantInfo] = useState(false);
            const [newFolderName, setNewFolderName] = useState('');
            const [selectedFolder, setSelectedFolder] = useState('All');
            const [dragTranscriptId, setDragTranscriptId] = useState(null);
            const [hoverFolder, setHoverFolder] = useState('');
            const [editingTitleId, setEditingTitleId] = useState(null);
            const [editingTitle, setEditingTitle] = useState('');
            const [editingFolderName, setEditingFolderName] = useState(null);
            const [editingFolderValue, setEditingFolderValue] = useState('');
            const [moveToast, setMoveToast] = useState('');

            const folderList = ['Uncategorized', ...folders.filter(f => f !== 'Uncategorized')];
            const folderCounts = transcripts.reduce((acc, t) => {
                const name = t.folder || 'Uncategorized';
                acc[name] = (acc[name] || 0) + 1;
                return acc;
            }, {});
            const visibleTranscripts = selectedFolder === 'All'
                ? transcripts
                : transcripts.filter(t => (t.folder || 'Uncategorized') === selectedFolder);

            useEffect(() => {
                if (selectedFolder === 'All') return;
                if (!folderList.includes(selectedFolder)) setSelectedFolder('All');
            }, [selectedFolder, folderList]);

            useEffect(() => {
                if (!moveToast) return;
                const timer = setTimeout(() => setMoveToast(''), 1800);
                return () => clearTimeout(timer);
            }, [moveToast]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title.trim()) return;
                onCreate({ title: title.trim(), folder, audioFile, participantId: selectedParticipantId || null });
                setShowModal(false);
                setTitle('');
                setFolder('');
                setAudioFile(null);
                setSelectedParticipantId('');
                setShowParticipantInfo(false);
            };

            const handleCreateFolder = () => {
                if (!newFolderName.trim()) return;
                onCreateFolder(newFolderName.trim());
                setSelectedFolder(newFolderName.trim());
                setNewFolderName('');
            };

            const startRenameFolder = (folderName) => {
                setEditingFolderName(folderName);
                setEditingFolderValue(folderName);
            };

            const saveRenameFolder = () => {
                if (!editingFolderName) return;
                const oldName = editingFolderName;
                const newName = editingFolderValue.trim();
                onRenameFolder(oldName, newName);
                if (selectedFolder === oldName && newName) setSelectedFolder(newName);
                setEditingFolderName(null);
                setEditingFolderValue('');
            };

            const cancelRenameFolder = () => {
                setEditingFolderName(null);
                setEditingFolderValue('');
            };

            const saveTitleEdit = () => {
                if (!editingTitleId) return;
                onRenameTranscript(editingTitleId, editingTitle);
                setEditingTitleId(null);
                setEditingTitle('');
            };

            const showMoveToast = (transcriptId, targetFolder) => {
                const moved = transcripts.find(t => t.id === transcriptId);
                const target = targetFolder || 'Uncategorized';
                setMoveToast(`${moved?.title || 'Transcript'} moved to ${target}`);
            };

            const handleQuickMove = (transcriptId, targetFolder) => {
                if (!targetFolder) return;
                const current = (transcripts.find(t => t.id === transcriptId)?.folder) || 'Uncategorized';
                if (current === targetFolder) return;
                onMoveTranscript(transcriptId, targetFolder);
                showMoveToast(transcriptId, targetFolder);
            };

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-7xl mx-auto pt-2 space-y-8">
                        <section className="bg-white/90 border rounded-2xl p-7 shadow-soft">
                            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                                <div>
                                    <h2 className="text-4xl font-display">Transcript Workspace</h2>
                                    <p className="text-slate-500 mt-1">Drag transcript cards into the folder sidebar. Rename titles and manage folders inline.</p>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={onDownloadApp} className="bg-white hover:bg-slate-50 border border-slate-300 text-slate-700 px-5 py-3 rounded-xl shadow font-semibold">Download App</button>
                                    <button onClick={() => setShowModal(true)} className="bg-tide hover:bg-teal-600 text-white px-5 py-3 rounded-xl shadow font-semibold">New Transcript</button>
                                </div>
                            </div>
                        </section>

                        <section className="grid lg:grid-cols-[320px,1fr] gap-6 items-start">
                            <aside className="bg-white/90 border rounded-2xl p-4 shadow-soft space-y-4 lg:sticky lg:top-6">
                                <div className="space-y-2">
                                    <p className="text-xs uppercase tracking-wider font-bold text-slate-500">Folders</p>
                                    <div className="flex gap-2">
                                        <input
                                            value={newFolderName}
                                            onChange={e => setNewFolderName(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && handleCreateFolder()}
                                            className="flex-1 border border-slate-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-tide"
                                            placeholder="New folder"
                                        />
                                        <button onClick={handleCreateFolder} className="bg-ink hover:bg-slate-800 text-white px-3 py-2 rounded-lg text-sm font-semibold">Add</button>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <button
                                        onClick={() => setSelectedFolder('All')}
                                        className={`w-full text-left px-3 py-2.5 rounded-lg border text-sm font-semibold transition ${selectedFolder === 'All' ? 'bg-ink text-white border-ink' : 'bg-white text-slate-700 border-slate-300 hover:border-slate-400'}`}
                                    >
                                        All Transcripts ({transcripts.length})
                                    </button>

                                    {folderList.map(folderName => (
                                        <div
                                            key={folderName}
                                            onDragOver={(e) => {
                                                e.preventDefault();
                                                setHoverFolder(folderName);
                                            }}
                                            onDragLeave={() => setHoverFolder('')}
                                            onDrop={(e) => {
                                                e.preventDefault();
                                                if (dragTranscriptId) {
                                                    onMoveTranscript(dragTranscriptId, folderName);
                                                    showMoveToast(dragTranscriptId, folderName);
                                                }
                                                setHoverFolder('');
                                                setDragTranscriptId(null);
                                            }}
                                            className={`rounded-lg border p-2 transition ${hoverFolder === folderName ? 'border-ember ring-2 ring-ember/30' : 'border-slate-200'}`}
                                        >
                                            {editingFolderName === folderName ? (
                                                <div className="space-y-2">
                                                    <input
                                                        autoFocus
                                                        value={editingFolderValue}
                                                        onChange={e => setEditingFolderValue(e.target.value)}
                                                        onKeyDown={(e) => {
                                                            if (e.key === 'Enter') {
                                                                e.preventDefault();
                                                                saveRenameFolder();
                                                            }
                                                            if (e.key === 'Escape') cancelRenameFolder();
                                                        }}
                                                        className="w-full border border-slate-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-tide"
                                                    />
                                                    <div className="flex gap-2 justify-end">
                                                        <button onClick={cancelRenameFolder} className="px-2 py-1 rounded bg-slate-100 text-slate-700 text-xs">Cancel</button>
                                                        <button onClick={saveRenameFolder} className="px-2 py-1 rounded bg-tide text-white text-xs">Save</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex items-center gap-2">
                                                    <button
                                                        onClick={() => setSelectedFolder(folderName)}
                                                        className={`flex-1 text-left px-2 py-1.5 rounded text-sm font-semibold transition ${selectedFolder === folderName ? 'bg-tide text-white' : 'text-slate-700 hover:bg-slate-100'}`}
                                                    >
                                                        {folderName} ({folderCounts[folderName] || 0})
                                                    </button>
                                                    {folderName !== 'Uncategorized' && (
                                                        <>
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    startRenameFolder(folderName);
                                                                }}
                                                                className="text-slate-400 hover:text-tide text-xs px-1"
                                                                title="Rename folder"
                                                            >
                                                                Rename
                                                            </button>
                                                            <button
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    onDeleteFolder(folderName);
                                                                }}
                                                                className="text-slate-400 hover:text-red-500 text-xs px-1"
                                                                title="Delete folder"
                                                            >
                                                                Delete
                                                            </button>
                                                        </>
                                                    )}
                                                </div>
                                            )}
                                            {hoverFolder === folderName && dragTranscriptId && (
                                                <p className="mt-2 text-[11px] font-semibold text-ember">Drop here to move transcript</p>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <p className="text-xs text-slate-500">Drag a transcript card from the right and drop it onto a folder here.</p>
                            </aside>

                            <div>
                                {visibleTranscripts.length === 0 ? (
                                    <div className="text-center py-20 bg-white rounded-2xl border border-dashed text-slate-500">No transcripts in this view.</div>
                                ) : (
                                    <section className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                                        {visibleTranscripts.map(t => (
                                            <article
                                                key={t.id}
                                                draggable
                                                onDragStart={() => setDragTranscriptId(t.id)}
                                                onDragEnd={() => {
                                                    setDragTranscriptId(null);
                                                    setHoverFolder('');
                                                }}
                                                className="bg-white p-5 rounded-xl border shadow-sm cursor-pointer relative group transition hover:border-tide"
                                                onClick={() => editingTitleId !== t.id && onOpen(t.id)}
                                            >
                                                <div className="pr-12">
                                                    {editingTitleId === t.id ? (
                                                        <div className="space-y-2">
                                                            <input
                                                                autoFocus
                                                                value={editingTitle}
                                                                onChange={e => setEditingTitle(e.target.value)}
                                                                onClick={(e) => e.stopPropagation()}
                                                                onKeyDown={(e) => {
                                                                    if (e.key === 'Enter') {
                                                                        e.preventDefault();
                                                                        saveTitleEdit();
                                                                    }
                                                                    if (e.key === 'Escape') {
                                                                        setEditingTitleId(null);
                                                                        setEditingTitle('');
                                                                    }
                                                                }}
                                                                className="w-full border border-slate-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-tide"
                                                            />
                                                            <div className="flex gap-2">
                                                                <button onClick={(e) => { e.stopPropagation(); saveTitleEdit(); }} className="px-2 py-1 bg-tide text-white text-xs rounded">Save</button>
                                                                <button onClick={(e) => { e.stopPropagation(); setEditingTitleId(null); setEditingTitle(''); }} className="px-2 py-1 bg-slate-100 text-slate-700 text-xs rounded">Cancel</button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <>
                                                            <h5 className="font-semibold text-lg">{t.title}</h5>
                                                            <p className="text-xs text-slate-500 mt-1">Folder: {t.folder || 'Uncategorized'}</p>
                                                        </>
                                                    )}
                                                </div>
                                                <p className="text-sm text-slate-500 mt-2">{t.content ? `${t.content.trim().split(/\s+/).length} words` : 'Empty transcript'}</p>
                                                <div className="mt-3 flex flex-wrap gap-2">

                    {showModal && (

                                    <label className="block text-sm font-semibold text-slate-600 mb-1">Folder</label>

                                    <datalist id="folder_list">{folderList.map(f => <option key={f} value={f} />)}</datalist>
                                </div>

                                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg">
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Link Participant (Optional)</label>
                                    <select value={selectedParticipantId} onChange={e => setSelectedParticipantId(e.target.value)} className="w-full text-sm border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-tide">
                                        <option value="">Select a participant or leave blank</option>
                                        {participants.map(p => (
                                            <option key={p.id} value={p.id}>{p.pseudonym}</option>

                                            {showParticipantInfo ? 'Hide Info' : 'Show Info'}
                                        </button>
                                    )}
                                    {showParticipantInfo && selectedParticipantId && (() => {
                                        const p = participants.find(x => x.id === selectedParticipantId);
                                        return p ? (
                                            <div className="mt-3 p-3 bg-white border border-slate-200 rounded text-sm space-y-1">
                                                <p><span className="font-semibold">Code:</span> {p.pseudonym}</p>
                                                <p><span className="font-semibold">Name:</span> {p.actualName || 'Not provided'}</p>
                                                <p><span className="font-semibold">Interview Date:</span> {p.interviewDate || 'Not set'}</p>
                                                <p><span className="font-semibold">Notes:</span> {p.notes || 'None'}</p>

                                </div>

                                <div className="flex justify-end gap-3 pt-2">
                                    <button type="button" onClick={() => setShowModal(false)} className="px-5 py-2.5 bg-slate-100 text-slate-600 font-medium rounded-lg hover:bg-slate-200">Cancel</button>

                    )}

                    {moveToast && (
                        <div className="fixed bottom-6 right-6 z-50 pointer-events-none">
                            <div className="bg-ink text-white px-4 py-2.5 rounded-xl shadow-soft text-sm font-semibold border border-slate-700/60">
                                {moveToast}
