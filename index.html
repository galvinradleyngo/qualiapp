<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualiApp - Strict Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- 1. DATABASE (IndexedDB) ---
        const dbName = 'QualiMacDB_v6';
        const openDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('data')) db.createObjectStore('data');
                if (!db.objectStoreNames.contains('files')) db.createObjectStore('files');
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });

        const dbGet = async (store, key) => {
            const db = await openDB();
            return new Promise((res) => {
                const req = db.transaction(store).objectStore(store).get(key);
                req.onsuccess = () => res(req.result);
            });
        };

        const dbSet = async (store, key, val) => {
            const db = await openDB();
            return new Promise((res) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).put(val, key);
                req.onsuccess = () => res();
            });
        };

        const dbDelete = async (store, key) => {
            const db = await openDB();
            return new Promise((res) => {
                const req = db.transaction(store, 'readwrite').objectStore(store).delete(key);
                req.onsuccess = () => res();
            });
        };

        // --- 2. AUTHENTICATION SCREEN ---
        function LockScreen({ onUnlock }) {
            const [password, setPassword] = useState('');
            const [isSettingUp, setIsSettingUp] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem('quali_pin');
                if (!saved) setIsSettingUp(true);
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                const saved = localStorage.getItem('quali_pin');
                if (isSettingUp) {
                    if(password.length < 4) return setError("Password must be at least 4 characters.");
                    localStorage.setItem('quali_pin', btoa(password)); 
                    onUnlock();
                } else {
                    if (btoa(password) === saved) onUnlock();
                    else setError("Incorrect password.");
                }
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-slate-900 text-white">
                    <form onSubmit={handleSubmit} className="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                        <div className="text-5xl mb-4">🔒</div>
                        <h2 className="text-2xl font-bold mb-2">{isSettingUp ? "Set App Password" : "App Locked"}</h2>
                        <input type="password" autoFocus value={password} onChange={e => setPassword(e.target.value)} className="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 text-center text-xl mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••" />
                        {error && <p className="text-red-400 text-sm mb-4">{error}</p>}
                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition">{isSettingUp ? "Save & Enter" : "Unlock"}</button>
                    </form>
                </div>
            );
        }

        // --- 3. MAIN APP ---
        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [view, setView] = useState('dashboard');
            const [transcripts, setTranscripts] = useState([]);
            const [tags, setTags] = useState([]);
            const [globalArtifacts, setGlobalArtifacts] = useState([]);
            const [activityTypes, setActivityTypes] = useState(['Edited', 'First Review', 'Coded', 'Member Checked']);
            const [activeId, setActiveId] = useState(null);
            const [isReady, setIsReady] = useState(false);

            // Auto-lock timer
            useEffect(() => {
                let timeout;
                const IDLE_TIME = 20 * 60 * 1000; 
                const resetTimer = () => {
                    clearTimeout(timeout);
                    if (!isLocked) timeout = setTimeout(() => setIsLocked(true), IDLE_TIME);
                };
                window.addEventListener('mousemove', resetTimer); window.addEventListener('keydown', resetTimer);
                resetTimer();
                return () => { clearTimeout(timeout); window.removeEventListener('mousemove', resetTimer); window.removeEventListener('keydown', resetTimer); };
            }, [isLocked]);

            // Load & Save Data
            useEffect(() => {
                const loadData = async () => {
                    setTranscripts(await dbGet('data', 'transcripts') || []);
                    setTags(await dbGet('data', 'tags') || []);
                    setGlobalArtifacts(await dbGet('data', 'global_artifacts') || []);
                    const savedActivityTypes = await dbGet('data', 'activityTypes');
                    if (savedActivityTypes) setActivityTypes(savedActivityTypes);
                    setIsReady(true);
                };
                if (!isLocked) loadData();
            }, [isLocked]);

            useEffect(() => {
                if (isReady && !isLocked) {
                    dbSet('data', 'transcripts', transcripts);
                    dbSet('data', 'tags', tags);
                    dbSet('data', 'global_artifacts', globalArtifacts);
                    dbSet('data', 'activityTypes', activityTypes);
                }
            }, [transcripts, tags, globalArtifacts, activityTypes, isReady, isLocked]);

            if (isLocked) return <LockScreen onUnlock={() => setIsLocked(false)} />;
            if (!isReady) return <div className="flex h-screen items-center justify-center">Loading...</div>;

            const activeTranscript = transcripts.find(t => t.id === activeId);
            const folders = [...new Set(transcripts.map(t => t.folder).filter(Boolean))];

            const handleCreateTranscript = async (data) => {
                const newDoc = {
                    id: Date.now().toString(), 
                    title: data.title, 
                    folder: data.folder || 'Uncategorized',
                    content: '', notes: '', artifacts: [], hasAudio: !!data.audioFile, 
                    createdAt: new Date().toISOString(),
                    activityLog: [{ id: Date.now().toString(), type: 'Created', note: 'Transcript initialized', timestamp: new Date().toISOString() }]
                };
                if (data.audioFile) await dbSet('files', `audio_${newDoc.id}`, data.audioFile);
                setTranscripts([newDoc, ...transcripts]);
                setActiveId(newDoc.id); setView('editor');
            };

            const handleDeleteTranscript = async (id) => {
                if (confirm("Delete transcript and all attached files?")) {
                    const t = transcripts.find(x => x.id === id);
                    if(t) {
                        await dbDelete('files', `audio_${id}`);
                        for (let a of (t.artifacts || [])) await dbDelete('files', `artifact_${a.id}`);
                    }
                    setTranscripts(transcripts.filter(t => t.id !== id));
                    setTags(tags.filter(t => t.transcriptId !== id));
                }
            };

            const TopBar = () => (
                <div className="absolute top-4 right-6 z-50">
                    <button onClick={() => setIsLocked(true)} className="bg-slate-800 hover:bg-red-600 text-white px-4 py-2 rounded-lg shadow flex items-center gap-2 text-sm font-medium transition-colors">🔒 Lock</button>
                </div>
            );

            return (
                <div className="flex h-screen bg-slate-50 relative">
                    <div className="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-10">
                        <div className="p-6 border-b border-slate-800 mb-2">
                            <h1 className="text-2xl font-bold text-white flex items-center gap-2">🎧 QualiApp</h1>
                            <p className="text-xs mt-1 text-slate-500">Strict Offline Editon</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2">
                            <button onClick={() => setView('dashboard')} className={`w-full text-left px-4 py-3 rounded-lg ${view === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>🏠 Transcripts</button>
                            <button onClick={() => setView('artifacts')} className={`w-full text-left px-4 py-3 rounded-lg ${view === 'artifacts' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>📚 Project Artifacts</button>
                            <button onClick={() => setView('codebook')} className={`w-full text-left px-4 py-3 rounded-lg ${view === 'codebook' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>🏷️ Codebook</button>
                        </nav>
                    </div>
                    <div className="flex-1 overflow-hidden flex flex-col relative">
                        <TopBar />
                        {view === 'dashboard' && <Dashboard transcripts={transcripts} folders={folders} onCreate={handleCreateTranscript} onOpen={(id) => { setActiveId(id); setView('editor'); }} onDelete={handleDeleteTranscript} />}
                        {view === 'artifacts' && <ArtifactDashboard artifacts={globalArtifacts} onUpdate={setGlobalArtifacts} />}
                        {view === 'editor' && activeTranscript && 
                            <Editor 
                                transcript={activeTranscript} 
                                tags={tags.filter(t => t.transcriptId === activeTranscript.id)} 
                                allTags={tags} 
                                activityTypes={activityTypes}
                                onAddActivityType={(newType) => !activityTypes.includes(newType) && setActivityTypes([...activityTypes, newType])}
                                onBack={() => setView('dashboard')} 
                                onUpdateTranscript={(updated) => setTranscripts(transcripts.map(t => t.id === updated.id ? updated : t))} 
                                onAddTag={(tag) => setTags([...tags, tag])} 
                                onUpdateTag={(updatedTag) => setTags(tags.map(t => t.id === updatedTag.id ? updatedTag : t))} 
                                onRemoveTag={(tagId) => setTags(tags.filter(t => t.id !== tagId))} 
                            />
                        }
                        {view === 'codebook' && <Codebook tags={tags} transcripts={transcripts} />}
                    </div>
                </div>
            );
        }

        // --- 4. GLOBAL ARTIFACTS DASHBOARD ---
        function ArtifactDashboard({ artifacts, onUpdate }) {
            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fileId = Date.now().toString();
                await dbSet('files', `global_art_${fileId}`, file);
                const newArtifact = { id: fileId, name: file.name, type: file.type, date: new Date().toLocaleDateString() };
                onUpdate([newArtifact, ...artifacts]);
            };

            const downloadArtifact = async (art) => {
                const file = await dbGet('files', `global_art_${art.id}`);
                if (file) {
                    const url = URL.createObjectURL(file);
                    const a = document.createElement('a'); a.href = url; a.download = art.name; a.click(); URL.revokeObjectURL(url);
                }
            };

            const deleteArtifact = async (artId) => {
                if (confirm("Delete this project artifact forever?")) {
                    await dbDelete('files', `global_art_${artId}`);
                    onUpdate(artifacts.filter(a => a.id !== artId));
                }
            };

            return (
                <div className="p-8 h-full overflow-y-auto w-full max-w-5xl mx-auto pt-16">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-3xl font-bold text-slate-800">Project Artifacts</h2>
                            <p className="text-slate-500 mt-1">Store literature, IRB docs, or non-transcript materials here.</p>
                        </div>
                        <label className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-lg shadow-sm cursor-pointer transition">
                            ➕ Upload Document
                            <input type="file" className="hidden" onChange={handleFileUpload} />
                        </label>
                    </div>
                    
                    {artifacts.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-xl border border-dashed text-slate-500">No project artifacts uploaded yet.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {artifacts.map(art => (
                                <div key={art.id} className="bg-white p-5 rounded-xl border shadow-sm group">
                                    <div className="flex justify-between items-start">
                                        <div className="flex items-center gap-3 overflow-hidden cursor-pointer hover:text-purple-600" onClick={() => downloadArtifact(art)}>
                                            <span className="text-3xl">📄</span>
                                            <div>
                                                <h4 className="font-semibold text-sm truncate w-40" title={art.name}>{art.name}</h4>
                                                <p className="text-xs text-slate-400">{art.date}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => deleteArtifact(art.id)} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition p-1">🗑️</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // --- 5. TRANSCRIPT DASHBOARD ---
        function Dashboard({ transcripts, folders, onCreate, onOpen, onDelete }) {
            const [showModal, setShowModal] = useState(false);
            const [title, setTitle] = useState(''); const [folder, setFolder] = useState(''); 
            const [audioFile, setAudioFile] = useState(null);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!title.trim()) return;
                onCreate({ title, folder, audioFile });
                setShowModal(false); setTitle(''); setFolder(''); setAudioFile(null);
            };

            const grouped = transcripts.reduce((acc, curr) => {
                const f = curr.folder || 'Uncategorized';
                if (!acc[f]) acc[f] = [];
                acc[f].push(curr); return acc;
            }, {});

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-6xl mx-auto pt-4">
                        <div className="flex justify-between items-center mb-8 pr-32">
                            <h2 className="text-3xl font-bold text-slate-800">My Transcripts</h2>
                            <button onClick={() => setShowModal(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg shadow-sm">➕ New Transcript</button>
                        </div>
                        {Object.entries(grouped).length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-xl border border-dashed text-slate-500">No transcripts yet.</div>
                        ) : (
                            Object.entries(grouped).map(([folderName, items]) => (
                                <div key={folderName} className="mb-8">
                                    <h3 className="text-xl font-semibold text-slate-700 mb-4">📁 {folderName}</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        {items.map(t => (
                                            <div key={t.id} className="bg-white p-5 rounded-xl border shadow-sm cursor-pointer relative group transition hover:border-blue-300" onClick={() => onOpen(t.id)}>
                                                <h4 className="font-semibold text-lg pr-8">{t.title}</h4>
                                                <p className="text-sm text-slate-500 mt-1">📄 {t.content ? `${t.content.trim().split(/\s+/).length} words` : 'Empty'}</p>
                                                <div className="mt-3 flex flex-wrap gap-2">
                                                    {t.hasAudio && <span className="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-full">▶️ Audio</span>}
                                                    {t.notes && <span className="text-xs bg-yellow-50 text-yellow-700 px-2 py-1 rounded-full">📝 Notes</span>}
                                                    {t.activityLog && t.activityLog.length > 1 && <span className="text-xs bg-green-50 text-green-700 px-2 py-1 rounded-full">⏱️ {t.activityLog.length} Logs</span>}
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); onDelete(t.id); }} className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 bg-white p-1 rounded">🗑️</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 backdrop-blur-sm">
                            <form onSubmit={handleSubmit} className="bg-white rounded-2xl p-8 w-full max-w-md space-y-5 shadow-2xl">
                                <h3 className="text-2xl font-bold text-slate-800">Add Transcript</h3>
                                
                                <div><label className="block text-sm font-semibold text-slate-600 mb-1">Title</label><input required autoFocus value={title} onChange={e => setTitle(e.target.value)} className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Participant 01" /></div>
                                <div><label className="block text-sm font-semibold text-slate-600 mb-1">Folder / Group</label><input list="flist" value={folder} onChange={e => setFolder(e.target.value)} className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Round 1 Interviews" /><datalist id="flist">{folders.map(f => <option key={f} value={f} />)}</datalist></div>
                                
                                <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg space-y-3">
                                    <div className="pt-1"><label className="block text-xs font-semibold text-slate-500 mb-1">🎧 Attach Original Audio (Optional)</label><input type="file" accept="audio/*" onChange={e => setAudioFile(e.target.files[0])} className="w-full text-sm text-slate-600" /></div>
                                </div>

                                <div className="flex justify-end gap-3 pt-2">
                                    <button type="button" onClick={() => setShowModal(false)} className="px-5 py-2.5 bg-slate-100 text-slate-600 font-medium rounded-lg hover:bg-slate-200">Cancel</button>
                                    <button type="submit" className="px-5 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700">Create Transcript</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // --- 6. EDITOR & CATEGORIZED CODING ---
        function Editor({ transcript, tags, allTags, activityTypes, onAddActivityType, onBack, onUpdateTranscript, onAddTag, onUpdateTag, onRemoveTag }) {
            const [mode, setMode] = useState('edit'); // 'edit', 'code', 'notes', 'log'
            const [content, setContent] = useState(transcript.content || '');
            const [notes, setNotes] = useState(transcript.notes || '');
            const [audioUrl, setAudioUrl] = useState(null);
            
            const [pendingSelection, setPendingSelection] = useState(null);
            const [editingTagId, setEditingTagId] = useState(null);
            
            const [tagFormCategory, setTagFormCategory] = useState(''); 
            const [tagFormName, setTagFormName] = useState('');
            const [tagFormMemo, setTagFormMemo] = useState(''); 

            // Activity Log State
            const [logType, setLogType] = useState('');
            const [logNote, setLogNote] = useState('');
            const activityLog = transcript.activityLog || [];
            
            const textRef = useRef(null);

            useEffect(() => {
                if (transcript.hasAudio) dbGet('files', `audio_${transcript.id}`).then(b => { if (b) setAudioUrl(URL.createObjectURL(b)); });
                return () => { if (audioUrl) URL.revokeObjectURL(audioUrl); };
            }, [transcript.id]);

            const handleSave = () => onUpdateTranscript({ ...transcript, content, notes });

            // LOGGING HANDLER
            const submitActivityLog = (e) => {
                e.preventDefault();
                if (!logType.trim()) return;
                
                onAddActivityType(logType.trim());

                const newLog = {
                    id: Date.now().toString(),
                    type: logType.trim(),
                    note: logNote.trim(),
                    timestamp: new Date().toISOString()
                };

                onUpdateTranscript({ 
                    ...transcript, 
                    content, notes,
                    activityLog: [newLog, ...activityLog] 
                });

                setLogType('');
                setLogNote('');
            };

            const getSelectionOffset = (containerNode) => {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                const r = sel.getRangeAt(0);
                if (r.collapsed || !containerNode.contains(r.startContainer)) return null;
                const pre = r.cloneRange(); pre.selectNodeContents(containerNode); pre.setEnd(r.startContainer, r.startOffset);
                const start = pre.toString().length; pre.setEnd(r.endContainer, r.endOffset);
                return { start, end: pre.toString().length, text: r.toString() };
            };

            const handleMouseUp = () => {
                if (mode !== 'code' || !textRef.current || editingTagId) return;
                setTimeout(() => {
                    const offset = getSelectionOffset(textRef.current);
                    if (offset && offset.text.trim()) {
                        setPendingSelection(offset);
                        setTagFormCategory(''); setTagFormName(''); setTagFormMemo('');
                    } else {
                        setPendingSelection(null);
                    }
                }, 50);
            };

            const submitTagForm = (e) => {
                e.preventDefault();
                if (!tagFormName.trim()) return;

                if (editingTagId) {
                    const existing = tags.find(t => t.id === editingTagId);
                    onUpdateTag({ ...existing, category: tagFormCategory.trim() || 'Uncategorized', tagName: tagFormName.trim(), memo: tagFormMemo });
                    setEditingTagId(null);
                } else if (pendingSelection) {
                    onAddTag({ 
                        id: Date.now().toString(), transcriptId: transcript.id, 
                        category: tagFormCategory.trim() || 'Uncategorized', 
                        tagName: tagFormName.trim(), memo: tagFormMemo,
                        textSnippet: pendingSelection.text, start: pendingSelection.start, end: pendingSelection.end 
                    });
                    setPendingSelection(null); window.getSelection().removeAllRanges();
                }
                setTagFormCategory(''); setTagFormName(''); setTagFormMemo('');
            };

            const openEditTag = (tag) => {
                setPendingSelection(null); window.getSelection().removeAllRanges();
                setEditingTagId(tag.id);
                setTagFormCategory(tag.category); setTagFormName(tag.tagName); setTagFormMemo(tag.memo || '');
            };

            const cancelTagForm = () => {
                setPendingSelection(null); setEditingTagId(null); window.getSelection().removeAllRanges();
                setTagFormCategory(''); setTagFormName(''); setTagFormMemo('');
            };

            const renderHighlighted = () => {
                if (!tags.length) return content;
                const sorted = [...tags].sort((a, b) => a.start - b.start);
                const nodes = []; let last = 0;
                sorted.forEach((tag, i) => {
                    if (tag.start >= last) {
                        nodes.push(<span key={`t-${i}`}>{content.slice(last, tag.start)}</span>);
                        const isEditingThis = editingTagId === tag.id;
                        nodes.push(
                            <mark key={`m-${tag.id}`} 
                                onClick={() => openEditTag(tag)}
                                className={`px-1 rounded cursor-pointer transition ${isEditingThis ? 'bg-orange-400 text-white shadow-md' : 'bg-blue-200 hover:bg-blue-300'}`} 
                                title={`${tag.category} > ${tag.tagName}`}>
                                {content.slice(tag.start, tag.end)}
                            </mark>
                        );
                        last = tag.end;
                    }
                });
                nodes.push(<span key="t-end">{content.slice(last)}</span>);
                return nodes;
            };

            const existingCategories = [...new Set(allTags.map(t => t.category).filter(Boolean))];
            const existingCodes = [...new Set(allTags.map(t => t.tagName))];

            return (
                <div className="flex flex-col h-full bg-white relative">
                    {/* Top Header */}
                    <div className="border-b px-6 py-4 flex items-center justify-between bg-slate-50 shadow-sm z-10">
                        <div className="flex items-center gap-4">
                            <button onClick={() => { handleSave(); onBack(); }} className="p-2 hover:bg-slate-200 rounded-full font-bold">⬅️ Back</button>
                            <h2 className="text-xl font-bold truncate max-w-sm border-l-2 pl-4 border-slate-300" title={transcript.title}>{transcript.title}</h2>
                        </div>
                        <div className="flex bg-slate-200 p-1 rounded-lg mr-32"> 
                            <button onClick={() => {handleSave(); setMode('edit');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='edit'?'bg-white shadow-md text-yellow-700':'text-slate-600 hover:bg-slate-300'}`}>✏️ Edit Transcript</button>
                            <button onClick={() => {handleSave(); setMode('code');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='code'?'bg-blue-600 shadow-md text-white':'text-slate-600 hover:bg-slate-300'}`}>🏷️ Code</button>
                            <button onClick={() => {handleSave(); setMode('notes');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='notes'?'bg-purple-600 shadow-md text-white':'text-slate-600 hover:bg-slate-300'}`}>📝 Memos</button>
                            <button onClick={() => {handleSave(); setMode('log');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='log'?'bg-green-600 shadow-md text-white':'text-slate-600 hover:bg-slate-300'}`}>⏱️ Activity Log</button>
                        </div>
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                        <div className="flex-1 flex flex-col border-r relative bg-white">
                            {audioUrl && mode !== 'log' && (
                                <div className="p-4 border-b bg-slate-50 shadow-sm z-10 flex gap-4 items-center">
                                    <span className="text-xl">🎧</span>
                                    <audio src={audioUrl} controls className="w-full h-10 outline-none" />
                                </div>
                            )}
                            
                            <div className="flex-1 overflow-y-auto p-8 pt-4">
                                {/* INTUITIVE MODE BANNERS */}
                                {mode === 'edit' && (
                                    <div className="bg-yellow-50 border border-yellow-200 text-yellow-800 p-3 rounded-lg mb-6 flex items-center gap-3 shadow-sm">
                                        <span className="text-2xl">✏️</span>
                                        <div>
                                            <h4 className="font-bold">Edit Mode</h4>
                                            <p className="text-sm">Paste your raw transcript text here, or fix typos. Highlighting is disabled in this mode.</p>
                                        </div>
                                    </div>
                                )}
                                {mode === 'code' && (
                                    <div className="bg-blue-50 border border-blue-200 text-blue-800 p-3 rounded-lg mb-6 flex items-center gap-3 shadow-sm">
                                        <span className="text-2xl">🏷️</span>
                                        <div>
                                            <h4 className="font-bold">Coding Mode</h4>
                                            <p className="text-sm">Highlight text below to assign codes and memos. Click on existing highlights to edit them.</p>
                                        </div>
                                    </div>
                                )}
                                {mode === 'notes' && (
                                    <div className="bg-purple-50 border border-purple-200 text-purple-800 p-3 rounded-lg mb-6 flex items-center gap-3 shadow-sm">
                                        <span className="text-2xl">📝</span>
                                        <div>
                                            <h4 className="font-bold">Memo Mode</h4>
                                            <p className="text-sm">Jot down overarching ideas and context for this entire transcript.</p>
                                        </div>
                                    </div>
                                )}
                                {mode === 'log' && (
                                    <div className="bg-green-50 border border-green-200 text-green-800 p-3 rounded-lg mb-6 flex items-center gap-3 shadow-sm max-w-3xl mx-auto w-full">
                                        <span className="text-2xl">⏱️</span>
                                        <div>
                                            <h4 className="font-bold">Activity Log</h4>
                                            <p className="text-sm">Keep a record of when you review, edit, or code this specific transcript.</p>
                                        </div>
                                    </div>
                                )}

                                {/* CONTENT AREAS */}
                                {mode === 'edit' && (
                                    <textarea value={content} onChange={e => setContent(e.target.value)} onBlur={handleSave} placeholder="Paste transcript text here..." className="w-full h-full min-h-[500px] resize-none outline-none text-lg leading-relaxed text-slate-800 p-2 border-dashed border-2 border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-yellow-400 transition" />
                                )}
                                {mode === 'code' && (
                                    <div ref={textRef} onMouseUp={handleMouseUp} className="text-lg leading-relaxed whitespace-pre-wrap outline-none pb-32 font-serif text-slate-800 p-2">
                                        {content ? renderHighlighted() : <span className="text-slate-400 italic">No text found. Switch to Edit mode to paste your transcript.</span>}
                                    </div>
                                )}
                                {mode === 'notes' && (
                                    <div className="h-full flex flex-col max-w-3xl mx-auto w-full">
                                        <textarea value={notes} onChange={e => setNotes(e.target.value)} onBlur={handleSave} placeholder="Type your overarching observations, theoretical ideas, and context about this specific interview/transcript..." className="flex-1 w-full resize-none outline-none border border-purple-200 bg-white p-6 rounded-xl text-lg text-slate-800 leading-relaxed shadow-sm focus:ring-2 ring-purple-300 transition" />
                                    </div>
                                )}
                                {mode === 'log' && (
                                    <div className="flex flex-col max-w-3xl mx-auto w-full">
                                        {/* Activity Entry Form */}
                                        <form onSubmit={submitActivityLog} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm mb-8">
                                            <h3 className="font-bold text-lg text-slate-800 mb-4">Add New Activity</h3>
                                            <div className="flex flex-col md:flex-row gap-4 mb-4">
                                                <div className="w-full md:w-1/3">
                                                    <label className="block text-xs uppercase font-bold text-slate-500 mb-1">Activity Type *</label>
                                                    <input 
                                                        type="text" required
                                                        list="activityTypesList" 
                                                        value={logType} onChange={e => setLogType(e.target.value)} 
                                                        placeholder="e.g. Coded" 
                                                        className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-green-500 bg-slate-50" 
                                                    />
                                                    <datalist id="activityTypesList">
                                                        {activityTypes.map(t => <option key={t} value={t} />)}
                                                    </datalist>
                                                </div>
                                                <div className="w-full md:w-2/3">
                                                    <label className="block text-xs uppercase font-bold text-slate-500 mb-1">Details / Notes (Optional)</label>
                                                    <input 
                                                        type="text" 
                                                        value={logNote} onChange={e => setLogNote(e.target.value)} 
                                                        placeholder="e.g. Finished first pass of coding." 
                                                        className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-green-500 bg-slate-50" 
                                                    />
                                                </div>
                                            </div>
                                            <div className="flex justify-end">
                                                <button type="submit" className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition">
                                                    Log Activity
                                                </button>
                                            </div>
                                        </form>

                                        {/* Activity Timeline */}
                                        <h3 className="font-bold text-lg text-slate-800 mb-4">History</h3>
                                        <div className="relative border-l-2 border-slate-200 ml-3 space-y-6 pb-12">
                                            {activityLog.map((log) => (
                                                <div key={log.id} className="relative pl-6">
                                                    <div className="absolute w-4 h-4 bg-green-500 rounded-full -left-[9px] top-1 border-2 border-white shadow-sm"></div>
                                                    <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <span className="font-bold text-slate-800">{log.type}</span>
                                                            <span className="text-xs text-slate-400 font-medium">{new Date(log.timestamp).toLocaleString()}</span>
                                                        </div>
                                                        {log.note && <p className="text-sm text-slate-600">{log.note}</p>}
                                                    </div>
                                                </div>
                                            ))}
                                            {activityLog.length === 0 && <p className="pl-6 text-slate-400 italic">No activities logged yet.</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* RIGHT SIDEBAR FOR CODING */}
                        {mode === 'code' && (
                            <div className="w-80 bg-slate-50 flex flex-col border-l border-slate-200 shadow-inner z-20">
                                <div className="p-5 border-b bg-white shadow-sm">
                                    <h3 className="font-bold text-lg text-slate-800 mb-2">
                                        {editingTagId ? '✏️ Edit Code & Memo' : (pendingSelection ? '🏷️ Save New Code' : '📑 Document Codes')}
                                    </h3>
                                    
                                    {(pendingSelection || editingTagId) ? (
                                        <form onSubmit={submitTagForm} className={`p-4 rounded-xl border-2 ${editingTagId ? 'bg-orange-50 border-orange-300' : 'bg-blue-50 border-blue-300'}`}>
                                            <p className="text-xs text-slate-600 mb-3 line-clamp-3 italic bg-white p-2 rounded border shadow-sm">
                                                "{pendingSelection ? pendingSelection.text : tags.find(t=>t.id===editingTagId)?.textSnippet}"
                                            </p>
                                            
                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Parent Category</label>
                                            <input type="text" list="categories" value={tagFormCategory} onChange={e=>setTagFormCategory(e.target.value)} placeholder="e.g. Coping Mechanisms" className="w-full border border-slate-300 rounded p-2 text-sm mb-3 focus:ring-2 focus:ring-blue-400 outline-none shadow-sm" />
                                            <datalist id="categories">{existingCategories.map(c=><option key={c} value={c}/>)}</datalist>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Specific Code *</label>
                                            <input type="text" autoFocus list="tags" value={tagFormName} onChange={e=>setTagFormName(e.target.value)} placeholder="e.g. Humor" className="w-full border border-slate-300 rounded p-2 text-sm mb-3 focus:ring-2 focus:ring-blue-400 outline-none shadow-sm" />
                                            <datalist id="tags">{existingCodes.map(c=><option key={c} value={c}/>)}</datalist>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Code Memo (Notes on this quote)</label>
                                            <textarea value={tagFormMemo} onChange={e=>setTagFormMemo(e.target.value)} placeholder="Why is this interesting? Theoretical thoughts..." className="w-full border border-slate-300 rounded p-2 text-sm mb-4 focus:ring-2 focus:ring-blue-400 outline-none shadow-sm resize-none h-20" />

                                            <div className="flex gap-2">
                                                <button type="button" onClick={cancelTagForm} className="flex-1 py-2 bg-white border border-slate-300 text-slate-600 font-semibold rounded shadow-sm hover:bg-slate-100 transition">Cancel</button>
                                                <button type="submit" className={`flex-1 py-2 text-white font-bold rounded shadow-sm transition ${editingTagId ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                                                    {editingTagId ? 'Update' : 'Save Code'}
                                                </button>
                                            </div>
                                        </form>
                                    ) : (
                                        <p className="text-sm text-slate-500 border-2 border-dashed border-slate-300 p-4 rounded-xl text-center bg-slate-100">Highlight text in the transcript to assign a code, or click an existing highlight to edit it.</p>
                                    )}
                                </div>

                                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                    {tags.length === 0 && !pendingSelection && !editingTagId && <p className="text-center text-slate-400 text-sm mt-10">No codes yet in this document.</p>}
                                    {tags.map(tag => (
                                        <div key={tag.id} className={`bg-white p-3 rounded-lg border shadow-sm relative group transition cursor-pointer ${editingTagId === tag.id ? 'ring-2 ring-orange-400 border-orange-400' : 'hover:border-blue-400'}`} onClick={() => !editingTagId && openEditTag(tag)}>
                                            <div className="mb-1 pr-6">
                                                <span className="text-[10px] uppercase font-bold text-slate-400 block mb-0.5">{tag.category || 'Uncategorized'}</span>
                                                <span className="text-xs font-bold text-blue-800 bg-blue-100 border border-blue-200 px-2 py-0.5 rounded inline-block">{tag.tagName}</span>
                                            </div>
                                            <p className="text-xs text-slate-600 italic mt-2 line-clamp-2 bg-slate-50 p-1 rounded">"{tag.textSnippet}"</p>
                                            {tag.memo && (
                                                <div className="mt-2 border-t border-slate-100 pt-2 flex gap-1">
                                                    <span className="text-xs">📝</span>
                                                    <p className="text-[11px] text-purple-700 font-medium line-clamp-2">{tag.memo}</p>
                                                </div>
                                            )}
                                            <button onClick={(e) => { e.stopPropagation(); onRemoveTag(tag.id); }} className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 hover:text-red-500 bg-slate-100 rounded-full p-1 text-sm transition" title="Delete Code">🗑️</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {/* Placeholder for non-coding mode so layout doesn't break */}
                        {mode !== 'code' && <div className="w-80 bg-slate-100 flex flex-col justify-center items-center border-l border-slate-200 p-8 text-center text-slate-400 shadow-inner">
                            <span className="text-4xl mb-4">👀</span>
                            Switch to <strong className="text-blue-600 mx-1">Code & Analyze</strong> mode to view, edit, and add qualitative codes.
                        </div>}
                    </div>
                </div>
            );
        }

        // --- 7. CODEBOOK ---
        function Codebook({ tags, transcripts }) {
            const [searchTerm, setSearchTerm] = useState('');
            const tableData = useMemo(() => {
                return tags.map(tag => {
                    const parent = transcripts.find(t => t.id === tag.transcriptId);
                    return { ...tag, transcriptTitle: parent?.title || 'Unknown', folder: parent?.folder || 'Uncategorized', category: tag.category || 'Uncategorized' };
                }).filter(item => 
                    item.tagName.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    item.category.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    item.textSnippet.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (item.memo && item.memo.toLowerCase().includes(searchTerm.toLowerCase()))
                ).sort((a, b) => a.category.localeCompare(b.category) || a.tagName.localeCompare(b.tagName));
            }, [tags, transcripts, searchTerm]);

            const handleExportCSV = () => {
                let csvContent = '\uFEFF' + "Category,Code/Tag,Code Memo,Folder,Transcript,Highlighted Quote\n";
                tableData.forEach(r => { 
                    const memo = r.memo ? r.memo.replace(/"/g, '""').replace(/\n/g, ' ') : '';
                    csvContent += `"${r.category.replace(/"/g, '""')}","${r.tagName.replace(/"/g, '""')}","${memo}","${r.folder.replace(/"/g, '""')}","${r.transcriptTitle.replace(/"/g, '""')}","${r.textSnippet.replace(/"/g, '""').replace(/\n/g, ' ')}"\n`; 
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Codebook_Export_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            return (
                <div className="p-8 h-full overflow-y-auto bg-slate-50 flex flex-col">
                    <div className="max-w-[1400px] mx-auto w-full flex-1 flex flex-col pt-4">
                        <div className="flex justify-between items-end mb-8 bg-white p-6 rounded-2xl shadow-sm border pr-32">
                            <div>
                                <h2 className="text-3xl font-bold">🏷️ Codebook Manager</h2>
                                <p className="text-slate-500 mt-2">{tags.length} highlights across {new Set(tags.map(t => t.tagName)).size} unique codes.</p>
                            </div>
                            <button onClick={handleExportCSV} disabled={tags.length === 0} className="bg-green-600 hover:bg-green-700 disabled:bg-slate-300 text-white px-6 py-3 rounded-xl flex items-center gap-2 font-bold shadow-sm transition">⬇️ Export to Excel/CSV</button>
                        </div>
                        <input type="text" placeholder="🔍 Search categories, codes, memos, or quotes..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full max-w-lg p-3 mb-6 border rounded-xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500" />
                        
                        <div className="bg-white border rounded-2xl shadow-sm overflow-hidden flex-1 flex flex-col">
                            <div className="overflow-x-auto flex-1">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="bg-slate-50 border-b text-slate-600 uppercase text-xs tracking-wider">
                                        <th className="p-4 font-bold w-32">Category</th>
                                        <th className="p-4 font-bold w-40">Code / Tag</th>
                                        <th className="p-4 font-bold w-48">Transcript</th>
                                        <th className="p-4 font-bold">Highlighted Quote & Memo</th>
                                    </tr></thead>
                                    <tbody className="divide-y text-sm">
                                        {tableData.length === 0 ? <tr><td colSpan="4" className="p-12 text-center text-slate-400 italic">No codes match your search.</td></tr> : tableData.map((row, idx) => (
                                            <tr key={idx} className="hover:bg-slate-50 align-top">
                                                <td className="p-4 text-slate-500 font-bold uppercase text-[10px]">{row.category}</td>
                                                <td className="p-4"><span className="bg-blue-100 border border-blue-200 text-blue-800 px-3 py-1 rounded-full text-xs font-bold shadow-sm">{row.tagName}</span></td>
                                                <td className="p-4 text-slate-700">
                                                    <span className="font-bold block">{row.transcriptTitle}</span>
                                                    <span className="text-xs text-slate-400 mt-1 block">📁 {row.folder}</span>
                                                </td>
                                                <td className="p-4">
                                                    <p className="italic text-slate-700 mb-2 leading-relaxed">"{row.textSnippet}"</p>
                                                    {row.memo && (
                                                        <div className="bg-purple-50 p-3 rounded-lg border border-purple-100 mt-2">
                                                            <span className="text-[10px] uppercase font-bold text-purple-400 block mb-1">Code Memo</span>
                                                            <p className="text-sm text-purple-900">{row.memo}</p>
                                                        </div>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
