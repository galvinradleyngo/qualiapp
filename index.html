        function ArtifactDashboard({ artifacts, onUpdate }) {
            const [editingId, setEditingId] = useState(null);
            const [editNotes, setEditNotes] = useState('');
            const [editCodes, setEditCodes] = useState([]);
            const [newCodeInput, setNewCodeInput] = useState('');
            const [editingArtifactFolder, setEditingArtifactFolder] = useState('');

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fileId = Date.now().toString();
                await dbSet('files', `global_art_${fileId}`, file);
                const newArtifact = { id: fileId, name: file.name, type: file.type, date: new Date().toLocaleDateString(), notes: '', codes: [] };
                onUpdate([newArtifact, ...artifacts]);
            };

            const downloadArtifact = async (art) => {
                const file = await dbGet('files', `global_art_${art.id}`);
                if (file) {
                    const url = URL.createObjectURL(file);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = art.name;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            };

            const deleteArtifact = async (artId) => {
                if (confirm('Delete this project artifact forever?')) {
                    await dbDelete('files', `global_art_${artId}`);
                    onUpdate(artifacts.filter(a => a.id !== artId));
                }
            };

            const openEditArtifact = (art) => {
                setEditingId(art.id);
                setEditNotes(art.notes || '');
                setEditCodes(art.codes || []);
                setEditingArtifactFolder(art.folder || '');
                setNewCodeInput('');
            };

            const saveArtifactEdit = () => {
                if (!editingId) return;
                onUpdate(artifacts.map(a => a.id === editingId ? { ...a, folder: editingArtifactFolder, notes: editNotes, codes: editCodes } : a));
                setEditingId(null);
                setEditNotes('');
                setEditCodes([]);
                setEditingArtifactFolder('');
            };

            const addCodeToArtifact = () => {
                if (newCodeInput.trim() && !editCodes.includes(newCodeInput.trim())) {
                    setEditCodes([...editCodes, newCodeInput.trim()]);
                    setNewCodeInput('');
                }
            };

            const removeCodeFromArtifact = (code) => {
                setEditCodes(editCodes.filter(c => c !== code));
            };

            const setArtifactFolder = (artId, folder) => {
                onUpdate(artifacts.map(a => a.id === artId ? { ...a, folder: folder || '' } : a));
            };

            const folders = [...new Set(artifacts.map(a => a.folder).filter(Boolean))];
            const artifactsByFolder = artifacts.reduce((acc, art) => {
                const folder = art.folder || 'Uncategorized';
                if (!acc[folder]) acc[folder] = [];
                acc[folder].push(art);
                return acc;
            }, {});

            return (
                <div className="p-8 h-full overflow-y-auto w-full max-w-6xl mx-auto">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-3xl font-display text-ink">Project Artifacts</h2>
                            <p className="text-slate-500 mt-1">Store literature, IRB docs, or non-transcript materials organized by folders. Add notes and codes for analysis reference.</p>
                        </div>
                        <label className="bg-ink hover:bg-slate-800 text-white px-5 py-2.5 rounded-lg shadow-sm cursor-pointer transition">
                            Upload Document
                            <input type="file" className="hidden" onChange={handleFileUpload} />
                        </label>
                    </div>

                    <div className="bg-white border rounded-2xl p-4 shadow-soft mb-6">
                        <h3 className="font-bold text-sm mb-2">Existing Folders</h3>
                        {folders.length > 0 ? (
                            <p className="text-sm text-slate-600">{folders.join(', ')}</p>
                        ) : (
                            <p className="text-sm text-slate-400">No folders yet. Assign artifacts to folders in edit mode.</p>
                        )}
                    </div>

                    {artifacts.length === 0 ? (
                        <div className="text-center py-20 bg-white rounded-xl border border-dashed text-slate-500">No project artifacts uploaded yet.</div>
                    ) : (
                        Object.keys(artifactsByFolder).sort().map(folderName => (
                            <div key={folderName} className="mb-8">
                                <h3 className="text-xl font-bold text-ink mb-4 pb-2 border-b">📁 {folderName}</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {artifactsByFolder[folderName].map(art => (
                                <div key={art.id} className={`bg-white rounded-xl border shadow-sm transition ${editingId === art.id ? 'ring-2 ring-tide' : ''}`}>
                                    {editingId === art.id ? (
                                        <div className="p-5 space-y-4">
                                            <h4 className="font-semibold text-sm">{art.name}</h4>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1">Folder</label>
                                                <input type="text" list="folder_list" value={editingArtifactFolder} onChange={e => setEditingArtifactFolder(e.target.value)} placeholder="Create or select folder" className="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-tide outline-none" />
                                                <datalist id="folder_list">{folders.map(f => <option key={f} value={f} />)}</datalist>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1">Notes</label>
                                                <textarea value={editNotes} onChange={e => setEditNotes(e.target.value)} className="w-full border rounded-lg p-2 text-sm resize-none focus:ring-2 focus:ring-tide outline-none" rows="3" placeholder="Add notes about this artifact..." />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1">Codes</label>
                                                <div className="flex gap-2 mb-2">
                                                    <input type="text" value={newCodeInput} onChange={e => setNewCodeInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && addCodeToArtifact()} placeholder="Type code name..." className="flex-1 border rounded p-1.5 text-sm focus:ring-2 focus:ring-tide outline-none" />
                                                    <button onClick={addCodeToArtifact} className="bg-tide hover:bg-teal-600 text-white px-3 rounded text-sm font-semibold">Add</button>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    {editCodes.map(code => (
                                                        <span key={code} className="inline-flex items-center gap-1 bg-teal-100 text-teal-900 px-2 py-1 rounded text-xs">
                                                            {code}
                                                            <button onClick={() => removeCodeFromArtifact(code)} className="text-teal-700 hover:text-red-600">×</button>
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex gap-2 justify-end pt-2">
                                                <button onClick={() => setEditingId(null)} className="px-3 py-1.5 bg-slate-100 text-slate-600 rounded text-sm font-semibold hover:bg-slate-200">Cancel</button>
                                                <button onClick={saveArtifactEdit} className="px-3 py-1.5 bg-tide hover:bg-teal-600 text-white rounded text-sm font-semibold">Save</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="p-5 group">
                                            <div className="flex justify-between items-start mb-3">
                                                <div className="overflow-hidden cursor-pointer hover:text-tide flex-1" onClick={() => downloadArtifact(art)}>
                                                    <h4 className="font-semibold text-sm truncate" title={art.name}>{art.name}</h4>
                                                    <p className="text-xs text-slate-400">{art.date}</p>
                                                </div>
                                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                                    <button onClick={() => openEditArtifact(art)} className="text-slate-400 hover:text-tide p-1" title="Edit">✎</button>
                                                    <button onClick={() => deleteArtifact(art.id)} className="text-slate-400 hover:text-red-500 p-1" title="Delete">✕</button>
                                                </div>
                                            </div>
                                            {art.notes && <p className="text-xs text-slate-600 mb-2 line-clamp-2">{art.notes}</p>}
                                            {art.codes && art.codes.length > 0 && (
                                                <div className="flex flex-wrap gap-1 mt-2">
                                                    {art.codes.map(code => (
                                                        <span key={code} className="inline-block bg-teal-100 text-teal-900 px-2 py-0.5 rounded text-xs font-semibold">{code}</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                            </div>
                        ))
                    )}
                </div>
            );
        }

        function ParticipantVault({ participants, onUpdate }) {
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [isSetup, setIsSetup] = useState(false);
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const [pseudo, setPseudo] = useState('');
            const [realName, setRealName] = useState('');
            const [interviewDate, setInterviewDate] = useState('');
            const [notes, setNotes] = useState('');
            const [editingId, setEditingId] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem(participantPinKey);
                if (!saved) setIsSetup(true);
            }, []);

            const unlock = async (e) => {
                e.preventDefault();
                const mainPin = localStorage.getItem('quali_pin');
                if (isSetup) {
                    if (password.length < 4) return setError('Participant password must be at least 4 characters.');
                    if (mainPin && btoa(password) === mainPin) return setError('Use a different password from the main platform password.');
                    localStorage.setItem(participantPinKey, await stringHash(password));
                    setIsUnlocked(true);
                    return;
                }
                const savedHash = localStorage.getItem(participantPinKey);
                const inputHash = await stringHash(password);
                if (savedHash === inputHash) setIsUnlocked(true);
                else setError('Incorrect participant password.');
            };

            const startEdit = (p) => {
                setEditingId(p.id);
                setPseudo(p.pseudonym);
                setRealName(p.actualName);
                setInterviewDate(p.interviewDate);
                setNotes(p.notes);
            };

            const addOrUpdateParticipant = (e) => {
                e.preventDefault();
                if (!pseudo.trim()) return;
                
                if (editingId) {
                    onUpdate(participants.map(p => p.id === editingId ? {
                        id: editingId,
                        pseudonym: pseudo.trim(),
                        actualName: realName.trim(),
                        interviewDate,
                        notes,
                        createdAt: p.createdAt
                    } : p));
                    setEditingId(null);
                } else {
                    onUpdate([
                        {
                            id: Date.now().toString(),
                            pseudonym: pseudo.trim(),
                            actualName: realName.trim(),
                            interviewDate,
                            notes,
                            createdAt: new Date().toISOString()
                        },
                        ...participants
                    ]);
                }
                setPseudo('');
                setRealName('');
                setInterviewDate('');
                setNotes('');
            };

            const removeParticipant = (id) => {
                if (confirm('Delete participant record?')) onUpdate(participants.filter(p => p.id !== id));
            };
                const handleConsentFormUpload = async (participantId, e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const consentId = `consent_${participantId}_${Date.now()}`;
                    await dbSet('files', consentId, file);
                    onUpdate(participants.map(p => p.id === participantId ? { ...p, consentFormId: consentId, consentFileName: file.name } : p));
                    alert('Informed consent form uploaded successfully.');
                };

                const downloadConsentForm = async (participantId, fileName) => {
                    const participant = participants.find(p => p.id === participantId);
                    if (!participant || !participant.consentFormId) return;
                    const file = await dbGet('files', participant.consentFormId);
                    if (file) {
                        const url = URL.createObjectURL(file);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = fileName || 'consent_form.pdf';
                        a.click();
                        URL.revokeObjectURL(url);
                    }
                };

                const removeConsentForm = async (participantId) => {
                    const participant = participants.find(p => p.id === participantId);
                    if (participant && participant.consentFormId) {
                        if (confirm('Remove informed consent form?')) {
                            await dbDelete('files', participant.consentFormId);
                            onUpdate(participants.map(p => p.id === participantId ? { ...p, consentFormId: null, consentFileName: null } : p));
                        }
                    }
                };

            if (!isUnlocked) {
                return (
                    <div className="p-8 h-full flex items-center justify-center">
                        <form onSubmit={unlock} className="w-full max-w-md bg-white border rounded-2xl p-8 shadow-soft">
                            <h2 className="text-3xl font-display mb-2">Participant Vault</h2>
                            <p className="text-sm text-slate-500 mb-5">Protected section for participant identifiers and interview metadata.</p>
                            <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full border rounded-lg p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-ember" placeholder={isSetup ? 'Set participant password' : 'Enter participant password'} />
                            {error && <p className="text-red-500 text-sm mb-3">{error}</p>}
                            <button type="submit" className="w-full bg-ember hover:bg-orange-700 text-white py-3 rounded-lg font-semibold">{isSetup ? 'Save & Unlock' : 'Unlock Vault'}</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-6xl mx-auto space-y-6">
                        <div className="bg-white border rounded-2xl p-6 shadow-soft">
                            <h2 className="text-3xl font-display">Participant Coding</h2>
                            <p className="text-slate-500 mt-1">Store pseudonym, real participant name, interview date, and sensitive notes. Edit or delete records.</p>
                        </div>

                        <form onSubmit={addOrUpdateParticipant} className="bg-white border rounded-2xl p-6 shadow-soft space-y-4">
                            <h3 className="font-bold text-lg">{editingId ? 'Edit Participant' : 'Add New Participant'}</h3>
                            <div className="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label className="text-sm font-semibold text-slate-600">Participant Code Name / Pseudonym *</label>
                                    <input value={pseudo} onChange={e => setPseudo(e.target.value)} required className="w-full border rounded-lg p-2.5 mt-1 focus:outline-none focus:ring-2 focus:ring-tide" placeholder="P-001" />
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-slate-600">Actual Participant Name</label>
                                    <input value={realName} onChange={e => setRealName(e.target.value)} className="w-full border rounded-lg p-2.5 mt-1 focus:outline-none focus:ring-2 focus:ring-tide" placeholder="Jane Doe" />
                                </div>
                            </div>
                            <div className="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label className="text-sm font-semibold text-slate-600">Interview Date</label>
                                    <input type="date" value={interviewDate} onChange={e => setInterviewDate(e.target.value)} className="w-full border rounded-lg p-2.5 mt-1 focus:outline-none focus:ring-2 focus:ring-tide" />
                                </div>
                                <div>
                                    <label className="text-sm font-semibold text-slate-600">Notes</label>
                                    <input value={notes} onChange={e => setNotes(e.target.value)} className="w-full border rounded-lg p-2.5 mt-1 focus:outline-none focus:ring-2 focus:ring-tide" placeholder="Context, demographics, special considerations" />
                                </div>
                            </div>
                            <div className="flex justify-end gap-3 pt-2">
                                {editingId && (
                                    <button type="button" onClick={() => { setEditingId(null); setPseudo(''); setRealName(''); setInterviewDate(''); setNotes(''); }} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg font-semibold">Cancel</button>
                                )}
                                <button type="submit" className="bg-tide hover:bg-teal-600 text-white px-5 py-2.5 rounded-lg font-semibold">{editingId ? 'Update Participant' : 'Add Participant'}</button>
                            </div>
                        </form>

                        <div className="bg-white border rounded-2xl p-4 shadow-soft overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-left border-b text-slate-500 uppercase text-xs tracking-wider">
                                        <th className="p-3">Pseudonym</th>
                                        <th className="p-3">Actual Name</th>
                                        <th className="p-3">Interview Date</th>
                                            <th className="p-3">Consent Form</th>
                                        <th className="p-3">Notes</th>
                                        <th className="p-3">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {participants.length === 0 && (
                                            <tr><td colSpan="6" className="p-8 text-center text-slate-400">No participants recorded yet.</td></tr>
                                    )}
                                    {participants.map(p => (
                                        <tr key={p.id} className="border-b last:border-0 hover:bg-slate-50">
                                            <td className="p-3 font-semibold">{p.pseudonym}</td>
                                            <td className="p-3">{p.actualName || '-'}</td>
                                            <td className="p-3">{p.interviewDate || '-'}</td>
                                                <td className="p-3">
                                                    {p.consentFormId ? (
                                                        <div className="flex gap-2 text-xs">
                                                            <button onClick={() => downloadConsentForm(p.id, p.consentFileName)} className="text-blue-600 hover:text-blue-700 font-semibold">Download</button>
                                                            <button onClick={() => removeConsentForm(p.id)} className="text-red-600 hover:text-red-700 font-semibold">Remove</button>
                                                        </div>
                                                    ) : (
                                                        <label className="text-blue-600 hover:text-blue-700 font-semibold cursor-pointer text-xs">
                                                            Upload
                                                            <input type="file" accept=".pdf,.doc,.docx" onChange={e => handleConsentFormUpload(p.id, e)} className="hidden" />
                                                        </label>
                                                    )}
                                                </td>
                                            <td className="p-3 max-w-xs truncate" title={p.notes}>{p.notes || '-'}</td>
                                            <td className="p-3">
                                                <div className="flex gap-2">
                                                    <button onClick={() => startEdit(p)} className="text-blue-600 hover:text-blue-700 font-semibold text-sm">Edit</button>
                                                    <button onClick={() => removeParticipant(p.id)} className="text-red-600 hover:text-red-700 font-semibold text-sm">Delete</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function Editor({ transcript, tags, allTags, activityTypes, onAddActivityType, onBack, onUpdateTranscript, onAddTag, onUpdateTag, onRemoveTag }) {
            const [mode, setMode] = useState('edit');
            const [content, setContent] = useState(transcript.content || '');
            const [contentHtml, setContentHtml] = useState(transcript.contentHtml || '');
            const [notes, setNotes] = useState(transcript.notes || '');
            const [audioUrl, setAudioUrl] = useState(null);
            const [uploadingAudio, setUploadingAudio] = useState(false);

            const [pendingSelection, setPendingSelection] = useState(null);
            const [editingTagId, setEditingTagId] = useState(null);

            const [tagFormCategory, setTagFormCategory] = useState('');
            const [tagFormName, setTagFormName] = useState('');
            const [tagFormMemo, setTagFormMemo] = useState('');

            const [logType, setLogType] = useState('');
            const [logNote, setLogNote] = useState('');
            const activityLog = transcript.activityLog || [];

            const textRef = useRef(null);
            const editableRef = useRef(null);

            const escapeHtml = (value) => String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            const plainToHtml = (value) => escapeHtml(value).replace(/\n/g, '<br>');

            const htmlToPlain = (value) => {
                const tmp = document.createElement('div');
                tmp.innerHTML = value || '';
                return (tmp.innerText || '').replace(/\r/g, '');
            };

            useEffect(() => {
                const nextContent = transcript.content || '';
                setContent(nextContent);
                setContentHtml(transcript.contentHtml || plainToHtml(nextContent));
                setNotes(transcript.notes || '');
            }, [transcript.id]);

            useEffect(() => {
                if (!editableRef.current) return;
                if (mode !== 'edit') return;
                const expectedHtml = contentHtml || plainToHtml(content);
                if (editableRef.current.innerHTML !== expectedHtml) {
                    editableRef.current.innerHTML = expectedHtml;
                }
            }, [transcript.id, mode]);

            useEffect(() => {
                if (transcript.hasAudio) dbGet('files', `audio_${transcript.id}`).then(b => { if (b) setAudioUrl(URL.createObjectURL(b)); });
                return () => { if (audioUrl) URL.revokeObjectURL(audioUrl); };
            }, [transcript.id]);

            const handleEditableInput = () => {
                if (!editableRef.current) return;
                const html = editableRef.current.innerHTML;
                setContentHtml(html);
                setContent(htmlToPlain(html));
            };

            const handleSave = () => {
                const latestHtml = editableRef.current ? editableRef.current.innerHTML : contentHtml;
                const latestPlain = htmlToPlain(latestHtml);
                setContentHtml(latestHtml);
                setContent(latestPlain);
                onUpdateTranscript({
                    ...transcript,
                    content: latestPlain,
                    contentHtml: latestHtml,
                    notes
                });
            };

            const applyBold = () => {
                if (!editableRef.current) return;
                editableRef.current.focus();
                document.execCommand('bold', false, null);
                handleEditableInput();
            };

            const applyInterviewerTag = () => {
                if (!editableRef.current) return;
                editableRef.current.focus();

                const sel = window.getSelection();
                if (!sel || !sel.rangeCount) return;
                const range = sel.getRangeAt(0);
                if (range.collapsed) return;
                if (!editableRef.current.contains(range.commonAncestorContainer)) return;

                try {
                    const span = document.createElement('span');
                    span.className = 'qa-interviewer';
                    span.setAttribute('data-speaker-role', 'interviewer');
                    span.setAttribute('title', 'Interviewer question/comment');

                    const fragment = range.extractContents();
                    span.appendChild(fragment);
                    range.insertNode(span);

                    sel.removeAllRanges();
                    const after = document.createRange();
                    after.setStartAfter(span);
                    after.collapse(true);
                    sel.addRange(after);
                    handleEditableInput();
                } catch (_err) {
                    // If selection cannot be wrapped as a single fragment, leave text unchanged.
                }
            };

            useEffect(() => {
                const isSelectionOrFocusInsideEditor = () => {
                    const sel = window.getSelection();
                    const anchorNode = sel && sel.anchorNode;
                    const selectionInsideEditor = !!anchorNode && editableRef.current.contains(anchorNode);
                    const focusInsideEditor = editableRef.current.contains(document.activeElement);
                    return selectionInsideEditor || focusInsideEditor;
                };

                const onEditorShortcut = (e) => {
                    if (mode !== 'edit' || !editableRef.current) return;
                    if (!isSelectionOrFocusInsideEditor()) return;

                    const isBoldShortcut = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'b';
                    const isQuestionShortcut = (e.metaKey || e.ctrlKey) && (e.key === ';' || e.code === 'Semicolon');
                    if (isBoldShortcut) {
                        e.preventDefault();
                        applyBold();
                        return;
                    }
                    if (isQuestionShortcut) {
                        e.preventDefault();
                        applyInterviewerTag();
                    }
                };

                window.addEventListener('keydown', onEditorShortcut);
                return () => window.removeEventListener('keydown', onEditorShortcut);
            }, [mode]);

            const handleAudioUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadingAudio(true);
                try {
                    await dbSet('files', `audio_${transcript.id}`, file);
                    const newUrl = URL.createObjectURL(file);
                    setAudioUrl(newUrl);
                    onUpdateTranscript({ ...transcript, content, contentHtml, notes, hasAudio: true });
                } catch (err) {
                    alert('Failed to upload audio file.');
                } finally {
                    setUploadingAudio(false);
                }
            };

            const handleRemoveAudio = async () => {
                if (!confirm('Remove audio file from this transcript?')) return;
                await dbDelete('files', `audio_${transcript.id}`);
                if (audioUrl) URL.revokeObjectURL(audioUrl);
                setAudioUrl(null);
                onUpdateTranscript({ ...transcript, content, contentHtml, notes, hasAudio: false });
            };

            const submitActivityLog = (e) => {
                e.preventDefault();
                if (!logType.trim()) return;
                onAddActivityType(logType.trim());
                const newLog = {
                    id: Date.now().toString(),
                    type: logType.trim(),
                    note: logNote.trim(),
                    timestamp: new Date().toISOString()
                };
                onUpdateTranscript({ ...transcript, content, contentHtml, notes, activityLog: [newLog, ...activityLog] });
                setLogType('');
                setLogNote('');
            };

            const getSelectionOffset = (containerNode) => {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                const r = sel.getRangeAt(0);
                if (r.collapsed || !containerNode.contains(r.startContainer)) return null;
                const pre = r.cloneRange();
                pre.selectNodeContents(containerNode);
                pre.setEnd(r.startContainer, r.startOffset);
                const start = pre.toString().length;
                pre.setEnd(r.endContainer, r.endOffset);
                return { start, end: pre.toString().length, text: r.toString() };
            };

            const handleMouseUp = () => {
                if (mode !== 'code' || !textRef.current || editingTagId) return;
                setTimeout(() => {
                    const offset = getSelectionOffset(textRef.current);
                    if (offset && offset.text.trim()) {
                        setPendingSelection(offset);
                        setTagFormCategory('');
                        setTagFormName('');
                        setTagFormMemo('');
                    } else {
                        setPendingSelection(null);
                    }
                }, 40);
            };

            const submitTagForm = (e) => {
                e.preventDefault();
                if (!tagFormName.trim()) return;

                if (editingTagId) {
                    const existing = tags.find(t => t.id === editingTagId);
                    onUpdateTag({ ...existing, category: tagFormCategory.trim() || 'Uncategorized', tagName: tagFormName.trim(), memo: tagFormMemo });
                    setEditingTagId(null);
                } else if (pendingSelection) {
                    onAddTag({
                        id: Date.now().toString(),
                        transcriptId: transcript.id,
                        category: tagFormCategory.trim() || 'Uncategorized',
                        tagName: tagFormName.trim(),
                        memo: tagFormMemo,
                        textSnippet: pendingSelection.text,
                        start: pendingSelection.start,
                        end: pendingSelection.end
                    });
                    setPendingSelection(null);
                    window.getSelection().removeAllRanges();
                }
                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
            };

            const openEditTag = (tag) => {
                setPendingSelection(null);
                window.getSelection().removeAllRanges();
                setEditingTagId(tag.id);
                setTagFormCategory(tag.category);
                setTagFormName(tag.tagName);
                setTagFormMemo(tag.memo || '');
            };

            const cancelTagForm = () => {
                setPendingSelection(null);
                setEditingTagId(null);
                window.getSelection().removeAllRanges();
                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
            };

            const renderHighlightedHtml = () => {
                const baseHtml = contentHtml || plainToHtml(content);
                if (!baseHtml) return '';
                if (!tags.length) return baseHtml;

                const container = document.createElement('div');
                container.innerHTML = baseHtml;
                const sorted = [...tags]
                    .filter(t => Number.isFinite(t.start) && Number.isFinite(t.end) && t.end > t.start)
                    .sort((a, b) => a.start - b.start);

                const locateTextOffset = (target) => {
                    let seen = 0;
                    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
                    let node;
                    while ((node = walker.nextNode())) {
                        const len = node.textContent.length;
                        if (target <= seen + len) return { node, offset: Math.max(0, target - seen) };
                        seen += len;
                    }
                    return null;
                };

                sorted.forEach((tag) => {
                    const startPos = locateTextOffset(tag.start);
                    const endPos = locateTextOffset(tag.end);
                    if (!startPos || !endPos) return;

                    try {
                        const range = document.createRange();
                        range.setStart(startPos.node, startPos.offset);
                        range.setEnd(endPos.node, endPos.offset);
                        if (range.collapsed) return;

                        const mark = document.createElement('mark');
                        const isEditingThis = editingTagId === tag.id;
                        mark.setAttribute('data-tag-id', tag.id);
                        mark.setAttribute('title', `${tag.category} > ${tag.tagName}`);
                        mark.className = `px-1 rounded cursor-pointer transition ${isEditingThis ? 'bg-orange-400 text-white shadow-md' : 'bg-teal-200 hover:bg-teal-300'}`;
                        const fragment = range.extractContents();
                        mark.appendChild(fragment);
                        range.insertNode(mark);
                    } catch (_err) {
                        // Ignore malformed ranges; transcript text and highlights can be edited independently.
                    }
                });

                return container.innerHTML;
            };

            const handleCodeClick = (e) => {
                const target = e.target.closest('mark[data-tag-id]');
                if (!target) return;
                const tagId = target.getAttribute('data-tag-id');
                const tag = tags.find(t => t.id === tagId);
                if (tag) openEditTag(tag);
            };

            const existingCategories = [...new Set(allTags.map(t => t.category).filter(Boolean))];
            const existingCodes = [...new Set(allTags.map(t => t.tagName).filter(Boolean))];

            return (
                <div className="flex flex-col h-full bg-white relative">
                    <div className="border-b px-6 py-4 flex items-center justify-between bg-white z-10">
                        <div className="flex items-center gap-4">
                            <button onClick={() => { handleSave(); onBack(); }} className="p-2 hover:bg-slate-200 rounded-full font-bold">Back</button>
                            <h2 className="text-xl font-bold truncate max-w-sm border-l-2 pl-4 border-slate-300" title={transcript.title}>{transcript.title}</h2>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => {handleSave(); setMode('edit');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='edit'?'bg-amber-500 text-white':'text-slate-600 hover:bg-slate-200'}`}>Edit</button>
                            <button onClick={() => {handleSave(); setMode('code');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='code'?'bg-tide text-white':'text-slate-600 hover:bg-slate-200'}`}>Code</button>
                            <button onClick={() => {handleSave(); setMode('notes');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='notes'?'bg-ink text-white':'text-slate-600 hover:bg-slate-200'}`}>Memos</button>
                            <button onClick={() => {handleSave(); setMode('log');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='log'?'bg-emerald-600 text-white':'text-slate-600 hover:bg-slate-200'}`}>Activity</button>
                        </div>
                    </div>

                    <div className="flex-1 flex overflow-hidden">
                        <div className="flex-1 flex flex-col border-r relative bg-white">
                            {audioUrl ? (
                                <div className="p-4 border-b bg-slate-50 z-10 space-y-3">
                                    <div className="flex gap-4 items-center">
                                        <audio src={audioUrl} controls className="flex-1 h-10 outline-none" />
                                        <button onClick={handleRemoveAudio} className="px-3 py-1 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-sm font-semibold">Remove</button>
                                        <label className="px-3 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-lg text-sm font-semibold cursor-pointer">
                                            Replace
                                            <input type="file" accept="audio/*" onChange={handleAudioUpload} className="hidden" disabled={uploadingAudio} />
                                        </label>
                                    </div>
                                </div>
                            ) : (
                                <div className="p-4 border-b bg-slate-50 z-10">
                                    <label className="flex gap-4 items-center cursor-pointer hover:bg-slate-100 p-3 rounded-lg transition">
                                        <span className="text-sm font-semibold text-slate-700">
                                            {uploadingAudio ? 'Uploading audio...' : 'Click to attach audio file'}
                                        </span>
                                        <input type="file" accept="audio/*" onChange={handleAudioUpload} className="hidden" disabled={uploadingAudio} />
                                    </label>
                                </div>
                            )}

                            <div className="flex-1 overflow-y-auto p-8 pt-4">
                                {mode === 'edit' && (
                                    <div className="space-y-3">
                                        <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg p-2">
                                            <button
                                                type="button"
                                                onClick={applyBold}
                                                className="px-3 py-1.5 rounded bg-white border border-slate-300 text-slate-700 text-sm font-semibold hover:bg-slate-100"
                                                title="Bold selected text"
                                            >
                                                Bold
                                            </button>
                                            <button
                                                type="button"
                                                onClick={applyInterviewerTag}
                                                className="px-3 py-1.5 rounded bg-amber-100 border border-amber-300 text-amber-900 text-sm font-semibold hover:bg-amber-200"
                                                title="Tag selected text as interviewer question/comment"
                                            >
                                                Tag Interviewer (;)
                                            </button>
                                            <span className="text-xs text-slate-500">Use Bold or tag interviewer questions/comments. Shortcut: Cmd/Ctrl + ; for interviewer tag.</span>
                                        </div>
                                        <div
                                            ref={editableRef}
                                            contentEditable
                                            suppressContentEditableWarning
                                            onInput={handleEditableInput}
                                            onBlur={handleSave}
                                            className="w-full h-full min-h-[500px] outline-none text-lg leading-relaxed text-slate-800 p-3 border-dashed border-2 border-slate-200 rounded-xl bg-slate-50 focus-within:bg-white focus-within:border-amber-400 transition whitespace-pre-wrap"
                                        />
                                    </div>
                                )}
                                {mode === 'code' && (
                                    <div ref={textRef} onMouseUp={handleMouseUp} onClick={handleCodeClick} className="code-surface text-lg leading-relaxed whitespace-pre-wrap outline-none pb-32 text-slate-800 p-2">
                                        {content ? (
                                            <div dangerouslySetInnerHTML={{ __html: renderHighlightedHtml() }} />
                                        ) : <span className="text-slate-400 italic">No text found. Switch to Edit mode to paste your transcript.</span>}
                                    </div>
                                )}
                                {mode === 'notes' && (
                                    <div className="h-full flex flex-col max-w-3xl mx-auto w-full">
                                        <textarea value={notes} onChange={e => setNotes(e.target.value)} onBlur={handleSave} placeholder="Type overarching observations and context for this transcript..." className="flex-1 w-full resize-none outline-none border border-slate-300 bg-white p-6 rounded-xl text-lg text-slate-800 leading-relaxed shadow-sm focus:ring-2 ring-ink transition" />
                                    </div>
                                )}
                                {mode === 'log' && (
                                    <div className="flex flex-col max-w-3xl mx-auto w-full">
                                        <form onSubmit={submitActivityLog} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm mb-8">
                                            <h3 className="font-bold text-lg text-slate-800 mb-4">Add New Activity</h3>
                                            <div className="flex flex-col md:flex-row gap-4 mb-4">
                                                <div className="w-full md:w-1/3">
                                                    <label className="block text-xs uppercase font-bold text-slate-500 mb-1">Activity Type *</label>
                                                    <input type="text" required list="activityTypesList" value={logType} onChange={e => setLogType(e.target.value)} placeholder="e.g. Coded" className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" />
                                                    <datalist id="activityTypesList">{activityTypes.map(t => <option key={t} value={t} />)}</datalist>
                                                </div>
                                                <div className="w-full md:w-2/3">
                                                    <label className="block text-xs uppercase font-bold text-slate-500 mb-1">Details / Notes (Optional)</label>
                                                    <input type="text" value={logNote} onChange={e => setLogNote(e.target.value)} placeholder="e.g. Finished first pass of coding." className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" />
                                                </div>
                                            </div>
                                            <div className="flex justify-end">
                                                <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-6 rounded-lg">Log Activity</button>
                                            </div>
                                        </form>

                                        <h3 className="font-bold text-lg text-slate-800 mb-4">History</h3>
                                        <div className="relative border-l-2 border-slate-200 ml-3 space-y-6 pb-12">
                                            {activityLog.map((log) => (
                                                <div key={log.id} className="relative pl-6">
                                                    <div className="absolute w-4 h-4 bg-emerald-500 rounded-full -left-[9px] top-1 border-2 border-white shadow-sm"></div>
                                                    <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <span className="font-bold text-slate-800">{log.type}</span>
                                                            <span className="text-xs text-slate-400 font-medium">{new Date(log.timestamp).toLocaleString()}</span>
                                                        </div>
                                                        {log.note && <p className="text-sm text-slate-600">{log.note}</p>}
                                                    </div>
                                                </div>
                                            ))}
                                            {activityLog.length === 0 && <p className="pl-6 text-slate-400 italic">No activities logged yet.</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {mode === 'code' && (
                            <div className="w-96 bg-slate-50 flex flex-col border-l border-slate-200 z-20">
                                <div className="p-5 border-b bg-white">
                                    <h3 className="font-bold text-lg text-slate-800 mb-2">{editingTagId ? 'Edit Code' : (pendingSelection ? 'Save New Code' : 'Document Codes')}</h3>
                                    {(pendingSelection || editingTagId) ? (
                                        <form onSubmit={submitTagForm} className={`p-4 rounded-xl border-2 ${editingTagId ? 'bg-orange-50 border-orange-300' : 'bg-teal-50 border-teal-300'}`}>
                                            <p className="text-xs text-slate-600 mb-3 line-clamp-3 italic bg-white p-2 rounded border">"{pendingSelection ? pendingSelection.text : tags.find(t=>t.id===editingTagId)?.textSnippet}"</p>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Parent Category</label>
                                            <input type="text" list="categories" value={tagFormCategory} onChange={e=>setTagFormCategory(e.target.value)} placeholder="e.g. Coping" className="w-full border border-slate-300 rounded p-2 text-sm mb-2 focus:ring-2 focus:ring-tide outline-none" />
                                            <datalist id="categories">{existingCategories.map(c=><option key={c} value={c}/>)}</datalist>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Or Select Existing Category</label>
                                            <select value={tagFormCategory} onChange={e => setTagFormCategory(e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm mb-3 bg-white">
                                                <option value="">Select existing category</option>
                                                {existingCategories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Specific Code *</label>
                                            <input type="text" autoFocus list="tags" value={tagFormName} onChange={e=>setTagFormName(e.target.value)} placeholder="e.g. Humor" className="w-full border border-slate-300 rounded p-2 text-sm mb-2 focus:ring-2 focus:ring-tide outline-none" />
                                            <datalist id="tags">{existingCodes.map(c=><option key={c} value={c}/>)}</datalist>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Or Select Existing Code</label>
                                            <select value={tagFormName} onChange={e => setTagFormName(e.target.value)} className="w-full border border-slate-300 rounded p-2 text-sm mb-3 bg-white">
                                                <option value="">Select existing code</option>
                                                {existingCodes.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Code Memo</label>
                                            <textarea value={tagFormMemo} onChange={e=>setTagFormMemo(e.target.value)} placeholder="Why is this interesting?" className="w-full border border-slate-300 rounded p-2 text-sm mb-4 focus:ring-2 focus:ring-tide outline-none resize-none h-20" />

                                            <div className="flex gap-2">
                                                <button type="button" onClick={cancelTagForm} className="flex-1 py-2 bg-white border border-slate-300 text-slate-600 font-semibold rounded">Cancel</button>
                                                <button type="submit" className={`flex-1 py-2 text-white font-bold rounded ${editingTagId ? 'bg-orange-500 hover:bg-orange-600' : 'bg-tide hover:bg-teal-600'}`}>{editingTagId ? 'Update' : 'Save Code'}</button>
                                            </div>
                                        </form>
                                    ) : (
                                        <p className="text-sm text-slate-500 border-2 border-dashed border-slate-300 p-4 rounded-xl text-center bg-slate-100">Highlight text in the transcript to assign a code.</p>
                                    )}
                                </div>

                                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                    {tags.length === 0 && !pendingSelection && !editingTagId && <p className="text-center text-slate-400 text-sm mt-10">No codes yet in this document.</p>}
                                    {tags.map(tag => (
                                        <div key={tag.id} className={`bg-white p-3 rounded-lg border shadow-sm relative group transition cursor-pointer ${editingTagId === tag.id ? 'ring-2 ring-orange-400 border-orange-400' : 'hover:border-tide'}`} onClick={() => !editingTagId && openEditTag(tag)}>
                                            <div className="mb-1 pr-6">
                                                <span className="text-[10px] uppercase font-bold text-slate-400 block mb-0.5">{tag.category || 'Uncategorized'}</span>
                                                <span className="text-xs font-bold text-teal-800 bg-teal-100 border border-teal-200 px-2 py-0.5 rounded inline-block">{tag.tagName}</span>
                                            </div>
                                            <p className="text-xs text-slate-600 italic mt-2 line-clamp-2 bg-slate-50 p-1 rounded">"{tag.textSnippet}"</p>
                                            {tag.memo && <p className="text-[11px] text-slate-700 mt-2 line-clamp-2">{tag.memo}</p>}
                                            <button onClick={(e) => { e.stopPropagation(); onRemoveTag(tag.id); }} className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 hover:text-red-500 bg-slate-100 rounded-full p-1 text-sm transition" title="Delete Code">Delete</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {mode !== 'code' && (
                            <div className="w-80 bg-slate-100 flex flex-col justify-center items-center border-l border-slate-200 p-8 text-center text-slate-500">
                                Switch to Code mode to add and edit qualitative codes.
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function AnalysisBoard({ tags, canvases, onUpdate, artifacts, transcripts, participants }) {
            const [newCanvasName, setNewCanvasName] = useState('');
            const [activeCanvasId, setActiveCanvasId] = useState(canvases[0]?.id || null);
            const [newThemeName, setNewThemeName] = useState('');
            const [editingThemeId, setEditingThemeId] = useState(null);
            const [editThemeName, setEditThemeName] = useState('');
            const [selectedFolders, setSelectedFolders] = useState([]);

            useEffect(() => {
                if (!activeCanvasId && canvases[0]) setActiveCanvasId(canvases[0].id);
            }, [canvases, activeCanvasId]);

            const transcriptById = useMemo(() => {
                const out = {};
                transcripts.forEach(t => { out[t.id] = t; });
                return out;
            }, [transcripts]);

            const participantCodeById = useMemo(() => {
                const out = {};
                (participants || []).forEach(p => { out[p.id] = p.pseudonym || p.id; });
                return out;
            }, [participants]);

            const availableFolders = useMemo(() => {
                const set = new Set();
                transcripts.forEach(t => set.add(t.folder || 'Uncategorized'));
                (artifacts || []).forEach(a => set.add(a.folder || 'Uncategorized'));
                return Array.from(set).sort((a, b) => a.localeCompare(b));
            }, [transcripts, artifacts]);

            useEffect(() => {
                if (selectedFolders.length === 0 && availableFolders.length > 0) {
                    setSelectedFolders(availableFolders);
                }
            }, [availableFolders, selectedFolders.length]);

            const selectedFolderSet = useMemo(() => new Set(selectedFolders), [selectedFolders]);

            const codeDetails = useMemo(() => {
                const map = {};
                tags.forEach(t => {
                    const parent = transcriptById[t.transcriptId];
                    const folder = parent?.folder || 'Uncategorized';
                    if (!selectedFolderSet.has(folder)) return;
                    if (!map[t.tagName]) {
                        map[t.tagName] = {
                            name: t.tagName,
                            category: t.category || 'Uncategorized',
                            count: 0,
                            sourceSet: new Set(),
                            quotes: [],
                            folders: new Set()
                        };
                    }
                    map[t.tagName].count += 1;
                    map[t.tagName].sourceSet.add('transcript');
                    map[t.tagName].folders.add(folder);
                    const participantCode = parent?.participantId ? (participantCodeById[parent.participantId] || parent.participantId) : null;
                    map[t.tagName].quotes.push({
                        source: 'Transcript',
                        folder,
                        ref: participantCode || `Transcript ${String(t.transcriptId).slice(-4)}`,
                        text: t.textSnippet || ''
                    });
                });

                (artifacts || []).forEach(art => {
                    const folder = art.folder || 'Uncategorized';
                    if (!selectedFolderSet.has(folder)) return;
                    (art.codes || []).forEach(codeName => {
                        if (!map[codeName]) {
                            map[codeName] = {
                                name: codeName,
                                category: 'Artifact',
                                count: 0,
                                sourceSet: new Set(),
                                quotes: [],
                                folders: new Set()
                            };
                        }
                        map[codeName].sourceSet.add('artifact');
                        map[codeName].folders.add(folder);
                        if (art.notes && art.notes.trim()) {
                            map[codeName].quotes.push({
                                source: 'Artifact',
                                folder,
                                ref: art.name,
                                text: art.notes
                            });
                        }
                    });
                });

                return Object.values(map)
                    .map((c) => ({
                        ...c,
                        source: c.sourceSet.size > 1 ? 'both' : (c.sourceSet.has('artifact') ? 'artifact' : 'transcript')
                    }))
                    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
            }, [tags, artifacts, transcriptById, selectedFolderSet, participantCodeById]);

            const activeCanvas = canvases.find(c => c.id === activeCanvasId) || null;

            const createCanvas = () => {
                if (!newCanvasName.trim()) return;
                const c = { id: Date.now().toString(), name: newCanvasName.trim(), themes: [] };

                setActiveCanvasId(c.id);
                setNewCanvasName('');

            const deleteCanvas = (canvasId) => {
                if (confirm('Delete this canvas and all its themes?')) {
                    const updated = canvases.filter(c => c.id !== canvasId);

            const renameCanvas = (canvasId) => {

            const addTheme = () => {
                if (!activeCanvas || !newThemeName.trim()) return;
                const updated = { ...activeCanvas, themes: [...activeCanvas.themes, { id: Date.now().toString(), name: newThemeName.trim(), codes: [] }] };

            const deleteTheme = (themeId) => {
                if (!activeCanvas) return;
                if (confirm('Delete this theme?')) {
                    const updated = { ...activeCanvas, themes: activeCanvas.themes.filter(t => t.id !== themeId) };

            const startEditTheme = (theme) => {

                const updated = { ...activeCanvas, themes: activeCanvas.themes.map(t => t.id === editingThemeId ? { ...t, name: editThemeName.trim() } : t) };
                onUpdate(canvases.map(c => c.id === updated.id ? updated : c));

            };

            const moveCodeToTheme = (themeId, codeName) => {
                if (!activeCanvas) return;
                const nextThemes = activeCanvas.themes.map(t => ({ ...t, codes: t.codes.filter(c => c !== codeName) }));
                const idx = nextThemes.findIndex(t => t.id === themeId);
                if (idx >= 0 && !nextThemes[idx].codes.includes(codeName)) nextThemes[idx].codes.push(codeName);
                const updated = { ...activeCanvas, themes: nextThemes };
                onUpdate(canvases.map(c => c.id === updated.id ? updated : c));

            const removeCodeFromTheme = (themeId, codeName) => {
                if (!activeCanvas) return;

            const tableRows = useMemo(() => {

                const rows = [];

                    theme.codes.forEach(codeName => {
                        const d = detailByCode[codeName] || { count: 0, quotes: [], category: 'Uncategorized' };
                        rows.push({
                            theme: theme.name,
                            code: codeName,
                            category: d.category,
                            quoteCount: d.count,
                            quotes: d.quotes

                    });
                });
                return rows;
            }, [activeCanvas, codeDetails]);

            const exportCanvasCsv = () => {
                if (!activeCanvas) return;
                const escape = (v) => {
                    const s = String(v ?? '');
                    return `"${s.replace(/"/g, '""')}"`;
                };
                const lines = ['Theme,Code,Category,Quote Count,Quotes'];
                tableRows.forEach((r) => {
                    const quotes = r.quotes.map(q => `[${q.source}] ${q.ref}: ${q.text}`).join(' || ');
                    lines.push([
                        escape(r.theme),
                        escape(r.code),
                        escape(r.category),
                        escape(r.quoteCount),
                        escape(quotes)
                    ].join(','));
                });
                const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${activeCanvas.name.replace(/\s+/g, '_')}_analysis_table.csv`;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            const toggleFolder = (folder) => {
                setSelectedFolders((prev) => prev.includes(folder) ? prev.filter(f => f !== folder) : [...prev, folder]);
            };

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-7xl mx-auto space-y-6">
                        <div className="bg-white border rounded-2xl p-6 shadow-soft">
                            <h2 className="text-3xl font-display">Analysis Canvases</h2>
                            <p className="text-slate-500 mt-1">Create theme buckets, filter by folder, review theme tables, and export to Excel-ready CSV.</p>
                        </div>

                        <div className="bg-white border rounded-2xl p-5 shadow-soft grid md:grid-cols-3 gap-4">
                            <div className="md:col-span-2 flex gap-2">
                                <input value={newCanvasName} onChange={e => setNewCanvasName(e.target.value)} placeholder="New canvas name" className="flex-1 border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-tide" />
                                <button onClick={createCanvas} className="bg-tide hover:bg-teal-600 text-white px-4 rounded-lg font-semibold">Create Canvas</button>
                            </div>
                            <select value={activeCanvasId || ''} onChange={e => setActiveCanvasId(e.target.value)} className="border rounded-lg p-2.5">
                                <option value="">Select canvas</option>
                                {canvases.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                            </select>
                        </div>

                        <div className="bg-white border rounded-2xl p-5 shadow-soft">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold">Folder Filter</h3>
                                <button onClick={() => setSelectedFolders(availableFolders)} className="text-xs font-semibold text-tide">Select All</button>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {availableFolders.map(folder => (
                                    <label key={folder} className={`px-3 py-1.5 rounded-full border text-xs cursor-pointer ${selectedFolderSet.has(folder) ? 'bg-teal-100 border-teal-300 text-teal-800' : 'bg-white text-slate-600'}`}>
                                        <input type="checkbox" className="hidden" checked={selectedFolderSet.has(folder)} onChange={() => toggleFolder(folder)} />

                        {!activeCanvas ? (

                                <div className="flex justify-between items-center mb-4 bg-white border rounded-2xl p-4 shadow-soft">

                                    </div>
                                </div>

                                <div className="grid lg:grid-cols-3 gap-5">
                                    <div className="bg-white border rounded-2xl p-4 shadow-soft lg:col-span-1">
                                        <h3 className="font-bold mb-3">Code Bank (filtered)</h3>
                                        <p className="text-xs text-slate-500 mb-3">Drag codes into theme buckets. Quote counts reflect selected folders.</p>
                                        <div className="space-y-2 max-h-[520px] overflow-y-auto pr-1">
                                            {codeDetails.map(code => (
                                                <div
                                                    key={code.name}
                                                    draggable
                                                    onDragStart={(e) => e.dataTransfer.setData('text/plain', code.name)}
                                                    className={`border rounded-lg p-2 cursor-grab bg-white hover:border-tide transition ${assignedCodes.has(code.name) ? 'opacity-60' : ''}`}
                                                >
                                                    <div className="font-semibold text-sm">{code.name}</div>
                                                    <div className="text-xs text-slate-500">{code.count} quotes • {code.category}</div>
                                                    {code.source === 'both' && <span className="text-[10px] bg-slate-100 px-1 rounded">Transcript + Artifact</span>}
                                                    {code.source === 'artifact' && <span className="text-[10px] bg-amber-100 px-1 rounded">Artifact</span>}
                                                </div>
                                            ))}
                                            {codeDetails.length === 0 && <p className="text-sm text-slate-400">No codes available for selected folders.</p>}
                                        </div>
                                    </div>

                                    <div className="bg-white border rounded-2xl p-4 shadow-soft lg:col-span-2">
                                        <div className="flex gap-2 mb-4">
                                            <input value={newThemeName} onChange={e => setNewThemeName(e.target.value)} placeholder="New theme bucket" className="flex-1 border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-ember" />
                                            <button onClick={addTheme} className="bg-ember hover:bg-orange-700 text-white px-4 rounded-lg font-semibold">Add Theme</button>
                                        </div>

                                        {activeCanvas.themes.length === 0 && <p className="text-slate-400 text-sm">No themes yet in this canvas.</p>}

                                        <div className="space-y-3">
                                            {activeCanvas.themes.map(theme => (
                                                <div
                                                    key={theme.id}
                                                    onDragOver={(e) => e.preventDefault()}
                                                    onDrop={(e) => {
                                                        e.preventDefault();
                                                        const codeName = e.dataTransfer.getData('text/plain');
                                                        moveCodeToTheme(theme.id, codeName);
                                                    }}
                                                    className="border-2 border-dashed rounded-xl p-4 bg-slate-50 group"
                                                >
                                                    <div className="flex justify-between items-center mb-3">
                                                        {editingThemeId === theme.id ? (
                                                            <div className="flex gap-2 flex-1">
                                                                <input autoFocus value={editThemeName} onChange={e => setEditThemeName(e.target.value)} className="flex-1 border rounded p-1.5 text-sm focus:ring-2 focus:ring-tide outline-none" />
                                                                <button onClick={saveEditTheme} className="bg-tide text-white px-2 rounded text-sm font-semibold">Save</button>
                                                                <button onClick={() => setEditingThemeId(null)} className="bg-slate-300 text-slate-700 px-2 rounded text-sm font-semibold">Cancel</button>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <h4 className="font-bold text-ink">{theme.name}</h4>
                                                                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition">
                                                                    <button onClick={() => startEditTheme(theme)} className="text-slate-400 hover:text-blue-600 text-sm">✎</button>
                                                                    <button onClick={() => deleteTheme(theme.id)} className="text-slate-400 hover:text-red-600 text-sm">✕</button>
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {theme.codes.map(codeName => {
                                                            const found = codeDetails.find(c => c.name === codeName);
                                                            return (
                                                                <span key={codeName} className="inline-flex items-center gap-2 text-xs bg-teal-100 text-teal-900 px-3 py-1 rounded-full border border-teal-200">
                                                                    {codeName} ({found?.count || 0})
                                                                    <button onClick={() => removeCodeFromTheme(theme.id, codeName)} className="text-teal-700 hover:text-red-600">x</button>
                                                                </span>
                                                            );
                                                        })}
                                                        {theme.codes.length === 0 && <span className="text-xs text-slate-400">Drop codes here</span>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        {unassigned.length > 0 && (
                                            <div className="mt-5 pt-4 border-t">
                                                <p className="text-xs uppercase text-slate-500 font-bold mb-2">Unassigned in this canvas</p>
                                                <p className="text-sm text-slate-600">{unassigned.map(c => `${c.name} (${c.count})`).join(', ')}</p>

                                <div className="bg-white border rounded-2xl p-5 shadow-soft mt-6">
                                    <div className="flex items-center justify-between mb-3">
                                        <h3 className="font-bold">Canvas Table (Themes, Codes, Quotes)</h3>
                                        <button onClick={exportCanvasCsv} className="px-3 py-1.5 rounded-lg bg-ink text-white text-sm font-semibold hover:bg-slate-800">Export CSV (Excel)</button>
                                    </div>
                                    {tableRows.length === 0 ? (
                                        <p className="text-sm text-slate-500">No rows yet. Assign codes to themes first.</p>
                                    ) : (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-sm border-collapse">
                                                <thead>

                                                                                <p className="text-slate-700 italic">"{q.text}"</p>

                                            </table>
