        }

        function TriangulationDashboard({ transcripts, tags, artifacts, analysisCanvases, sessions, assignmentMeta, onExportAssignment, onImportAssignment, onExportReturn, onImportReturn }) {
            const [coderId, setCoderId] = useState('');
            const [threshold, setThreshold] = useState(0.5);
            const [importing, setImporting] = useState(false);
            const [showExportMenu, setShowExportMenu] = useState(false);

            const csvEscape = (value) => {
                const text = String(value ?? '');
                if (/[",\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
                return text;
            };

            const downloadCsv = (filename, lines) => {
                const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            const downloadWordDoc = (filename, htmlContent) => {
                const wrapped = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>${htmlContent}</body></html>`;
                const blob = new Blob([wrapped], { type: 'application/msword;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            const escapeForHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            const buildApaTableHtml = (tableNumber, title, columns, rows, noteText) => {
                const header = columns.map(col => `<th style="text-align:left;padding:6px;border-bottom:1.5px solid #000;font-weight:700;">${escapeForHtml(col)}</th>`).join('');
                const body = rows.map(row => `<tr>${row.map(cell => `<td style="padding:6px;border-bottom:1px solid #d1d5db;vertical-align:top;">${escapeForHtml(cell)}</td>`).join('')}</tr>`).join('');

                return `
                    <div style="font-family:'Times New Roman',serif;font-size:12pt;line-height:1.35;margin-bottom:24px;">
                        <div style="font-weight:700;">Table ${tableNumber}</div>
                        <div style="font-style:italic;margin:4px 0 10px 0;">${escapeForHtml(title)}</div>
                        <table style="width:100%;border-collapse:collapse;border-top:1.5px solid #000;">
                            <thead><tr>${header}</tr></thead>
                            <tbody>${body || `<tr><td colspan="${columns.length}" style="padding:6px;">No rows available.</td></tr>`}</tbody>
                        </table>
                        <div style="margin-top:6px;"><span style="font-style:italic;">Note.</span> ${escapeForHtml(noteText)}</div>
                    </div>
                `;
            };

            const primaryThemeSet = useMemo(() => {
                const out = new Set();
                (analysisCanvases || []).forEach(c => (c.themes || []).forEach(t => out.add((t.name || '').trim().toLowerCase())));
                return out;
            }, [analysisCanvases]);

            const primaryArtifactCodeSet = useMemo(() => {
                const out = new Set();
                (artifacts || []).forEach(a => (a.codes || []).forEach(code => out.add(`${a.id}::${code}`)));
                return out;
            }, [artifacts]);

            const overlapRatio = (a, b) => {
                const start = Math.max(a.start, b.start);
                const end = Math.min(a.end, b.end);
                const intersection = Math.max(0, end - start);
                const union = Math.max(a.end, b.end) - Math.min(a.start, b.start);
                return union > 0 ? (intersection / union) : 0;
            };

            const sessionStats = useMemo(() => {
                return (sessions || []).map(session => {
                    const coTags = session.tags || [];
                    const usedCo = new Set();
                    let matched = 0;

                    (tags || []).forEach((pTag) => {
                        let bestIdx = -1;
                        let bestOverlap = 0;
                        coTags.forEach((cTag, idx) => {
                            if (usedCo.has(idx)) return;
                            if (pTag.transcriptId !== cTag.transcriptId) return;
                            if ((pTag.tagName || '') !== (cTag.tagName || '')) return;
                            if (!Number.isFinite(pTag.start) || !Number.isFinite(pTag.end) || !Number.isFinite(cTag.start) || !Number.isFinite(cTag.end)) return;
                            const ov = overlapRatio(pTag, cTag);
                            if (ov >= threshold && ov > bestOverlap) {
                                bestOverlap = ov;
                                bestIdx = idx;
                            }
                        });
                        if (bestIdx >= 0) {
                            usedCo.add(bestIdx);
                            matched += 1;
                        }
                    });

                    const primaryOnly = (tags || []).length - matched;
                    const coOnly = coTags.length - usedCo.size;
                    const agreementBase = Math.max((tags || []).length, coTags.length, 1);
                    const agreementPct = Math.round((matched / agreementBase) * 1000) / 10;

                    const coThemeSet = new Set();
                    (session.analysisCanvases || []).forEach(c => (c.themes || []).forEach(t => coThemeSet.add((t.name || '').trim().toLowerCase())));
                    let sharedThemes = 0;
                    primaryThemeSet.forEach(name => { if (coThemeSet.has(name)) sharedThemes += 1; });

                    const coArtifactSet = new Set();
                    (session.artifactCodes || []).forEach(a => (a.codes || []).forEach(code => coArtifactSet.add(`${a.artifactId}::${code}`)));
                    let sharedArtifactCodes = 0;
                    primaryArtifactCodeSet.forEach(key => { if (coArtifactSet.has(key)) sharedArtifactCodes += 1; });

                    return {
                        id: session.id,
                        coderId: session.coderId,
                        importedAt: session.importedAt,
                        matched,
                        primaryOnly,
                        coOnly,
                        agreementPct,
                        sharedThemes,
                        primaryThemes: primaryThemeSet.size,
                        coThemes: coThemeSet.size,
                        sharedArtifactCodes,
                        primaryArtifactCodes: primaryArtifactCodeSet.size,
                        coArtifactCodes: coArtifactSet.size,
                        coTagCount: coTags.length
                    };
                });
            }, [sessions, tags, threshold, primaryThemeSet, primaryArtifactCodeSet]);

            const importAssignmentFile = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                setImporting(true);
                try {
                    await onImportAssignment(file);
                    alert('Triangulation assignment imported. You can now code independently.');
                } catch (err) {
                    alert('Failed to import assignment package.');
                } finally {
                    setImporting(false);
                    e.target.value = '';
                }
            };

            const importReturnFile = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                setImporting(true);
                try {
                    await onImportReturn(file);
                    alert('Co-rater return imported.');
                } catch (err) {
                    alert('Failed to import co-rater return package.');
                } finally {
                    setImporting(false);
                    e.target.value = '';
                }
            };

            const exportReturn = () => {
                if (!coderId.trim()) {
                    alert('Enter a coder ID first.');
                    return;
                }
                onExportReturn(coderId.trim());
            };

            const exportAgreementCsv = () => {
                const lines = ['Coder ID,Imported At,Overlap Agreement % (heuristic),Matched Tags,Primary Only,Co-rater Only,Co-rater Tags,Shared Themes,Primary Theme Count,Co-rater Theme Count,Shared Artifact Codes'];
                sessionStats.forEach((s) => {
                    lines.push([
                        csvEscape(s.coderId),
                        csvEscape(new Date(s.importedAt).toLocaleString()),

            return (

        function ObservationsView({ observations, observationTags, allTags, onAddObservation, onUpdateObservation, onDeleteObservation, onAddObservationTag, onUpdateObservationTag, onRemoveObservationTag }) {
            const [activeObsId, setActiveObsId] = useState(observations[0]?.id || null);

                                    <div className="flex gap-2">

                        <div className="flex-1 overflow-y-auto p-3 space-y-2">

                            )}
                            {observations.map(obs => {
                                const tagCount = observationTags.filter(t => t.observationId === obs.id).length;
                                return (
                                    <button
                                        key={obs.id}

                                        className={`w-full text-left p-3 rounded-xl border transition ${activeObsId === obs.id ? 'bg-tide/10 border-tide ring-1 ring-tide' : 'bg-white border-slate-200 hover:border-tide/50'}`}
                                    >
                                        <p className="font-semibold text-sm text-ink truncate">{obs.title}</p>

                    {/* Main */}
                    {activeObs ? (

                            onDelete={() => {

                                onDeleteObservation(activeObs.id);

                                setActiveObsId(remaining[0]?.id || null);

                            onAddTag={onAddObservationTag}

                        />
                    ) : (

        function ObservationEditor({ observation, tags, allTags, observationTags, onUpdate, onDelete, onAddTag, onUpdateTag, onRemoveTag }) {
            const [mode, setMode] = useState('edit');
            const [content, setContent] = useState(observation.content || '');
            const [notes, setNotes] = useState(observation.notes || '');
            const [editingTitle, setEditingTitle] = useState(false);
            const [titleInput, setTitleInput] = useState(observation.title || '');

            const [pendingSelection, setPendingSelection] = useState(null);
            const [editingTagId, setEditingTagId] = useState(null);
            const [selectedTagId, setSelectedTagId] = useState(null);
            const [tagFormCategory, setTagFormCategory] = useState('');
            const [tagFormName, setTagFormName] = useState('');
            const [tagFormMemo, setTagFormMemo] = useState('');

            const textRef = useRef(null);
            const editableRef = useRef(null);

            const escapeHtml = (v) => String(v || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
            const plainToHtml = (v) => escapeHtml(v).replace(/\n/g, '<br>');
            const htmlToPlain = (v) => { 
                const d = document.createElement('div'); 
                d.innerHTML = v || ''; 
                d.querySelectorAll('br').forEach(br => { br.replaceWith('\n'); });
                return (d.innerText || '').replace(/\r/g, ''); 
            };

            useEffect(() => {
                setContent(observation.content || '');
                setNotes(observation.notes || '');
                setTitleInput(observation.title || '');
            }, [observation.id]);

            useEffect(() => {
                if (editableRef.current && mode === 'edit') {
                    const expected = plainToHtml(content);
                    if (editableRef.current.innerHTML !== expected) editableRef.current.innerHTML = expected;
                }
            }, [observation.id, mode]);

            const handleSave = () => {
                const latestHtml = editableRef.current ? editableRef.current.innerHTML : plainToHtml(content);
                const latestPlain = htmlToPlain(latestHtml);
                onUpdate({ ...observation, content: latestPlain, notes });
            };

            const handleSaveTitle = () => {
                const t = titleInput.trim();
                if (t) onUpdate({ ...observation, title: t });
                setEditingTitle(false);
            };

            const getSelectionOffset = (containerNode) => {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                const r = sel.getRangeAt(0);
                if (r.collapsed || !containerNode.contains(r.startContainer)) return null;
                const pre = r.cloneRange();
                pre.selectNodeContents(containerNode);
                pre.setEnd(r.startContainer, r.startOffset);
                const start = pre.toString().length;
                pre.setEnd(r.endContainer, r.endOffset);
                return { start, end: pre.toString().length, text: r.toString() };
            };

            const handleMouseUp = () => {
                if (mode !== 'code' || !textRef.current || editingTagId) return;
                setTimeout(() => {
                    const offset = getSelectionOffset(textRef.current);
                    if (offset && offset.text.trim()) {
                        setPendingSelection(offset);
                        setTagFormCategory('');
                        setTagFormName('');
                        setTagFormMemo('');
                    } else {
                        setPendingSelection(null);
                    }
                }, 40);
            };

            const submitTagForm = (e) => {
                e.preventDefault();
                if (!tagFormName.trim()) return;
                const normalizedCategory = tagFormCategory.trim() || 'Uncategorized';
                const normalizedCode = tagFormName.trim();
                if (editingTagId) {
                    const existing = tags.find(t => t.id === editingTagId);
                    if (!existing) return;
                    onUpdateTag({ ...existing, category: normalizedCategory, tagName: normalizedCode, memo: tagFormMemo });
                    setEditingTagId(null);
                    setSelectedTagId(existing.id);
                } else if (pendingSelection) {
                    onAddTag({
                        id: Date.now().toString(),
                        observationId: observation.id,
                        category: normalizedCategory,
                        tagName: normalizedCode,
                        memo: tagFormMemo,
                        textSnippet: pendingSelection.text,
                        start: pendingSelection.start,
                        end: pendingSelection.end
                    });
                    setPendingSelection(null);
                    window.getSelection().removeAllRanges();
                }
                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
            };

            const cancelTagForm = () => {
                setPendingSelection(null);
                setEditingTagId(null);
                window.getSelection().removeAllRanges();
                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
            };

            const openEditTag = (tag) => {
                setPendingSelection(null);
                window.getSelection().removeAllRanges();
                setEditingTagId(tag.id);
                setSelectedTagId(tag.id);
                setTagFormCategory(tag.category || '');
                setTagFormName(tag.tagName || '');
                setTagFormMemo(tag.memo || '');
            };

            const focusTag = (tag) => {
                setSelectedTagId(tag.id);
                setEditingTagId(null);
                setPendingSelection(null);
                window.getSelection().removeAllRanges();
                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
                setTimeout(() => {
                    if (!textRef.current) return;
                    const mark = textRef.current.querySelector(`mark[data-tag-id="${tag.id}"]`);
                    if (mark) mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 0);
            };

            const renderHighlightedHtml = () => {
                if (!content) return '';
                const container = document.createElement('div');
                container.innerHTML = plainToHtml(content);
                const sorted = [...tags]
                    .filter(t => Number.isFinite(t.start) && Number.isFinite(t.end) && t.end > t.start)
                    .sort((a, b) => a.start - b.start);

                const locateTextOffset = (target) => {
                    const safeTarget = Math.max(0, target);
                    const base = document.createRange();
                    base.selectNodeContents(container);
                    const walker = document.createTreeWalker(
                        container,
                        NodeFilter.SHOW_ALL,
                        {
                            acceptNode: (node) => {
                                if (node.nodeType === Node.TEXT_NODE) return NodeFilter.FILTER_ACCEPT;
                                if (node.nodeType === Node.ELEMENT_NODE && node.nodeName === 'BR') return NodeFilter.FILTER_ACCEPT;
                                return NodeFilter.FILTER_SKIP;
                            }
                        }
                    );
                    let node;
                    while ((node = walker.nextNode())) {
                        if (node.nodeType === Node.TEXT_NODE) {
                            const before = base.cloneRange();
                            before.setEnd(node, 0);
                            const beforeLen = before.toString().length;

                            const after = base.cloneRange();
                            after.setEnd(node, node.textContent.length);
                            const afterLen = after.toString().length;

                            if (safeTarget <= afterLen) {
                                return {
                                    node,
                                    offset: Math.max(0, Math.min(node.textContent.length, safeTarget - beforeLen))
                                };
                            }
                            continue;
                        }
                        if (node.nodeName === 'BR') {
                            const parent = node.parentNode;
                            if (!parent) continue;
                            const index = Array.prototype.indexOf.call(parent.childNodes, node);

                            const before = base.cloneRange();
                            before.setEnd(parent, index);
                            const beforeLen = before.toString().length;

                            const after = base.cloneRange();
                            after.setEnd(parent, index + 1);
                            const afterLen = after.toString().length;

                            if (safeTarget <= afterLen) {
                                if (safeTarget <= beforeLen) return { node: parent, offset: index };
                                return { node: parent, offset: index + 1 };
                            }
                        }
                    }
                    return { node: container, offset: container.childNodes.length };
                };
                sorted.forEach((tag) => {
                    const startPos = locateTextOffset(tag.start);
                    const endPos = locateTextOffset(tag.end);
                    if (!startPos || !endPos) return;
                    try {
                        const range = document.createRange();
                        range.setStart(startPos.node, startPos.offset);
                        range.setEnd(endPos.node, endPos.offset);
                        if (range.collapsed) return;
                        const mark = document.createElement('mark');
                        mark.setAttribute('data-tag-id', tag.id);
                        mark.setAttribute('title', `${tag.category} > ${tag.tagName}`);
                        mark.className = `px-1 rounded cursor-pointer transition ${editingTagId === tag.id ? 'bg-orange-400 text-white shadow-md' : 'bg-teal-200 hover:bg-teal-300'}`;
                        const fragment = range.extractContents();
                        mark.appendChild(fragment);
                        range.insertNode(mark);
                    } catch (_err) {}
                });
                return container.innerHTML;
            };

            const handleCodeClick = (e) => {
                const target = e.target.closest('mark[data-tag-id]');
                if (!target) return;
                const tagId = target.getAttribute('data-tag-id');
                const tag = tags.find(t => t.id === tagId);
                if (tag) focusTag(tag);
            };

            const existingCategories = [...new Set((allTags || []).map(t => (t.category || '').trim()).filter(Boolean))].sort((a,b) => a.localeCompare(b));
            const existingCodes = [...new Set((allTags || []).map(t => (t.tagName || '').trim()).filter(Boolean))].sort((a,b) => a.localeCompare(b));

            return (
                <div className="flex flex-col flex-1 min-w-0 overflow-hidden">
                    {/* Header */}
                    <div className="border-b px-6 py-3 flex items-center justify-between bg-white z-10 shrink-0">
                        <div className="flex items-center gap-3 min-w-0">
                            {editingTitle ? (
                                <input
                                    autoFocus
                                    value={titleInput}
                                    onChange={e => setTitleInput(e.target.value)}
                                    onBlur={handleSaveTitle}
                                    onKeyDown={e => { if (e.key === 'Enter') handleSaveTitle(); if (e.key === 'Escape') setEditingTitle(false); }}
                                    className="text-lg font-bold border-b-2 border-tide outline-none px-1 min-w-0 w-64"
                                />
                            ) : (
                                <button onClick={() => setEditingTitle(true)} className="text-lg font-bold text-ink hover:text-tide transition truncate max-w-xs" title="Click to rename">{observation.title}</button>
                            )}
                            <span className="text-xs text-slate-400 shrink-0">{observation.date}{observation.location ? ` · ${observation.location}` : ''}</span>
                        </div>
                        <div className="flex items-center gap-3 shrink-0">
                            <div className="flex bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => { handleSave(); setMode('edit'); }} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode === 'edit' ? 'bg-amber-500 text-white' : 'text-slate-600 hover:bg-slate-200'}`}>Edit</button>
                                <button onClick={() => { handleSave(); setMode('code'); }} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode === 'code' ? 'bg-tide text-white' : 'text-slate-600 hover:bg-slate-200'}`}>Code</button>
                                <button onClick={() => { handleSave(); setMode('notes'); }} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode === 'notes' ? 'bg-ink text-white' : 'text-slate-600 hover:bg-slate-200'}`}>Memos</button>
                            </div>
                            <button onClick={onDelete} className="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-700 text-xs font-semibold rounded-lg border border-red-200">Delete</button>
                        </div>
                    </div>

                    {/* Body */}
                    <div className={`flex-1 flex overflow-hidden ${mode === 'code' ? 'flex-col lg:flex-row' : ''}`}>
                        <div className="flex-1 min-w-0 flex flex-col border-r bg-white overflow-hidden">
                            <div className="flex-1 overflow-y-auto p-8 pt-5">
                                {mode === 'edit' && (
                                    <div
                                        ref={editableRef}
                                        contentEditable
                                        suppressContentEditableWarning
                                        onInput={() => {
                                            if (editableRef.current) setContent(htmlToPlain(editableRef.current.innerHTML));
                                        }}
                                        onBlur={handleSave}
                                        className="w-full min-h-[500px] outline-none text-lg leading-relaxed text-slate-800 p-3 border-dashed border-2 border-slate-200 rounded-xl bg-slate-50 focus-within:bg-white focus-within:border-amber-400 transition whitespace-pre-wrap"
                                        data-placeholder="Write your field notes here..."
                                    />
                                )}
                                {mode === 'code' && (
                                    <div ref={textRef} onMouseUp={handleMouseUp} onClick={handleCodeClick} className="code-surface max-w-full overflow-x-hidden break-words text-lg leading-relaxed whitespace-pre-wrap outline-none pb-32 text-slate-800 p-2">
                                        {content ? (
                                            <div dangerouslySetInnerHTML={{ __html: renderHighlightedHtml() }} />
                                        ) : <span className="text-slate-400 italic">No text yet. Switch to Edit mode to write your field notes.</span>}
                                    </div>
                                )}
                                {mode === 'notes' && (
                                    <div className="h-full flex flex-col max-w-3xl mx-auto w-full">
                                        <textarea value={notes} onChange={e => setNotes(e.target.value)} onBlur={handleSave} placeholder="Write overarching memos and reflective notes on this observation..." className="flex-1 w-full resize-none outline-none border border-slate-300 bg-white p-6 rounded-xl text-lg text-slate-800 leading-relaxed shadow-sm focus:ring-2 ring-ink transition min-h-[400px]" />
                                    </div>
                                )}
                            </div>
                        </div>

                        {mode === 'code' && (
                            <div className="w-full lg:w-96 lg:min-w-96 bg-slate-50 flex flex-col border-t lg:border-t-0 lg:border-l border-slate-200 z-20 overflow-y-auto max-h-[48vh] lg:max-h-none">
                                <div className="p-5 border-b bg-white shrink-0">
                                    <h3 className="font-bold text-lg text-slate-800 mb-2">{editingTagId ? 'Edit Code' : (pendingSelection ? 'Save New Code' : 'Observation Codes')}</h3>
                                    {(pendingSelection || editingTagId) ? (
                                        <form onSubmit={submitTagForm} className={`p-4 rounded-xl border-2 overflow-hidden ${editingTagId ? 'bg-orange-50 border-orange-300' : 'bg-teal-50 border-teal-300'}`}>
                                            <p className="text-xs text-slate-600 mb-3 line-clamp-3 break-words italic bg-white p-2 rounded border">"{pendingSelection ? pendingSelection.text : tags.find(t => t.id === editingTagId)?.textSnippet}"</p>

                                            <datalist id="obs_categories">{existingCategories.map(c => <option key={c} value={c} />)}</datalist>
                                            <datalist id="obs_tags">{existingCodes.map(c => <option key={c} value={c} />)}</datalist>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Parent Category</label>
                                            <input type="text" list="obs_categories" value={tagFormCategory} onChange={e => setTagFormCategory(e.target.value)} placeholder="e.g. Coping" className="w-full border border-slate-300 rounded p-2 text-sm mb-3 focus:ring-2 focus:ring-tide outline-none" />
                                            <div className="mb-3">
                                                <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">Common Categories</p>
                                                <div className="flex flex-wrap gap-1.5 max-h-16 overflow-y-auto">
                                                    {existingCategories.slice(0, 12).map(category => (
                                                        <button key={`ocat_${category}`} type="button" onClick={() => setTagFormCategory(category)} className="px-2 py-1 rounded-full text-[11px] border border-slate-300 bg-white hover:bg-slate-100 text-slate-700">{category}</button>
                                                    ))}
                                                </div>
                                            </div>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Specific Code *</label>
                                            <input type="text" autoFocus list="obs_tags" value={tagFormName} onChange={e => setTagFormName(e.target.value)} placeholder="e.g. Humor" className="w-full border border-slate-300 rounded p-2 text-sm mb-3 focus:ring-2 focus:ring-tide outline-none" />
                                            <div className="mb-3">
                                                <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">Common Codes</p>
                                                <div className="flex flex-wrap gap-1.5 max-h-16 overflow-y-auto">
                                                    {existingCodes.slice(0, 16).map(code => (
                                                        <button key={`ocode_${code}`} type="button" onClick={() => setTagFormName(code)} className="px-2 py-1 rounded-full text-[11px] border border-teal-200 bg-teal-50 hover:bg-teal-100 text-teal-800">{code}</button>
                                                    ))}
                                                </div>
                                            </div>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Code Memo</label>
                                            <textarea value={tagFormMemo} onChange={e => setTagFormMemo(e.target.value)} placeholder="Why is this significant?" className="w-full border border-slate-300 rounded p-2 text-sm mb-4 focus:ring-2 focus:ring-tide outline-none resize-none h-20" />

                                            <div className="flex gap-2">
                                                <button type="button" onClick={cancelTagForm} className="flex-1 py-2 bg-white border border-slate-300 text-slate-600 font-semibold rounded">Cancel</button>
                                                <button type="submit" className={`flex-1 py-2 text-white font-bold rounded ${editingTagId ? 'bg-orange-500 hover:bg-orange-600' : 'bg-tide hover:bg-teal-600'}`}>{editingTagId ? 'Update' : 'Save Code'}</button>
                                            </div>
                                        </form>
                                    ) : (
                                        <p className="text-sm text-slate-500 border-2 border-dashed border-slate-300 p-4 rounded-xl text-center bg-slate-100">Highlight text in your notes to assign a code.</p>
                                    )}
                                </div>

                                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                    {tags.length === 0 && !pendingSelection && !editingTagId && <p className="text-center text-slate-400 text-sm mt-10">No codes yet in this observation.</p>}
                                    {tags.map(tag => (
                                        <div key={tag.id} className={`bg-white p-3 rounded-lg border shadow-sm relative group transition cursor-pointer ${editingTagId === tag.id ? 'ring-2 ring-orange-400 border-orange-400' : (selectedTagId === tag.id ? 'ring-2 ring-tide border-tide' : 'hover:border-tide')}`} onClick={() => focusTag(tag)}>
                                            <div className="mb-1 pr-6">
                                                <span className="text-[10px] uppercase font-bold text-slate-400 block mb-0.5">{tag.category || 'Uncategorized'}</span>
                                                <span className="text-xs font-bold text-teal-800 bg-teal-100 border border-teal-200 px-2 py-0.5 rounded inline-block">{tag.tagName}</span>
                                            </div>
                                            <p className="text-xs text-slate-600 italic mt-2 line-clamp-2 bg-slate-50 p-1 rounded">"{tag.textSnippet}"</p>
                                            {tag.memo && <p className="text-[11px] text-slate-700 mt-2 line-clamp-2">{tag.memo}</p>}
                                            {selectedTagId === tag.id && (
                                                <div className="mt-3 flex gap-2">
                                                    <button type="button" onClick={(e) => { e.stopPropagation(); openEditTag(tag); }} className="flex-1 py-1.5 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 text-xs font-semibold rounded">Edit</button>
                                                    <button type="button" onClick={(e) => { e.stopPropagation(); if (editingTagId === tag.id) setEditingTagId(null); setSelectedTagId(null); onRemoveTag(tag.id); }} className="flex-1 py-1.5 bg-red-50 border border-red-200 hover:bg-red-100 text-red-700 text-xs font-semibold rounded">Delete</button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {mode !== 'code' && (
                            <div className="w-80 bg-slate-100 flex flex-col justify-center items-center border-l border-slate-200 p-8 text-center text-slate-500">
                                Switch to Code mode to highlight and tag field note text.
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Codebook({ tags, transcripts, participants, artifacts, observations, observationTags, sourceFilterPresets, codeDefinitions, categoryDefinitions, onUpdateCodeDefinitions, onUpdateCategoryDefinitions, onSaveSourceFilterPreset, onDeleteSourceFilterPreset, onRenameCodeLabel, onRenameCategoryLabel }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('category');
            const [sortDirection, setSortDirection] = useState('asc');
            const [selectedSourceIds, setSelectedSourceIds] = useState([]);
            const [showExportMenu, setShowExportMenu] = useState(false);
            const [editingRows, setEditingRows] = useState(new Set());
            const [renamingCodeName, setRenamingCodeName] = useState(null);
            const [renameCodeValue, setRenameCodeValue] = useState('');
            const [renamingCategoryName, setRenamingCategoryName] = useState(null);
            const [renameCategoryValue, setRenameCategoryValue] = useState('');
            const hasInitializedSourceFilter = useRef(false);
            const toggleRow = (name) => setEditingRows(prev => {
                const next = new Set(prev);
                if (next.has(name)) next.delete(name); else next.add(name);
                return next;
            });
            const toggleAllRows = (rows) => setEditingRows(prev => {
                const names = rows.map(r => r.name);
                const anyEditing = names.some(n => prev.has(n));
                const next = new Set(prev);
                if (anyEditing) { names.forEach(n => next.delete(n)); } else { names.forEach(n => next.add(n)); }
                return next;
            });

            const csvEscape = (value) => {
                const text = String(value ?? '');
                if (/[",\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
                return text;
            };

            const downloadCsv = (filename, lines) => {
                const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            const downloadWordDoc = (filename, htmlContent) => {
                const wrapped = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>${htmlContent}</body></html>`;
                const blob = new Blob([wrapped], { type: 'application/msword;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            const escapeForHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            const buildApaTableHtml = (tableNumber, title, columns, rows, noteText) => {
                const header = columns.map(col => `<th style="text-align:left;padding:6px;border-bottom:1.5px solid #000;font-weight:700;">${escapeForHtml(col)}</th>`).join('');
                const body = rows.map(row => `<tr>${row.map(cell => `<td style="padding:6px;border-bottom:1px solid #d1d5db;vertical-align:top;">${escapeForHtml(cell)}</td>`).join('')}</tr>`).join('');

                return `
                    <div style="font-family:'Times New Roman',serif;font-size:12pt;line-height:1.35;margin-bottom:24px;">
                        <div style="font-weight:700;">Table ${tableNumber}</div>
                        <div style="font-style:italic;margin:4px 0 10px 0;">${escapeForHtml(title)}</div>
                        <table style="width:100%;border-collapse:collapse;border-top:1.5px solid #000;">
                            <thead><tr>${header}</tr></thead>
                            <tbody>${body || `<tr><td colspan="${columns.length}" style="padding:6px;">No rows available.</td></tr>`}</tbody>
                        </table>
                        <div style="margin-top:6px;"><span style="font-style:italic;">Note.</span> ${escapeForHtml(noteText)}</div>
                    </div>
                `;
            };

            const sourceFilterGroups = useMemo(() => ([
                {
                    type: 'transcript',
                    label: sourceFilterTypeLabels.transcript,
                    items: (transcripts || []).map((transcript) => ({
                        filterId: buildSourceFilterId('transcript', transcript.id),
                        label: transcript.title || `Transcript ${String(transcript.id).slice(-4)}`,
                        meta: transcript.folder || 'Uncategorized'
                    }))
                },
                {
                    type: 'artifact',
                    label: sourceFilterTypeLabels.artifact,
                    items: (artifacts || []).map((artifact) => ({
                        filterId: buildSourceFilterId('artifact', artifact.id),
                        label: artifact.name || `Artifact ${String(artifact.id).slice(-4)}`,
                        meta: artifact.folder || 'Uncategorized'
                    }))
                },
                {
                    type: 'observation',
                    label: sourceFilterTypeLabels.observation,
                    items: (observations || []).map((observation) => ({
                        filterId: buildSourceFilterId('observation', observation.id),
                        label: observation.title || `Observation ${String(observation.id).slice(-4)}`,
                        meta: [observation.location || 'Onsite Observation', observation.date].filter(Boolean).join(' • ')
                    }))
                }
            ]), [transcripts, artifacts, observations]);

            useEffect(() => {
                const allIds = sourceFilterGroups.flatMap((group) => group.items.map((item) => item.filterId));
                setSelectedSourceIds((prev) => {
                    if (!hasInitializedSourceFilter.current) {
                        hasInitializedSourceFilter.current = true;
                        return allIds;
                    }
                    const prevSet = new Set(prev);
                    const retained = prev.filter((id) => allIds.includes(id));
                    const added = allIds.filter((id) => !prevSet.has(id));
                    return [...retained, ...added];
                });
            }, [sourceFilterGroups]);

            const selectedSourceSet = useMemo(() => new Set(selectedSourceIds), [selectedSourceIds]);

            const toggleSourceItem = (filterId) => {
                setSelectedSourceIds((prev) => prev.includes(filterId)
                    ? prev.filter((id) => id !== filterId)
                    : [...prev, filterId]
                );
            };

            const handleSelectAllSources = () => {
                setSelectedSourceIds(sourceFilterGroups.flatMap((group) => group.items.map((item) => item.filterId)));
            };

            const handleClearAllSources = () => {
                setSelectedSourceIds([]);
            };

            const handleApplyPreset = (resolvedIds) => {
                setSelectedSourceIds(resolvedIds);
            };

            const handleToggleSourceGroup = (type) => {
                const group = sourceFilterGroups.find((entry) => entry.type === type);
                if (!group) return;
                const groupIds = group.items.map((item) => item.filterId);
                setSelectedSourceIds((prev) => {
                    const hasAll = groupIds.every((id) => prev.includes(id));
                    return hasAll
                        ? prev.filter((id) => !groupIds.includes(id))
                        : [...new Set([...prev, ...groupIds])];
                });
            };

            const tableData = useMemo(() => {
                const participantCodeById = {};
                (participants || []).forEach(p => { participantCodeById[p.id] = p.pseudonym || p.id; });
                const transcriptRows = tags.filter((tag) => selectedSourceSet.has(buildSourceFilterId('transcript', tag.transcriptId))).map(tag => {
                    const parent = transcripts.find(t => t.id === tag.transcriptId);
                    return {
                        ...tag,
                        sourceType: 'Transcript',
                        sourceId: tag.transcriptId,
                        transcriptLabel: parent?.participantId ? (participantCodeById[parent.participantId] || parent.participantId) : `Transcript ${String(tag.transcriptId).slice(-4)}`,
                        folder: parent?.folder || 'Uncategorized',
                        subfolder: parent?.subfolder || 'General',
                        category: tag.category || 'Uncategorized'
                    };
                });

                const artifactRows = (artifacts || []).filter((art) => selectedSourceSet.has(buildSourceFilterId('artifact', art.id))).flatMap(art => (art.codes || []).map(codeName => ({
                    id: `${art.id}_${codeName}`,
                    sourceType: 'Artifact',
                    sourceId: art.id,
                    tagName: codeName,
                    category: art.folder || 'Artifact',
                    transcriptLabel: art.name,
                    folder: art.folder || 'Uncategorized',
                    subfolder: 'Project Artifact',
                    textSnippet: art.notes || 'No artifact note provided.',
                    memo: ''
                })));

                const observationRows = (observationTags || []).filter((tag) => selectedSourceSet.has(buildSourceFilterId('observation', tag.observationId))).map(tag => {
                    const parent = (observations || []).find(o => o.id === tag.observationId);
                    return {
                        ...tag,
                        sourceType: 'Observation',
                        sourceId: tag.observationId,
                        transcriptLabel: parent ? parent.title : `Observation ${String(tag.observationId).slice(-4)}`,
                        folder: parent?.location || 'Onsite Observation',
                        subfolder: parent?.date || 'Observation',
                        category: tag.category || 'Uncategorized'
                    };
                });

                const groupedRows = Object.values([...transcriptRows, ...artifactRows, ...observationRows].reduce((acc, item) => {
                    const groupKey = [item.category || 'Uncategorized', item.tagName].join('::');
                    if (!acc[groupKey]) {
                        acc[groupKey] = {
                            id: groupKey,
                            tagName: item.tagName,
                            category: item.category,
                            quoteCount: 0,
                            sources: [],
                            quotes: [],
                            memos: []
                        };
                    }

                    const hasSource = acc[groupKey].sources.some((source) => source.sourceType === item.sourceType && source.sourceId === item.sourceId);
                    if (!hasSource) {
                        acc[groupKey].sources.push({
                            sourceType: item.sourceType,
                            sourceId: item.sourceId,
                            label: item.transcriptLabel,
                            folder: item.folder,
                            subfolder: item.subfolder
                        });
                    }

                    acc[groupKey].quoteCount += 1;
                    if (item.textSnippet && item.textSnippet.trim()) {
                        acc[groupKey].quotes.push({
                            text: item.textSnippet.trim(),
                            sourceType: item.sourceType,
                            label: item.transcriptLabel,
                            folder: item.folder,
                            subfolder: item.subfolder
                        });
                    }
                    if (item.memo && item.memo.trim()) {
                        acc[groupKey].memos.push({
                            text: item.memo.trim(),
                            sourceType: item.sourceType,
                            label: item.transcriptLabel
                        });
                    }
                    return acc;
                }, {}));

                const filteredRows = groupedRows.filter(item => {
                    const combinedQuotes = item.quotes.map(q => q.text).join(' ');
                    const combinedMemos = item.memos.map(m => m.text).join(' ');
                    const combinedSources = item.sources.map(s => `${s.sourceType} ${s.label} ${s.folder} ${s.subfolder}`).join(' ');
                    const query = searchTerm.toLowerCase();
                    return item.tagName.toLowerCase().includes(query) ||
                        item.category.toLowerCase().includes(query) ||
                        combinedSources.toLowerCase().includes(query) ||
                        combinedQuotes.toLowerCase().includes(query) ||
                        combinedMemos.toLowerCase().includes(query);
                });

                return filteredRows.sort((a, b) => {
                    const direction = sortDirection === 'asc' ? 1 : -1;
                    let primaryComparison = 0;

                    if (sortBy === 'code') {
                        primaryComparison = a.tagName.localeCompare(b.tagName);
                    } else if (sortBy === 'quoteCount') {
                        primaryComparison = a.quoteCount - b.quoteCount;
                    } else {
                        primaryComparison = a.category.localeCompare(b.category);
                    }

                    if (primaryComparison !== 0) return primaryComparison * direction;

                    const secondaryComparison = sortBy === 'code'
                        ? a.category.localeCompare(b.category)
                        : sortBy === 'quoteCount'
                            ? a.category.localeCompare(b.category)
                            : a.tagName.localeCompare(b.tagName);
                    if (secondaryComparison !== 0) return secondaryComparison;

                    return a.tagName.localeCompare(b.tagName);
                }).map((item) => ({
                    ...item,
                    sourceCount: (item.sources || []).length
                }));
            }, [tags, transcripts, participants, artifacts, observations, observationTags, searchTerm, sortBy, sortDirection, selectedSourceSet]);

            const uniqueCodeCount = useMemo(() => new Set(tableData.map(t => t.tagName)).size, [tableData]);
            const uniqueCategoryCount = useMemo(() => new Set(tableData.map(t => t.category)).size, [tableData]);
            const pickExamples = (quotes) => Array.from(new Set((quotes || []).map(q => (q?.text || q || '').trim()).filter(Boolean))).slice(0, 3);

            const toDefinitionRecord = (value) => {
                if (!value) return { definition: '', inclusion: '', exclusion: '', exemplars: '' };
                if (typeof value === 'string') {
                    return { definition: value, inclusion: '', exclusion: '', exemplars: '' };
                }
                return {
                    definition: value.definition || '',
                    inclusion: value.inclusion || '',
                    exclusion: value.exclusion || '',
                    exemplars: value.exemplars || ''
                };
            };

            const codeRows = useMemo(() => {
                const names = Array.from(new Set([
                    ...tableData.map(item => item.tagName),
                    ...Object.keys(codeDefinitions || {})
                ])).sort((a, b) => a.localeCompare(b));

                return names.map((name) => {
                    const related = tableData.filter(item => item.tagName === name);
                    const examples = pickExamples(related.flatMap(item => item.quotes));
                    const record = toDefinitionRecord((codeDefinitions || {})[name]);
                    return {
                        name,
                        ...record,
                        examples
                    };
                });
            }, [tableData, codeDefinitions]);

            const categoryRows = useMemo(() => {
                const names = Array.from(new Set([
                    ...tableData.map(item => item.category),
                    ...Object.keys(categoryDefinitions || {})
                ])).sort((a, b) => a.localeCompare(b));

                return names.map((name) => {
                    const related = tableData.filter(item => item.category === name);
                    const examples = pickExamples(related.flatMap(item => item.quotes));
                    const record = toDefinitionRecord((categoryDefinitions || {})[name]);
                    return {
                        name,
                        ...record,
                        examples
                    };
                });
            }, [tableData, categoryDefinitions]);

            const updateDefinitionMap = (currentMap, setter, key, field, value) => {
                const next = { ...(currentMap || {}) };
                const existing = toDefinitionRecord(next[key]);
                const updated = { ...existing, [field]: value };
                const hasAnyValue = Object.values(updated).some(v => String(v || '').trim());
                if (hasAnyValue) next[key] = updated;
                else delete next[key];
                setter(next);
            };

            const beginRenameCodeLabel = (currentName) => {
                setRenamingCodeName(currentName);
                setRenameCodeValue(currentName);
            };

            const cancelRenameCodeLabel = () => {
                setRenamingCodeName(null);
                setRenameCodeValue('');
            };

            const commitRenameCodeLabel = () => {
                if (!renamingCodeName) return;
                const cleaned = String(renameCodeValue || '').trim();
                if (!cleaned || cleaned === renamingCodeName) {
                    cancelRenameCodeLabel();
                    return;
                }
                onRenameCodeLabel(renamingCodeName, cleaned);
                setEditingRows((prev) => {
                    const next = new Set(prev);
                    if (next.has(renamingCodeName)) {
                        next.delete(renamingCodeName);
                        next.add(cleaned);
                    }
                    return next;
                });
                cancelRenameCodeLabel();
            };

            const beginRenameCategoryLabel = (currentName) => {
                setRenamingCategoryName(currentName);
                setRenameCategoryValue(currentName);
            };

            const cancelRenameCategoryLabel = () => {
                setRenamingCategoryName(null);
                setRenameCategoryValue('');
            };

            const commitRenameCategoryLabel = () => {
                if (!renamingCategoryName) return;
                const cleaned = String(renameCategoryValue || '').trim();
                if (!cleaned || cleaned === renamingCategoryName) {
                    cancelRenameCategoryLabel();
                    return;
                }
                onRenameCategoryLabel(renamingCategoryName, cleaned);
                setEditingRows((prev) => {
                    const next = new Set(prev);
                    if (next.has(renamingCategoryName)) {
                        next.delete(renamingCategoryName);
                        next.add(cleaned);
                    }
                    return next;
                });
                cancelRenameCategoryLabel();
            };

            const exportGroupedCodebookCsv = () => {
                const lines = ['Category,Code,Source,Source Count,Folder,Subfolder,Quote Count,Quotes,Memos'];
                tableData.forEach((row) => {
                    const sourceSummary = (row.sources || []).map((s) => `${s.sourceType}: ${s.label}`).join(' | ');
                    const folderSummary = Array.from(new Set((row.sources || []).map((s) => s.folder).filter(Boolean))).join(' | ');
                    const subfolderSummary = Array.from(new Set((row.sources || []).map((s) => s.subfolder).filter(Boolean))).join(' | ');
                    lines.push([
                        csvEscape(row.category),
                        csvEscape(row.tagName),
                        csvEscape(sourceSummary),
                        csvEscape(row.sourceCount),
                        csvEscape(folderSummary),
                        csvEscape(subfolderSummary),
                        csvEscape(row.quoteCount),
                        csvEscape((row.quotes || []).slice(0, 3).map((q) => `[${q.sourceType}] ${q.label}: ${q.text}`).join(' | ')),
                        csvEscape((row.memos || []).map((m) => `[${m.sourceType}] ${m.label}: ${m.text}`).join(' | '))
                    ].join(','));
                });
                downloadCsv(`QualiApp_Codebook_Table_${new Date().toISOString().slice(0, 10)}.csv`, lines);
            };

            const exportCodeDefinitionsCsv = () => {
                const lines = ['Code Name/Label,Definition,Inclusion Criteria,Exclusion Criteria,Examples (auto)'];
                codeRows.forEach((row) => {
                    lines.push([
                        csvEscape(row.name),
                        csvEscape(row.definition),
                        csvEscape(row.inclusion),
                        csvEscape(row.exclusion),
                        csvEscape((row.examples || []).join(' | '))

                                    <div>
                                        <h3 className="text-lg font-bold text-ink">Category Definitions</h3>
                                        <p className="text-xs text-slate-500 mt-0.5">{categoryRows.some(r => editingRows.has(r.name)) ? 'Some rows in edit mode — click ✓ on a row when done.' : 'Click the pencil on any row to edit it, or use the button to edit all.'}</p>
                                    </div>
                                    <button
                                        type="button"
                                        title={categoryRows.some(r => editingRows.has(r.name)) ? 'Close all edits' : 'Edit all rows'}
                                        onClick={() => toggleAllRows(categoryRows)}
                                        className={`p-2 rounded-lg border transition ${categoryRows.some(r => editingRows.has(r.name)) ? 'bg-amber-100 border-amber-300 text-amber-700 hover:bg-amber-200' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-100 hover:text-slate-700'}`}
                                    >
                                        {categoryRows.some(r => editingRows.has(r.name)) ? (
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                        ) : (
                                            <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                        )}
                                    </button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 border-b text-slate-600 uppercase text-xs tracking-wider">
                                                <th className="p-3 font-bold w-36">Category</th>
                                                <th className="p-3 font-bold min-w-[180px]">Definition</th>
                                                <th className="p-3 font-bold min-w-[180px]">Inclusion Criteria</th>
                                                <th className="p-3 font-bold min-w-[180px]">Exclusion Criteria</th>
                                                <th className="p-3 font-bold min-w-[200px]">Examples</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y text-sm">
                                            {categoryRows.length === 0 ? (
                                                <tr><td colSpan="5" className="p-8 text-center text-slate-400 italic">No categories available yet.</td></tr>
                                            ) : categoryRows.map((row) => (
                                                <tr key={`category_row_${row.name}`} className={`align-top hover:bg-slate-50 ${editingRows.has(row.name) ? 'bg-amber-50/30' : ''}`}>
                                                    <td className="p-3">
                                                        <div className="flex items-start gap-1.5">
                                                            {renamingCategoryName === row.name ? (
                                                                <div className="flex items-center gap-1.5 w-full">
                                                                    <input
                                                                        autoFocus
                                                                        value={renameCategoryValue}
                                                                        onChange={(e) => setRenameCategoryValue(e.target.value)}
                                                                        onKeyDown={(e) => {
                                                                            if (e.key === 'Enter') commitRenameCategoryLabel();
                                                                            if (e.key === 'Escape') cancelRenameCategoryLabel();
                                                                        }}
                                                                        className="w-full border border-teal-300 rounded-lg px-2 py-1 text-xs font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-tide"
                                                                    />
                                                                    <button
                                                                        type="button"
                                                                        title="Save label"
                                                                        onClick={commitRenameCategoryLabel}
                                                                        className="p-1 rounded border bg-teal-100 border-teal-300 text-teal-700 hover:bg-teal-200"
                                                                    >
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                                                                    </button>
                                                                    <button
                                                                        type="button"
                                                                        title="Cancel rename"
                                                                        onClick={cancelRenameCategoryLabel}
                                                                        className="p-1 rounded border bg-white border-slate-300 text-slate-500 hover:bg-slate-100"
                                                                    >
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                                                                    </button>
                                                                </div>
                                                            ) : (
                                                                <>
                                                                    <span className="text-[10px] uppercase font-bold text-slate-400 block">{row.name}</span>
                                                                    <button
                                                                        type="button"
                                                                        title="Rename category label"
                                                                        onClick={() => beginRenameCategoryLabel(row.name)}
                                                                        className="p-1 rounded border transition flex-shrink-0 bg-white border-slate-200 text-slate-400 hover:text-teal-700 hover:border-teal-300"
                                                                    >
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 7L5 15l-2 7 7-2 8-8"/><path d="M15 5l4 4"/></svg>
                                                                    </button>
                                                                </>
                                                            )}
                                                            <button
                                                                type="button"
                                                                title={editingRows.has(row.name) ? 'Done editing' : 'Edit this row'}
                                                                onClick={() => toggleRow(row.name)}
                                                                className={`p-1 rounded border transition flex-shrink-0 ${editingRows.has(row.name) ? 'bg-amber-100 border-amber-300 text-amber-700 hover:bg-amber-200' : 'bg-white border-slate-200 text-slate-400 hover:text-slate-600 hover:border-slate-300'}`}
                                                            >
                                                                {editingRows.has(row.name) ? (
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
                                                                ) : (
                                                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                                                )}
                                                            </button>
                                                        </div>
                                                    </td>
                                                    <td className="p-3">
                                                        {editingRows.has(row.name) ? (
                                                            <textarea
                                                                value={row.definition}
                                                                onChange={(e) => updateDefinitionMap(categoryDefinitions, onUpdateCategoryDefinitions, row.name, 'definition', e.target.value)}
                                                                placeholder="What this category represents..."
                                                                className="w-full min-h-[100px] border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-tide resize-y"
                                                            />
                                                        ) : (
                                                            <span className="text-slate-600">{row.definition || <span className="italic text-slate-400">Not provided yet.</span>}</span>
                                                        )}
                                                    </td>
                                                    <td className="p-3">
                                                        {editingRows.has(row.name) ? (
                                                            <textarea
                                                                value={row.inclusion}
                                                                onChange={(e) => updateDefinitionMap(categoryDefinitions, onUpdateCategoryDefinitions, row.name, 'inclusion', e.target.value)}
                                                                placeholder="When to apply this category..."
                                                                className="w-full min-h-[100px] border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-tide resize-y"
                                                            />
                                                        ) : (
                                                            <span className="text-slate-600">{row.inclusion || <span className="italic text-slate-400">Not provided yet.</span>}</span>
                                                        )}
                                                    </td>
                                                    <td className="p-3">
                                                        {editingRows.has(row.name) ? (
                                                            <textarea
                                                                value={row.exclusion}
                                                                onChange={(e) => updateDefinitionMap(categoryDefinitions, onUpdateCategoryDefinitions, row.name, 'exclusion', e.target.value)}
                                                                placeholder="When not to apply this category..."
                                                                className="w-full min-h-[100px] border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-tide resize-y"
                                                            />
                                                        ) : (
                                                            <span className="text-slate-600">{row.exclusion || <span className="italic text-slate-400">Not provided yet.</span>}</span>
                                                        )}
                                                    </td>
                                                    <td className="p-3">
                                                        {row.examples.length === 0 ? (
                                                            <p className="text-xs text-slate-400 italic">No quotes yet.</p>
                                                        ) : row.examples.map((example, idx) => (
                                                            <p key={`category_example_${row.name}_${idx}`} className="text-xs italic text-slate-700 mb-2 leading-relaxed">"{example}"</p>
                                                        ))}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
