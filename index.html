                                        </div>
                                    </div>
                                </div>
                            )}
                            {view === 'dashboard' && (
                                <Dashboard
                                    transcripts={transcripts}
                                    folders={folders}
                                    onDownloadApp={handleDownloadApp}
                                    onCreate={handleCreateTranscript}
                                    onCreateFolder={handleCreateFolder}
                                    onRenameFolder={handleRenameFolder}
                                    onDeleteFolder={handleDeleteFolder}
                                    onMoveTranscript={handleMoveTranscriptToFolder}
                                    onRenameTranscript={handleRenameTranscript}
                                    onOpen={(id) => { setActiveId(id); setView('editor'); }}
                                    onDelete={handleDeleteTranscript}
                                    participants={participants}
                                />
                            )}
                            {view === 'artifacts' && <ArtifactDashboard artifacts={globalArtifacts} onUpdate={setGlobalArtifacts} suggestedCodes={crossSourceCodes} suggestedCategories={crossSourceCategories} />}
                            {view === 'observations' && (
                                <ObservationsView
                                    observations={observations}
                                    observationTags={observationTags}
                                    allTags={crossSourceTagSuggestions}
                                    onAddObservation={(obs) => setObservations(prev => [obs, ...prev])}
                                    onUpdateObservation={(updated) => setObservations(prev => prev.map(o => o.id === updated.id ? updated : o))}
                                    onDeleteObservation={(id) => { setObservations(prev => prev.filter(o => o.id !== id)); setObservationTags(prev => prev.filter(t => t.observationId !== id)); }}
                                    onAddObservationTag={(tag) => setObservationTags(prev => [...prev, tag])}
                                    onUpdateObservationTag={(updated) => setObservationTags(prev => prev.map(t => t.id === updated.id ? updated : t))}
                                    onRemoveObservationTag={(id) => setObservationTags(prev => prev.filter(t => t.id !== id))}
                                />
                            )}
                            {view === 'participants' && <ParticipantVault participants={participants} onUpdate={setParticipants} />}
                            {view === 'analysis' && <AnalysisBoard tags={tags} canvases={analysisCanvases} onUpdate={setAnalysisCanvases} artifacts={globalArtifacts} transcripts={transcripts} participants={participants} observations={observations} observationTags={observationTags} sourceFilterPresets={sourceFilterPresets} onSaveSourceFilterPreset={handleSaveSourceFilterPreset} onDeleteSourceFilterPreset={handleDeleteSourceFilterPreset} />}
                            {view === 'triangulation' && (
                                <TriangulationDashboard
                                    transcripts={transcripts}
                                    tags={tags}
                                    artifacts={globalArtifacts}
                                    analysisCanvases={analysisCanvases}
                                    sessions={triangulationSessions}
                                    assignmentMeta={triangulationAssignmentMeta}
                                    onExportAssignment={handleExportTriangulationAssignment}
                                    onImportAssignment={handleImportTriangulationAssignment}
                                    onExportReturn={handleExportTriangulationReturn}
                                    onImportReturn={handleImportTriangulationReturn}
                                />
                            )}
                            {view === 'backup' && <BackupDashboard onBackup={handleBackupDownload} onRestore={handleRestoreUpload} estimateBackupSize={estimateBackupSize} />}
                            {view === 'editor' && activeTranscript && (
                                <Editor
                                    transcript={activeTranscript}
                                    tags={tags.filter(t => t.transcriptId === activeTranscript.id)}
                                    allTags={crossSourceTagSuggestions}
                                    activityTypes={activityTypes}
                                    onAddActivityType={(newType) => !activityTypes.includes(newType) && setActivityTypes([...activityTypes, newType])}
                                    onBack={() => setView('dashboard')}
                                    onUpdateTranscript={(updated) => {
                                        setTranscripts((prev) => {
                                            const next = prev.map(t => t.id === updated.id ? updated : t);
                                            dbSet('data', 'transcripts', next).catch(() => {});
                                            return next;
                                        });
                                    }}
                                    onAddTag={(tag) => {
                                        setTags((prev) => {
                                            const next = [...prev, tag];
                                            dbSet('data', 'tags', next).catch(() => {});
                                            return next;
                                        });
                                    }}
                                    onUpdateTag={(updatedTag) => {
                                        setTags((prev) => {
                                            const next = prev.map(t => t.id === updatedTag.id ? updatedTag : t);
                                            dbSet('data', 'tags', next).catch(() => {});
                                            return next;
                                        });
                                    }}
                                    onRemoveTag={(tagId) => {
                                        setTags((prev) => {
                                            const next = prev.filter(t => t.id !== tagId);
                                            dbSet('data', 'tags', next).catch(() => {});
                                            return next;
                                        });
                                    }}
                                />
                            )}
                            {view === 'codebook' && (
                                <Codebook
                                    key={codebookRefreshKey}
                                    tags={tags}
                                    transcripts={transcripts}
                                    participants={participants}
                                    artifacts={globalArtifacts}
                                    observations={observations}
                                    observationTags={observationTags}
                                    sourceFilterPresets={sourceFilterPresets}
                                    codeDefinitions={codeDefinitions}
                                    categoryDefinitions={categoryDefinitions}
                                    onUpdateCodeDefinitions={setCodeDefinitions}
                                    onUpdateCategoryDefinitions={setCategoryDefinitions}
                                    onSaveSourceFilterPreset={handleSaveSourceFilterPreset}
                                    onDeleteSourceFilterPreset={handleDeleteSourceFilterPreset}
                                    onRenameCodeLabel={(oldName, newName) => {
                                        const previous = String(oldName || '').trim();
                                        const next = String(newName || '').trim();
                                        if (!previous || !next || previous === next) return;

                                        setTags((prev) => prev.map((tag) =>
                                            String(tag.tagName || '').trim() === previous ? { ...tag, tagName: next } : tag
                                        ));

                                        setObservationTags((prev) => prev.map((tag) =>
                                            String(tag.tagName || '').trim() === previous ? { ...tag, tagName: next } : tag
                                        ));

                                        setGlobalArtifacts((prev) => prev.map((artifact) => ({
                                            ...artifact,
                                            codes: Array.from(new Set((artifact.codes || []).map((codeName) =>
                                                String(codeName || '').trim() === previous ? next : codeName
                                            )))
                                        })));

                                        setAnalysisCanvases((prev) => prev.map((canvas) => ({
                                            ...canvas,
                                            themes: (canvas.themes || []).map((theme) => ({
                                                ...theme,
                                                codes: Array.from(new Set((theme.codes || []).map((codeName) =>
                                                    String(codeName || '').trim() === previous ? next : codeName
                                                )))
                                            }))
                                        })));

                                        setCodeDefinitions((prev) => {
                                            const current = { ...(prev || {}) };
                                            if (!(previous in current)) return current;
                                            const source = current[previous];
                                            if (next in current) {
                                                const existing = current[next];
                                                const sourceRecord = typeof source === 'string'
                                                    ? { definition: source, inclusion: '', exclusion: '', exemplars: '' }
                                                    : {
                                                        definition: source?.definition || '',
                                                        inclusion: source?.inclusion || '',
                                                        exclusion: source?.exclusion || '',
                                                        exemplars: source?.exemplars || ''
                                                    };
                                                const existingRecord = typeof existing === 'string'
                                                    ? { definition: existing, inclusion: '', exclusion: '', exemplars: '' }
                                                    : {
                                                        definition: existing?.definition || '',
                                                        inclusion: existing?.inclusion || '',
                                                        exclusion: existing?.exclusion || '',
                                                        exemplars: existing?.exemplars || ''
                                                    };
                                                current[next] = {
                                                    definition: existingRecord.definition || sourceRecord.definition,
                                                    inclusion: existingRecord.inclusion || sourceRecord.inclusion,
                                                    exclusion: existingRecord.exclusion || sourceRecord.exclusion,
                                                    exemplars: existingRecord.exemplars || sourceRecord.exemplars
                                                };
                                            } else {
                                                current[next] = source;
                                            }
                                            delete current[previous];
                                            return current;
                                        });
                                    }}
                                    onRenameCategoryLabel={(oldName, newName) => {
                                        const previous = String(oldName || '').trim();
                                        const next = String(newName || '').trim();
                                        if (!previous || !next || previous === next) return;

                                        const normalizeTagCategory = (value) => String(value || '').trim() || 'Uncategorized';
                                        const normalizeArtifactCategory = (value) => String(value || '').trim() || 'Artifact';

                                        setTags((prev) => prev.map((tag) =>
                                            normalizeTagCategory(tag.category) === previous ? { ...tag, category: next } : tag
                                        ));

                                        setObservationTags((prev) => prev.map((tag) =>
                                            normalizeTagCategory(tag.category) === previous ? { ...tag, category: next } : tag
                                        ));

                                        setGlobalArtifacts((prev) => prev.map((artifact) =>
                                            normalizeArtifactCategory(artifact.folder) === previous ? { ...artifact, folder: next } : artifact
                                        ));

                                        setCategoryDefinitions((prev) => {
                                            const current = { ...(prev || {}) };
                                            if (!(previous in current)) return current;
                                            const source = current[previous];
                                            if (next in current) {
                                                const existing = current[next];
                                                const sourceRecord = typeof source === 'string'
                                                    ? { definition: source, inclusion: '', exclusion: '', exemplars: '' }
                                                    : {
                                                        definition: source?.definition || '',
                                                        inclusion: source?.inclusion || '',
                                                        exclusion: source?.exclusion || '',
                                                        exemplars: source?.exemplars || ''
                                                    };
                                                const existingRecord = typeof existing === 'string'
                                                    ? { definition: existing, inclusion: '', exclusion: '', exemplars: '' }
                                                    : {
                                                        definition: existing?.definition || '',
                                                        inclusion: existing?.inclusion || '',
                                                        exclusion: existing?.exclusion || '',
                                                        exemplars: existing?.exemplars || ''
                                                    };
                                                current[next] = {
                                                    definition: existingRecord.definition || sourceRecord.definition,
                                                    inclusion: existingRecord.inclusion || sourceRecord.inclusion,
                                                    exclusion: existingRecord.exclusion || sourceRecord.exclusion,
                                                    exemplars: existingRecord.exemplars || sourceRecord.exemplars
                                                };
                                            } else {
                                                current[next] = source;
                                            }
                                            delete current[previous];
                                            return current;
                                        });
                                    }}
                                />
                            )}
                        </main>
                    </div>
                    <AppFooter />
                </div>
            );
        }

        function NavButton({ active, label, onClick }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full text-left px-4 py-3 rounded-xl transition font-medium ${active ? 'bg-tide text-white shadow' : 'hover:bg-slate-800 text-slate-200'}`}
                >
                    {label}
                </button>
            );
        }

        function BackupDashboard({ onBackup, onRestore, estimateBackupSize }) {
            const [backupPassword, setBackupPassword] = useState('');
            const [restorePassword, setRestorePassword] = useState('');
            const [restoreFile, setRestoreFile] = useState(null);
            const [message, setMessage] = useState('');
            const [estimatedSize, setEstimatedSize] = useState(null);

            useEffect(() => {
                const loadEstimatedSize = async () => {
                    if (estimateBackupSize) {
                        const size = await estimateBackupSize();
                        setEstimatedSize(size);
                    }
                };
                loadEstimatedSize();
            }, [estimateBackupSize]);

            const backupNow = async () => {
                if (backupPassword.length < 6) return setMessage('Backup password must be at least 6 characters.');
                await onBackup(backupPassword);
                setMessage('Encrypted backup downloaded. Keep the password safe.');
                setBackupPassword('');
            };

            const restoreNow = async () => {
                if (!restoreFile) return setMessage('Choose a backup file first.');
                if (!restorePassword) return setMessage('Enter backup password.');
                try {
                    await onRestore(restoreFile, restorePassword);
                    setMessage('Backup restored successfully.');
                    setRestorePassword('');
                    setRestoreFile(null);
                } catch (err) {
                    setMessage('Restore failed. Wrong password or invalid backup file.');
                }
            };

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-4xl mx-auto space-y-6 pt-2">
                        <div className="bg-white border rounded-2xl p-7 shadow-soft">
                            <h2 className="text-4xl font-display">Backup & Restore</h2>
                            <p className="text-slate-500 mt-2">Create encrypted password-protected backups of your entire QualiApp instance, including all transcripts, codes, participants, artifacts, and media files.</p>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6">
                            <div className="bg-white border rounded-2xl p-6 shadow-soft space-y-4">
                                <div>
                                    <h3 className="text-xl font-bold text-ink mb-2">Download Encrypted Backup</h3>
                                    <p className="text-sm text-slate-500 mb-4">Creates a .qbk file with all your data encrypted with AES-256-GCM. Store securely.</p>
                                    {estimatedSize !== null && (
                                        <div className="mb-4 p-3 rounded-lg bg-slate-50 border border-slate-200">
                                            <p className="text-xs font-semibold text-slate-600 uppercase">Estimated File Size</p>
                                            <p className="text-lg font-bold text-slate-800 mt-1">
                                                {estimatedSize < 1024 ? `${estimatedSize.toFixed(0)} bytes` : estimatedSize < 1024 * 1024 ? `${(estimatedSize / 1024).toFixed(1)} KB` : `${(estimatedSize / (1024 * 1024)).toFixed(1)} MB`}
                                            </p>
                                            <p className="text-xs text-slate-500 mt-1">Plan your storage accordingly</p>
                                        </div>
                                    )}
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-2">Backup Password (min 6 chars)</label>
                                    <input type="password" value={backupPassword} onChange={e => setBackupPassword(e.target.value)} placeholder="Enter a strong backup password" className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-tide" />
                                </div>
                                <button onClick={backupNow} className="w-full bg-tide hover:bg-teal-600 text-white px-4 py-3 rounded-lg font-bold transition">Download .qbk Backup</button>
                            </div>

                            <div className="bg-white border rounded-2xl p-6 shadow-soft space-y-4">
                                <div>
                                    <h3 className="text-xl font-bold text-ink mb-2">Restore from Backup</h3>
                                    <p className="text-sm text-slate-500 mb-4">Upload a previously downloaded .qbk file to restore a complete instance snapshot with all data and passwords.</p>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-2">Select Backup File</label>
                                    <input type="file" accept=".qbk,.json" onChange={e => setRestoreFile(e.target.files[0] || null)} className="w-full text-sm border rounded-lg p-3" />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-2">Backup Password</label>
                                    <input type="password" value={restorePassword} onChange={e => setRestorePassword(e.target.value)} placeholder="Enter the backup password" className="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-ember" />
                                </div>

                        {message && (

                        <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6">

                                <li>Backup passwords are never sent to any server</li>
                                <li>You control the backup password completely</li>
                                <li>Restore works without any network connection</li>
                                <li>Application and participant passwords are included in encrypted form</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        }

        function Dashboard({ transcripts, folders, onDownloadApp, onCreate, onCreateFolder, onRenameFolder, onDeleteFolder, onMoveTranscript, onRenameTranscript, onOpen, onDelete, participants }) {
            const [showModal, setShowModal] = useState(false);

                                                            <button

                                                                    e.stopPropagation();

                                                            <button

                                            {hoverFolder === folderName && dragTranscriptId && (

                                        {visibleTranscripts.map(t => (

                                                onClick={() => editingTitleId !== t.id && onOpen(t.id)}
                                            >

                                                    {editingTitleId === t.id ? (

                                                            <input

                                                                onKeyDown={(e) => {

                                                            <div className="flex gap-2">

                                                    {t.notes && <span className="text-xs bg-amber-50 text-amber-700 px-2 py-1 rounded-full">Memo</span>}
                                                    {t.activityLog && t.activityLog.length > 1 && <span className="text-xs bg-emerald-50 text-emerald-700 px-2 py-1 rounded-full">{t.activityLog.length} logs</span>}
                                                </div>
                                                <div className="mt-3" onClick={(e) => e.stopPropagation()}>
                                                    <label className="block text-[11px] font-semibold text-slate-500 mb-1">Move to folder</label>
                                                    <select
                                                        value={t.folder || 'Uncategorized'}
                                                        onChange={(e) => handleQuickMove(t.id, e.target.value)}
                                                        className="w-full border border-slate-300 rounded-lg p-2 text-xs bg-white focus:outline-none focus:ring-2 focus:ring-tide"
                                                    >
                                                        {folderList.map(name => (
                                                            <option key={name} value={name}>{name}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                {editingTitleId !== t.id && (
                                                    <button
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setEditingTitleId(t.id);
                                                            setEditingTitle(t.title || '');
                                                        }}
                                                        className="absolute top-3 right-10 opacity-0 group-hover:opacity-100 text-slate-400 hover:text-tide bg-white p-1 rounded"
                                                    >
                                                        Rename
                                                    </button>
                                                )}
                                                <button onClick={(e) => { e.stopPropagation(); onDelete(t.id); }} className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 bg-white p-1 rounded">Delete</button>
                                            </article>
                                        ))}
                                    </section>
                                )}
                            </div>
                        </section>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/65 flex items-center justify-center z-50 backdrop-blur-sm p-4">
                            <form onSubmit={handleSubmit} className="bg-white rounded-2xl p-8 w-full max-w-lg space-y-5 shadow-soft max-h-[90vh] overflow-y-auto">
                                <h3 className="text-3xl font-display">Add Transcript</h3>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-1">Title</label>
                                    <input required autoFocus value={title} onChange={e => setTitle(e.target.value)} className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-tide" placeholder="Participant 01" />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-1">Folder</label>
                                    <input list="folder_list" value={folder} onChange={e => setFolder(e.target.value)} className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-tide" placeholder="Leave empty for Uncategorized" />
                                    <datalist id="folder_list">{folderList.map(f => <option key={f} value={f} />)}</datalist>

                                <div>
                                    <label className="block text-sm font-semibold text-slate-600 mb-1">Modality</label>
                                    <select value={modality} onChange={e => setModality(e.target.value)} className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-tide bg-white">
                                        <option value="">Select later if needed</option>
                                        <option value="online">Online</option>

        function ArtifactDashboard({ artifacts, onUpdate, suggestedCodes = [], suggestedCategories = [] }) {
            const [editingId, setEditingId] = useState(null);
            const [editNotes, setEditNotes] = useState('');
            const [editCodes, setEditCodes] = useState([]);
            const [newCodeInput, setNewCodeInput] = useState('');
            const [editingArtifactFolder, setEditingArtifactFolder] = useState('');

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const fileId = Date.now().toString();
                await dbSet('files', `global_art_${fileId}`, file);
                const newArtifact = { id: fileId, name: file.name, type: file.type, date: new Date().toLocaleDateString(), notes: '', codes: [] };
                onUpdate([newArtifact, ...artifacts]);
            };

            const downloadArtifact = async (art) => {
                const file = await dbGet('files', `global_art_${art.id}`);
                if (file) {
                    const url = URL.createObjectURL(file);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = art.name;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            };

            const deleteArtifact = async (artId) => {
                if (confirm('Delete this project artifact forever?')) {
                    await dbDelete('files', `global_art_${artId}`);
                    onUpdate(artifacts.filter(a => a.id !== artId));
                }
            };

            const openEditArtifact = (art) => {
                setEditingId(art.id);
                setEditNotes(art.notes || '');
                setEditCodes(art.codes || []);
                setEditingArtifactFolder(art.folder || '');
                setNewCodeInput('');
            };

            const saveArtifactEdit = () => {
                if (!editingId) return;
                onUpdate(artifacts.map(a => a.id === editingId ? { ...a, folder: editingArtifactFolder, notes: editNotes, codes: editCodes } : a));
                setEditingId(null);
                setEditNotes('');
                setEditCodes([]);
                setEditingArtifactFolder('');
            };

            const addCodeToArtifact = () => {
                if (newCodeInput.trim() && !editCodes.includes(newCodeInput.trim())) {
                    setEditCodes([...editCodes, newCodeInput.trim()]);
                    setNewCodeInput('');
                }
            };

            const removeCodeFromArtifact = (code) => {
                setEditCodes(editCodes.filter(c => c !== code));
            };

            const setArtifactFolder = (artId, folder) => {
                onUpdate(artifacts.map(a => a.id === artId ? { ...a, folder: folder || '' } : a));
            };

            const folders = [...new Set(artifacts.map(a => a.folder).filter(Boolean))];
            const folderSuggestions = [...new Set([...folders, ...suggestedCategories].filter(Boolean))].sort((a, b) => a.localeCompare(b));
            const codeSuggestions = [...new Set([...(suggestedCodes || []), ...(editCodes || [])].filter(Boolean))].sort((a, b) => a.localeCompare(b));
            const artifactsByFolder = artifacts.reduce((acc, art) => {
                const folder = art.folder || 'Uncategorized';
                if (!acc[folder]) acc[folder] = [];
                acc[folder].push(art);
                return acc;
            }, {});

            return (
                <div className="p-8 h-full overflow-y-auto w-full max-w-6xl mx-auto">
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-3xl font-display text-ink">Project Artifacts</h2>
                            <p className="text-slate-500 mt-1">Store literature, IRB docs, or non-transcript materials organized by folders. Add notes and codes for analysis reference.</p>
                        </div>
                        <label className="bg-ink hover:bg-slate-800 text-white px-5 py-2.5 rounded-lg shadow-sm cursor-pointer transition">
                            Upload Document
                            <input type="file" className="hidden" onChange={handleFileUpload} />
                        </label>
                    </div>

                    <div className="bg-white border rounded-2xl p-4 shadow-soft mb-6">
                        <h3 className="font-bold text-sm mb-2">Existing Folders</h3>
                        {folders.length > 0 ? (
                            <p className="text-sm text-slate-600">{folders.join(', ')}</p>
                        ) : (
                            <p className="text-sm text-slate-400">No folders yet. Assign artifacts to folders in edit mode.</p>
                        )}

                    localStorage.setItem(participantPinKey, await stringHash(password));

            const editingParticipant = editingId ? participants.find(p => p.id === editingId) || null : null;
                const handleConsentFormUpload = async (participantId, e) => {
