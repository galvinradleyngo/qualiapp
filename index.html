        function Editor({ transcript, tags, allTags, activityTypes, onAddActivityType, onBack, onUpdateTranscript, onAddTag, onUpdateTag, onRemoveTag }) {
            const [mode, setMode] = useState('edit');
            const [content, setContent] = useState(transcript.content || '');
            const [contentHtml, setContentHtml] = useState(transcript.contentHtml || '');
            const [notes, setNotes] = useState(transcript.notes || '');
            const [modality, setModality] = useState(transcript.modality || '');
            const [saveStatus, setSaveStatus] = useState('saved');
            const [lastSavedAt, setLastSavedAt] = useState(null);
            const [showSavedToast, setShowSavedToast] = useState(false);
            const [audioUrl, setAudioUrl] = useState(null);
            const [uploadingAudio, setUploadingAudio] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(transcript.playbackRate || 1);

            const [pendingSelection, setPendingSelection] = useState(null);
            const [editingTagId, setEditingTagId] = useState(null);
            const [selectedTagId, setSelectedTagId] = useState(null);
            const [tagFormCategory, setTagFormCategory] = useState('');
            const [tagFormName, setTagFormName] = useState('');
            const [tagFormMemo, setTagFormMemo] = useState('');

            const [logType, setLogType] = useState('');
            const [logNote, setLogNote] = useState('');
            const activityLog = transcript.activityLog || [];

            const textRef = useRef(null);
            const editableRef = useRef(null);
            const audioRef = useRef(null);
            const SPEED_STEPS = [0.5, 0.75, 1, 1.25, 1.5, 2];

            const escapeHtml = (value) => String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            const plainToHtml = (value) => escapeHtml(value).replace(/\n/g, '<br>');

            const htmlToPlain = (value) => {
                const tmp = document.createElement('div');
                tmp.innerHTML = value || '';
                tmp.querySelectorAll('br').forEach(br => { br.replaceWith('\n'); });
                return (tmp.innerText || '').replace(/\r/g, '');
            };

            useEffect(() => {
                const nextContent = transcript.content || '';
                setContent(nextContent);
                setContentHtml(transcript.contentHtml || plainToHtml(nextContent));
                setNotes(transcript.notes || '');
                setModality(transcript.modality || '');
                setPlaybackRate(transcript.playbackRate || 1);
                setSaveStatus('saved');
            }, [transcript.id]);

            useEffect(() => {
                if (!audioRef.current) return;
                audioRef.current.playbackRate = playbackRate;
            }, [audioUrl, playbackRate]);

            useEffect(() => {
                if (!editableRef.current) return;
                if (mode !== 'edit') return;
                const expectedHtml = contentHtml || plainToHtml(content);
                if (editableRef.current.innerHTML !== expectedHtml) {
                    editableRef.current.innerHTML = expectedHtml;
                }
            }, [transcript.id, mode]);

            useEffect(() => {
                if (transcript.hasAudio) dbGet('files', `audio_${transcript.id}`).then(b => { if (b) setAudioUrl(URL.createObjectURL(b)); });
                return () => { if (audioUrl) URL.revokeObjectURL(audioUrl); };
            }, [transcript.id]);

            const handleEditableInput = () => {
                if (!editableRef.current) return;
                const html = editableRef.current.innerHTML;
                setContentHtml(html);
                setContent(htmlToPlain(html));
                setSaveStatus('unsaved');
            };

            const persistTranscriptDraft = (nextHtml, nextPlain, nextNotes) => {
                const savedHtml = transcript.contentHtml || plainToHtml(transcript.content || '');
                const savedPlain = transcript.content || '';
                const savedNotes = transcript.notes || '';

                if (nextHtml === savedHtml && nextPlain === savedPlain && nextNotes === savedNotes) {
                    return false;
                }

                setSaveStatus('saving');
                try {
                    onUpdateTranscript({
                        ...transcript,
                        content: nextPlain,
                        contentHtml: nextHtml,
                        notes: nextNotes,
                        modality
                    });
                    setLastSavedAt(new Date());
                    setSaveStatus('saved');
                } catch (_err) {
                    setSaveStatus('error');
                }

                return true;
            };

            useEffect(() => {
                const nextHtml = contentHtml || plainToHtml(content);
                const nextPlain = htmlToPlain(nextHtml);
                const savedHtml = transcript.contentHtml || plainToHtml(transcript.content || '');
                const savedPlain = transcript.content || '';
                const savedNotes = transcript.notes || '';

                if (nextHtml === savedHtml && nextPlain === savedPlain && notes === savedNotes) return;

                const timer = setTimeout(() => {
                    persistTranscriptDraft(nextHtml, nextPlain, notes);
                }, 300);

                return () => clearTimeout(timer);
            }, [contentHtml, content, notes, transcript, onUpdateTranscript]);

            const handleSave = () => {
                const latestHtml = editableRef.current ? editableRef.current.innerHTML : contentHtml;
                const latestPlain = htmlToPlain(latestHtml);
                setContentHtml(latestHtml);
                setContent(latestPlain);
                const didSave = persistTranscriptDraft(latestHtml, latestPlain, notes);
                if (!didSave) setSaveStatus('saved');
            };

            const handleManualSave = () => {
                handleSave();
                setShowSavedToast(true);
            };

            const formatTimecode = (seconds) => {
                const safeSeconds = Math.max(0, Math.floor(Number(seconds) || 0));
                const hours = Math.floor(safeSeconds / 3600);
                const minutes = Math.floor((safeSeconds % 3600) / 60);
                const secs = safeSeconds % 60;
                if (hours > 0) {
                    return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                }
                return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            };

            const playFromTimecode = (timeSeconds) => {
                if (!audioRef.current) return;
                const safeSeconds = Math.max(0, Number(timeSeconds) || 0);
                audioRef.current.currentTime = safeSeconds;
                const playAttempt = audioRef.current.play();
                if (playAttempt && typeof playAttempt.catch === 'function') {
                    playAttempt.catch(() => {});
                }
            };

            const insertBookmarkAtCurrentTime = () => {
                if (!audioUrl || !audioRef.current) {
                    alert('Attach audio before adding bookmarks.');
                    return;
                }
                if (!editableRef.current) return;

                const currentTime = audioRef.current.currentTime || 0;
                const label = formatTimecode(currentTime);
                const bookmark = document.createElement('span');
                bookmark.className = 'qa-timecode-bookmark';
                bookmark.setAttribute('data-time-sec', currentTime.toFixed(2));
                bookmark.setAttribute('contenteditable', 'false');
                bookmark.setAttribute('title', `Play from ${label}`);
                bookmark.textContent = `[${label}]`;

                const selection = window.getSelection();
                const range = selection && selection.rangeCount ? selection.getRangeAt(0) : null;
                const isInsideEditor = range && editableRef.current.contains(range.commonAncestorContainer);

                if (!isInsideEditor) {
                    editableRef.current.appendChild(document.createTextNode(' '));
                    editableRef.current.appendChild(bookmark);
                    editableRef.current.appendChild(document.createTextNode(' '));
                } else {
                    range.deleteContents();
                    const spaceBefore = document.createTextNode(' ');
                    const spaceAfter = document.createTextNode(' ');
                    range.insertNode(spaceAfter);
                    range.insertNode(bookmark);
                    range.insertNode(spaceBefore);

                    selection.removeAllRanges();
                    const nextRange = document.createRange();
                    nextRange.setStartAfter(spaceAfter);
                    nextRange.collapse(true);
                    selection.addRange(nextRange);
                }

                handleEditableInput();
            };

            const handleTimecodeBookmarkClick = (e) => {
                const target = e.target.closest('span.qa-timecode-bookmark');
                if (!target) return false;
                e.preventDefault();
                const timeSeconds = Number(target.getAttribute('data-time-sec'));
                if (!Number.isFinite(timeSeconds)) return true;
                playFromTimecode(timeSeconds);
                return true;
            };

            const handleModalityChange = (nextModality) => {
                const latestHtml = editableRef.current ? editableRef.current.innerHTML : (contentHtml || plainToHtml(content));
                const latestPlain = htmlToPlain(latestHtml);
                setContentHtml(latestHtml);
                setContent(latestPlain);
                setModality(nextModality);
                setSaveStatus('saving');
                try {
                    onUpdateTranscript({
                        ...transcript,
                        content: latestPlain,
                        contentHtml: latestHtml,
                        notes,
                        modality: nextModality
                    });
                    setLastSavedAt(new Date());
                    setSaveStatus('saved');
                } catch (_err) {
                    setSaveStatus('error');
                }
            };

            useEffect(() => {
                if (!showSavedToast) return;
                const timer = setTimeout(() => setShowSavedToast(false), 1800);
                return () => clearTimeout(timer);
            }, [showSavedToast]);

            const saveStatusText = saveStatus === 'saving'
                ? 'Saving...'
                : saveStatus === 'unsaved'
                    ? 'Unsaved changes'
                    : saveStatus === 'error'
                        ? 'Save failed'
                        : 'Saved';
            const saveStatusClass = saveStatus === 'saving'
                ? 'text-amber-700 bg-amber-100 border-amber-200'
                : saveStatus === 'unsaved'
                    ? 'text-slate-700 bg-slate-100 border-slate-200'
                    : saveStatus === 'error'
                        ? 'text-red-700 bg-red-100 border-red-200'
                        : 'text-emerald-700 bg-emerald-100 border-emerald-200';

            const applyBold = () => {
                if (!editableRef.current) return;
                editableRef.current.focus();
                document.execCommand('bold', false, null);
                handleEditableInput();
            };

            const applyInterviewerTag = () => {
                if (!editableRef.current) return;
                editableRef.current.focus();

                const sel = window.getSelection();
                if (!sel || !sel.rangeCount) return;
                const range = sel.getRangeAt(0);
                if (range.collapsed) return;
                if (!editableRef.current.contains(range.commonAncestorContainer)) return;

                try {
                    const span = document.createElement('span');
                    span.className = 'qa-interviewer';
                    span.setAttribute('data-speaker-role', 'interviewer');
                    span.setAttribute('title', 'Interviewer question/comment');

                    const fragment = range.extractContents();
                    span.appendChild(fragment);
                    range.insertNode(span);

                    sel.removeAllRanges();
                    const after = document.createRange();
                    after.setStartAfter(span);
                    after.collapse(true);
                    sel.addRange(after);
                    handleEditableInput();
                } catch (_err) {
                    // If selection cannot be wrapped as a single fragment, leave text unchanged.
                }
            };

            const removeInterviewerTag = () => {
                if (!editableRef.current) return false;
                const sel = window.getSelection();
                if (!sel || !sel.rangeCount) return false;
                const range = sel.getRangeAt(0);

                const editor = editableRef.current;
                const collectCandidates = () => {
                    const set = new Set();
                    if (range.collapsed) {
                        const node = sel.anchorNode;
                        const el = node && node.nodeType === 1 ? node : node?.parentElement;
                        const tagged = el && el.closest ? el.closest('span.qa-interviewer') : null;
                        if (tagged && editor.contains(tagged)) set.add(tagged);
                        return Array.from(set);
                    }

                    const walker = document.createTreeWalker(editor, NodeFilter.SHOW_ELEMENT);
                    let node;
                    while ((node = walker.nextNode())) {
                        if (!node.classList || !node.classList.contains('qa-interviewer')) continue;
                        try {
                            if (range.intersectsNode(node)) set.add(node);
                        } catch (_err) {
                            // ignore nodes that cannot be intersected in this browser state
                        }
                    }
                    return Array.from(set);
                };

                const taggedNodes = collectCandidates();
                if (!taggedNodes.length) return false;

                taggedNodes.forEach((el) => {
                    const parent = el.parentNode;
                    if (!parent) return;
                    while (el.firstChild) parent.insertBefore(el.firstChild, el);
                    parent.removeChild(el);
                });

                editor.normalize();
                handleEditableInput();
                return true;
            };

            const toggleInterviewerTag = () => {
                const removed = removeInterviewerTag();
                if (!removed) applyInterviewerTag();
            };

            useEffect(() => {
                const isSelectionOrFocusInsideEditor = () => {
                    const sel = window.getSelection();
                    const anchorNode = sel && sel.anchorNode;
                    const selectionInsideEditor = !!anchorNode && editableRef.current.contains(anchorNode);
                    const focusInsideEditor = editableRef.current.contains(document.activeElement);
                    return selectionInsideEditor || focusInsideEditor;
                };

                const onEditorShortcut = (e) => {
                    if (mode !== 'edit' || !editableRef.current) return;
                    if (!isSelectionOrFocusInsideEditor()) return;

                    const isSaveShortcut = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's';
                    const isBoldShortcut = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'b';
                    const isQuestionShortcut = (e.metaKey || e.ctrlKey) && (e.key === ';' || e.code === 'Semicolon');
                    if (isSaveShortcut) {
                        return;
                    }
                    if (isBoldShortcut) {
                        e.preventDefault();
                        applyBold();
                        return;
                    }
                    if (isQuestionShortcut) {
                        e.preventDefault();
                        toggleInterviewerTag();
                    }
                };

                window.addEventListener('keydown', onEditorShortcut);
                return () => window.removeEventListener('keydown', onEditorShortcut);
            }, [mode]);

            const handleAudioUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadingAudio(true);
                try {
                    await dbSet('files', `audio_${transcript.id}`, file);
                    const newUrl = URL.createObjectURL(file);
                    setAudioUrl(newUrl);
                    onUpdateTranscript({ ...transcript, content, contentHtml, notes, modality, playbackRate, hasAudio: true });
                } catch (err) {
                    alert('Failed to upload audio file.');
                } finally {
                    setUploadingAudio(false);
                }
            };

            const handleRemoveAudio = async () => {
                if (!confirm('Remove audio file from this transcript?')) return;
                await dbDelete('files', `audio_${transcript.id}`);
                if (audioUrl) URL.revokeObjectURL(audioUrl);
                setAudioUrl(null);
                onUpdateTranscript({ ...transcript, content, contentHtml, notes, modality, playbackRate, hasAudio: false });
            };

            const changePlaybackRate = (direction) => {
                const currentIndex = SPEED_STEPS.findIndex((step) => step >= playbackRate);
                const safeIndex = currentIndex === -1 ? SPEED_STEPS.length - 1 : currentIndex;
                const targetIndex = direction === 'up'
                    ? Math.min(SPEED_STEPS.length - 1, safeIndex + 1)
                    : Math.max(0, safeIndex - 1);
                const nextRate = SPEED_STEPS[targetIndex];
                if (nextRate === playbackRate) return;
                setPlaybackRate(nextRate);
                onUpdateTranscript({ ...transcript, content, contentHtml, notes, modality, playbackRate: nextRate });
            };

            const resetPlaybackRate = () => {
                if (playbackRate === 1) return;
                setPlaybackRate(1);
                onUpdateTranscript({ ...transcript, content, contentHtml, notes, modality, playbackRate: 1 });
            };

            const submitActivityLog = (e) => {
                e.preventDefault();
                if (!logType.trim()) return;
                onAddActivityType(logType.trim());
                const newLog = {
                    id: Date.now().toString(),
                    type: logType.trim(),
                    note: logNote.trim(),
                    timestamp: new Date().toISOString()
                };
                onUpdateTranscript({ ...transcript, content, contentHtml, notes, modality, activityLog: [newLog, ...activityLog] });
                setLogType('');
                setLogNote('');
            };

            const getSelectionOffset = (containerNode) => {
                const sel = window.getSelection();
                if (!sel.rangeCount) return null;
                const r = sel.getRangeAt(0);
                if (r.collapsed || !containerNode.contains(r.startContainer)) return null;
                const pre = r.cloneRange();
                pre.selectNodeContents(containerNode);
                pre.setEnd(r.startContainer, r.startOffset);
                const start = pre.toString().length;
                pre.setEnd(r.endContainer, r.endOffset);
                return { start, end: pre.toString().length, text: r.toString() };
            };

            const handleMouseUp = () => {
                if (mode !== 'code' || !textRef.current || editingTagId) return;
                setTimeout(() => {
                    const offset = getSelectionOffset(textRef.current);
                    if (offset && offset.text.trim()) {
                        setPendingSelection(offset);
                        setTagFormCategory('');
                        setTagFormName('');
                        setTagFormMemo('');
                    } else {
                        setPendingSelection(null);
                    }
                }, 40);
            };

            const submitTagForm = (e) => {
                e.preventDefault();

                if (!tagFormName.trim()) return;

                const normalizedCategory = tagFormCategory.trim() || 'Uncategorized';
                const normalizedCode = tagFormName.trim();

                if (editingTagId) {
                    const existing = tags.find(t => t.id === editingTagId);
                    if (!existing) return;
                    onUpdateTag({ ...existing, category: normalizedCategory, tagName: normalizedCode, memo: tagFormMemo });
                    setEditingTagId(null);
                    setSelectedTagId(existing.id);
                } else if (pendingSelection) {
                    onAddTag({
                        id: Date.now().toString(),
                        transcriptId: transcript.id,
                        category: normalizedCategory,
                        tagName: normalizedCode,
                        memo: tagFormMemo,
                        textSnippet: pendingSelection.text,
                        start: pendingSelection.start,
                        end: pendingSelection.end
                    });
                    setPendingSelection(null);
                    window.getSelection().removeAllRanges();
                }

                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
            };

            const openEditTag = (tag) => {
                setPendingSelection(null);
                window.getSelection().removeAllRanges();
                setEditingTagId(tag.id);
                setSelectedTagId(tag.id);
                setTagFormCategory(tag.category || '');
                setTagFormName(tag.tagName || '');
                setTagFormMemo(tag.memo || '');
            };

            const cancelTagForm = () => {
                setPendingSelection(null);
                setEditingTagId(null);
                window.getSelection().removeAllRanges();
                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
            };

            const scrollToTagHighlight = (tagId) => {
                if (!textRef.current || !tagId) return;
                const mark = textRef.current.querySelector(`mark[data-tag-id="${tagId}"]`);
                if (!mark) return;
                mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };

            const focusTag = (tag) => {
                setSelectedTagId(tag.id);
                setEditingTagId(null);
                setPendingSelection(null);
                window.getSelection().removeAllRanges();
                setTagFormCategory('');
                setTagFormName('');
                setTagFormMemo('');
                setTimeout(() => scrollToTagHighlight(tag.id), 0);
            };

            const renderHighlightedHtml = () => {
                const baseHtml = contentHtml || plainToHtml(content);
                if (!baseHtml) return '';
                if (!tags.length) return baseHtml;

                const container = document.createElement('div');
                container.innerHTML = baseHtml;
                const sorted = [...tags]
                    .filter(t => Number.isFinite(t.start) && Number.isFinite(t.end) && t.end > t.start)
                    .sort((a, b) => a.start - b.start);

                const locateTextOffset = (target) => {
                    const safeTarget = Math.max(0, target);
                    const base = document.createRange();
                    base.selectNodeContents(container);
                    const walker = document.createTreeWalker(
                        container,
                        NodeFilter.SHOW_ALL,
                        {
                            acceptNode: (node) => {
                                if (node.nodeType === Node.TEXT_NODE) return NodeFilter.FILTER_ACCEPT;
                                if (node.nodeType === Node.ELEMENT_NODE && node.nodeName === 'BR') return NodeFilter.FILTER_ACCEPT;
                                return NodeFilter.FILTER_SKIP;
                            }
                        }
                    );
                    let node;
                    while ((node = walker.nextNode())) {
                        if (node.nodeType === Node.TEXT_NODE) {
                            const before = base.cloneRange();
                            before.setEnd(node, 0);
                            const beforeLen = before.toString().length;

                            const after = base.cloneRange();
                            after.setEnd(node, node.textContent.length);
                            const afterLen = after.toString().length;

                            if (safeTarget <= afterLen) {
                                return {
                                    node,
                                    offset: Math.max(0, Math.min(node.textContent.length, safeTarget - beforeLen))
                                };
                            }
                            continue;
                        }
                        if (node.nodeName === 'BR') {
                            const parent = node.parentNode;
                            if (!parent) continue;
                            const index = Array.prototype.indexOf.call(parent.childNodes, node);

                            const before = base.cloneRange();
                            before.setEnd(parent, index);
                            const beforeLen = before.toString().length;

                            const after = base.cloneRange();
                            after.setEnd(parent, index + 1);
                            const afterLen = after.toString().length;

                            if (safeTarget <= afterLen) {
                                if (safeTarget <= beforeLen) return { node: parent, offset: index };
                                return { node: parent, offset: index + 1 };
                            }
                        }
                    }
                    return { node: container, offset: container.childNodes.length };
                };

                sorted.forEach((tag) => {
                    const startPos = locateTextOffset(tag.start);
                    const endPos = locateTextOffset(tag.end);
                    if (!startPos || !endPos) return;

                    try {
                        const range = document.createRange();
                        range.setStart(startPos.node, startPos.offset);
                        range.setEnd(endPos.node, endPos.offset);
                        if (range.collapsed) return;

                        const mark = document.createElement('mark');
                        const isEditingThis = editingTagId === tag.id;
                        mark.setAttribute('data-tag-id', tag.id);
                        mark.setAttribute('title', `${tag.category} > ${tag.tagName}`);
                        mark.className = `px-1 rounded cursor-pointer transition ${isEditingThis ? 'bg-orange-400 text-white shadow-md' : 'bg-teal-200 hover:bg-teal-300'}`;
                        const fragment = range.extractContents();
                        mark.appendChild(fragment);
                        range.insertNode(mark);
                    } catch (_err) {
                        // Ignore malformed ranges; transcript text and highlights can be edited independently.
                    }
                });

                return container.innerHTML;
            };

            const handleCodeClick = (e) => {
                if (handleTimecodeBookmarkClick(e)) return;
                const target = e.target.closest('mark[data-tag-id]');
                if (!target) return;
                const tagId = target.getAttribute('data-tag-id');
                const tag = tags.find(t => t.id === tagId);
                if (tag) focusTag(tag);
            };

            const existingCategories = [...new Set((allTags || []).map(t => (t.category || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
            const existingCodes = [...new Set((allTags || []).map(t => (t.tagName || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));

            return (
                <div className="flex flex-col h-full bg-white relative">
                    <div className="border-b px-6 py-4 flex items-center justify-between bg-white z-10">
                        <div className="flex items-center gap-4">
                            <button onClick={() => { handleSave(); onBack(); }} className="p-2 hover:bg-slate-200 rounded-full font-bold">Back</button>
                            <div className="flex items-center gap-4">
                                <h2 className="text-xl font-bold truncate max-w-sm border-l-2 pl-4 border-slate-300" title={transcript.title}>{transcript.title}</h2>
                                <div className="min-w-[180px]">
                                    <label className="block text-[11px] font-semibold uppercase tracking-wide text-slate-500 mb-1">Modality</label>
                                    <select value={modality} onChange={e => handleModalityChange(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-tide">
                                        <option value="">Not set</option>
                                        <option value="online">Online</option>
                                        <option value="onsite">Onsite</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className={`flex items-center px-2.5 py-1 rounded-md text-xs font-semibold border ${saveStatusClass}`}>
                                {saveStatusText}
                                {lastSavedAt && saveStatus === 'saved' && (
                                    <span className="ml-2 opacity-80">{lastSavedAt.toLocaleTimeString()}</span>
                                )}
                            </div>
                            <button onClick={handleManualSave} className="px-3 py-2 rounded-md text-sm font-bold border border-ink text-ink hover:bg-slate-100 transition">Save</button>
                            <div className="flex bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => {handleSave(); setMode('edit');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='edit'?'bg-amber-500 text-white':'text-slate-600 hover:bg-slate-200'}`}>Edit</button>
                                <button onClick={() => {handleSave(); setMode('code');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='code'?'bg-tide text-white':'text-slate-600 hover:bg-slate-200'}`}>Code</button>
                                <button onClick={() => {handleSave(); setMode('notes');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='notes'?'bg-ink text-white':'text-slate-600 hover:bg-slate-200'}`}>Memos</button>
                                <button onClick={() => {handleSave(); setMode('log');}} className={`px-4 py-2 rounded-md text-sm font-bold transition-all ${mode==='log'?'bg-emerald-600 text-white':'text-slate-600 hover:bg-slate-200'}`}>Activity</button>
                            </div>
                        </div>
                    </div>

                    <div className={`flex-1 flex overflow-hidden ${mode === 'code' ? 'flex-col lg:flex-row' : ''}`}>
                        <div className="flex-1 min-w-0 flex flex-col border-r relative bg-white">
                            {audioUrl ? (
                                <div className="sticky top-0 p-4 border-b border-slate-200/80 bg-slate-50/90 backdrop-blur-sm z-20 space-y-3 shadow-[0_1px_0_rgba(148,163,184,0.35),0_4px_12px_rgba(15,23,42,0.06)]">
                                    <div className="flex gap-4 items-center">
                                        <audio ref={audioRef} src={audioUrl} controls className="flex-1 h-10 outline-none" />
                                        <div className="flex items-center gap-2 px-3 py-1 rounded-lg border border-slate-200 bg-white">
                                            <button
                                                type="button"
                                                onClick={() => changePlaybackRate('down')}
                                                className="px-2 py-1 rounded border border-slate-300 text-slate-700 text-sm font-semibold hover:bg-slate-100"
                                                title="Slow down"
                                            >
                                                -
                                            </button>
                                            <span className="text-xs font-semibold text-slate-700 min-w-[44px] text-center">{playbackRate.toFixed(2).replace(/\.00$/, '')}x</span>
                                            <button
                                                type="button"
                                                onClick={() => changePlaybackRate('up')}
                                                className="px-2 py-1 rounded border border-slate-300 text-slate-700 text-sm font-semibold hover:bg-slate-100"
                                                title="Speed up"
                                            >
                                                +
                                            </button>
                                            <button
                                                type="button"
                                                onClick={resetPlaybackRate}
                                                className="px-2 py-1 rounded border border-slate-300 text-slate-700 text-xs font-semibold hover:bg-slate-100"
                                                title="Reset speed"
                                            >
                                                1x
                                            </button>
                                        </div>
                                        <button onClick={handleRemoveAudio} className="px-3 py-1 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-sm font-semibold">Remove</button>
                                        <label className="px-3 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-lg text-sm font-semibold cursor-pointer">
                                            Replace
                                            <input type="file" accept="audio/*" onChange={handleAudioUpload} className="hidden" disabled={uploadingAudio} />
                                        </label>
                                    </div>
                                </div>
                            ) : (
                                <div className="sticky top-0 p-4 border-b border-slate-200/80 bg-slate-50/90 backdrop-blur-sm z-20 shadow-[0_1px_0_rgba(148,163,184,0.35),0_4px_12px_rgba(15,23,42,0.06)]">
                                    <label className="flex gap-4 items-center cursor-pointer hover:bg-slate-100 p-3 rounded-lg transition">
                                        <span className="text-sm font-semibold text-slate-700">
                                            {uploadingAudio ? 'Uploading audio...' : 'Click to attach audio file'}
                                        </span>
                                        <input type="file" accept="audio/*" onChange={handleAudioUpload} className="hidden" disabled={uploadingAudio} />
                                    </label>
                                </div>
                            )}

                            <div className="flex-1 overflow-y-auto p-8 pt-4">
                                {mode === 'edit' && (
                                    <div className="space-y-3">
                                        <div className="sticky top-0 z-10 flex items-center gap-2 bg-slate-50/95 backdrop-blur-sm border border-slate-200/80 rounded-lg p-2 shadow-[0_1px_0_rgba(148,163,184,0.25),0_3px_10px_rgba(15,23,42,0.06)]">
                                            <button
                                                type="button"
                                                onClick={applyBold}
                                                className="px-3 py-1.5 rounded bg-white border border-slate-300 text-slate-700 text-sm font-semibold hover:bg-slate-100"
                                                title="Bold selected text"
                                            >
                                                Bold
                                            </button>
                                            <button
                                                type="button"
                                                onClick={toggleInterviewerTag}
                                                className="px-3 py-1.5 rounded bg-amber-100 border border-amber-300 text-amber-900 text-sm font-semibold hover:bg-amber-200"
                                                title="Tag selected text as interviewer question/comment"
                                            >
                                                Tag Interviewer (;)
                                            </button>
                                            <button
                                                type="button"
                                                onClick={insertBookmarkAtCurrentTime}
                                                className={`px-3 py-1.5 rounded border text-sm font-semibold ${audioUrl ? 'bg-blue-100 border-blue-300 text-blue-900 hover:bg-blue-200' : 'bg-slate-100 border-slate-300 text-slate-500 cursor-not-allowed'}`}
                                                title={audioUrl ? 'Insert clickable time bookmark at current playback time' : 'Attach audio to enable bookmarks'}
                                                disabled={!audioUrl}
                                            >
                                                Add Bookmark
                                            </button>
                                            <span className="text-xs text-slate-500">Use Bold or tag interviewer questions/comments. Shortcut: Cmd/Ctrl + ; for interviewer tag.</span>
                                        </div>
                                        <div
                                            ref={editableRef}
                                            contentEditable
                                            suppressContentEditableWarning
                                            onInput={handleEditableInput}
                                            onClick={handleTimecodeBookmarkClick}
                                            onBlur={handleSave}
                                            className="w-full h-full min-h-[500px] outline-none text-lg leading-relaxed text-slate-800 p-3 border-dashed border-2 border-slate-200 rounded-xl bg-slate-50 focus-within:bg-white focus-within:border-amber-400 transition whitespace-pre-wrap"
                                        />
                                    </div>
                                )}
                                {mode === 'code' && (
                                    <div ref={textRef} onMouseUp={handleMouseUp} onClick={handleCodeClick} className="code-surface max-w-full overflow-x-hidden break-words text-lg leading-relaxed whitespace-pre-wrap outline-none pb-32 text-slate-800 p-2">
                                        {content ? (
                                            <div dangerouslySetInnerHTML={{ __html: renderHighlightedHtml() }} />
                                        ) : <span className="text-slate-400 italic">No text found. Switch to Edit mode to paste your transcript.</span>}
                                    </div>
                                )}
                                {mode === 'notes' && (
                                    <div className="h-full flex flex-col max-w-3xl mx-auto w-full">
                                        <textarea value={notes} onChange={e => { setNotes(e.target.value); setSaveStatus('unsaved'); }} onBlur={handleSave} placeholder="Type overarching observations and context for this transcript..." className="flex-1 w-full resize-none outline-none border border-slate-300 bg-white p-6 rounded-xl text-lg text-slate-800 leading-relaxed shadow-sm focus:ring-2 ring-ink transition" />
                                    </div>
                                )}
                                {mode === 'log' && (
                                    <div className="flex flex-col max-w-3xl mx-auto w-full">
                                        <form onSubmit={submitActivityLog} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm mb-8">
                                            <h3 className="font-bold text-lg text-slate-800 mb-4">Add New Activity</h3>
                                            <div className="flex flex-col md:flex-row gap-4 mb-4">
                                                <div className="w-full md:w-1/3">
                                                    <label className="block text-xs uppercase font-bold text-slate-500 mb-1">Activity Type *</label>
                                                    <input type="text" required list="activityTypesList" value={logType} onChange={e => setLogType(e.target.value)} placeholder="e.g. Coded" className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" />
                                                    <datalist id="activityTypesList">{activityTypes.map(t => <option key={t} value={t} />)}</datalist>
                                                </div>
                                                <div className="w-full md:w-2/3">
                                                    <label className="block text-xs uppercase font-bold text-slate-500 mb-1">Details / Notes (Optional)</label>
                                                    <input type="text" value={logNote} onChange={e => setLogNote(e.target.value)} placeholder="e.g. Finished first pass of coding." className="w-full border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" />
                                                </div>
                                            </div>
                                            <div className="flex justify-end">
                                                <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-6 rounded-lg">Log Activity</button>
                                            </div>
                                        </form>

                                        <h3 className="font-bold text-lg text-slate-800 mb-4">History</h3>
                                        <div className="relative border-l-2 border-slate-200 ml-3 space-y-6 pb-12">
                                            {activityLog.map((log) => (
                                                <div key={log.id} className="relative pl-6">
                                                    <div className="absolute w-4 h-4 bg-emerald-500 rounded-full -left-[9px] top-1 border-2 border-white shadow-sm"></div>
                                                    <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <span className="font-bold text-slate-800">{log.type}</span>
                                                            <span className="text-xs text-slate-400 font-medium">{new Date(log.timestamp).toLocaleString()}</span>
                                                        </div>
                                                        {log.note && <p className="text-sm text-slate-600">{log.note}</p>}
                                                    </div>
                                                </div>
                                            ))}
                                            {activityLog.length === 0 && <p className="pl-6 text-slate-400 italic">No activities logged yet.</p>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {mode === 'code' && (
                            <div className="w-full lg:w-96 lg:min-w-96 bg-slate-50 flex flex-col border-t lg:border-t-0 lg:border-l border-slate-200 z-20 overflow-y-auto max-h-[48vh] lg:max-h-none">
                                <div className="p-5 border-b bg-white shrink-0">
                                    <h3 className="font-bold text-lg text-slate-800 mb-2">{editingTagId ? 'Edit Code' : (pendingSelection ? 'Save New Code' : 'Document Codes')}</h3>
                                    {(pendingSelection || editingTagId) ? (
                                        <form onSubmit={submitTagForm} className={`p-4 rounded-xl border-2 overflow-hidden ${editingTagId ? 'bg-orange-50 border-orange-300' : 'bg-teal-50 border-teal-300'}`}>
                                            <p className="text-xs text-slate-600 mb-3 line-clamp-3 break-words italic bg-white p-2 rounded border">"{pendingSelection ? pendingSelection.text : tags.find(t=>t.id===editingTagId)?.textSnippet}"</p>

                                            <datalist id="categories">{existingCategories.map(c => <option key={c} value={c} />)}</datalist>
                                            <datalist id="tags">{existingCodes.map(c => <option key={c} value={c} />)}</datalist>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Parent Category</label>
                                            <input
                                                type="text"
                                                list="categories"
                                                value={tagFormCategory}
                                                onChange={e => setTagFormCategory(e.target.value)}
                                                placeholder="e.g. Coping"
                                                className="w-full border border-slate-300 rounded p-2 text-sm mb-3 focus:ring-2 focus:ring-tide outline-none"
                                            />
                                            <div className="mb-3">
                                                <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">Common Categories</p>
                                                <div className="flex flex-wrap gap-1.5 max-h-16 overflow-y-auto">
                                                    {existingCategories.slice(0, 12).map(category => (
                                                        <button
                                                            key={`cat_${category}`}
                                                            type="button"
                                                            onClick={() => setTagFormCategory(category)}
                                                            className="px-2 py-1 rounded-full text-[11px] border border-slate-300 bg-white hover:bg-slate-100 text-slate-700"
                                                        >
                                                            {category}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Specific Code *</label>
                                            <input
                                                type="text"
                                                autoFocus
                                                list="tags"
                                                value={tagFormName}
                                                onChange={e => setTagFormName(e.target.value)}
                                                placeholder="e.g. Humor"
                                                className="w-full border border-slate-300 rounded p-2 text-sm mb-3 focus:ring-2 focus:ring-tide outline-none"
                                            />
                                            <div className="mb-3">
                                                <p className="text-[10px] uppercase font-bold text-slate-500 mb-1">Common Codes</p>
                                                <div className="flex flex-wrap gap-1.5 max-h-16 overflow-y-auto">
                                                    {existingCodes.slice(0, 16).map(code => (
                                                        <button
                                                            key={`code_${code}`}
                                                            type="button"
                                                            onClick={() => setTagFormName(code)}
                                                            className="px-2 py-1 rounded-full text-[11px] border border-teal-200 bg-teal-50 hover:bg-teal-100 text-teal-800"
                                                        >
                                                            {code}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Code Memo</label>
                                            <textarea
                                                value={tagFormMemo}
                                                onChange={e => setTagFormMemo(e.target.value)}
                                                placeholder="Why is this interesting?"
                                                className="w-full border border-slate-300 rounded p-2 text-sm mb-4 focus:ring-2 focus:ring-tide outline-none resize-none h-20"
                                            />

                                            <div className="flex gap-2">
                                                <button type="button" onClick={cancelTagForm} className="flex-1 py-2 bg-white border border-slate-300 text-slate-600 font-semibold rounded">Cancel</button>
                                                <button type="submit" className={`flex-1 py-2 text-white font-bold rounded ${editingTagId ? 'bg-orange-500 hover:bg-orange-600' : 'bg-tide hover:bg-teal-600'}`}>{editingTagId ? 'Update' : 'Save Code'}</button>
                                            </div>
                                        </form>
                                    ) : (
                                        <p className="text-sm text-slate-500 border-2 border-dashed border-slate-300 p-4 rounded-xl text-center bg-slate-100">Highlight text in the transcript to assign a code.</p>
                                    )}
                                </div>

                                <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
                                    {tags.length === 0 && !pendingSelection && !editingTagId && <p className="text-center text-slate-400 text-sm mt-10">No codes yet in this document.</p>}
                                    {tags.map(tag => (
                                        <div key={tag.id} className={`bg-white p-3 rounded-lg border shadow-sm relative group transition cursor-pointer ${editingTagId === tag.id ? 'ring-2 ring-orange-400 border-orange-400' : (selectedTagId === tag.id ? 'ring-2 ring-tide border-tide' : 'hover:border-tide')}`} onClick={() => focusTag(tag)}>
                                            <div className="mb-1 pr-6">
                                                <span className="text-[10px] uppercase font-bold text-slate-400 block mb-0.5">{tag.category || 'Uncategorized'}</span>
                                                <span className="text-xs font-bold text-teal-800 bg-teal-100 border border-teal-200 px-2 py-0.5 rounded inline-block">{tag.tagName}</span>
                                            </div>
                                            <p className="text-xs text-slate-600 italic mt-2 line-clamp-2 bg-slate-50 p-1 rounded">"{tag.textSnippet}"</p>
                                            {tag.memo && <p className="text-[11px] text-slate-700 mt-2 line-clamp-2">{tag.memo}</p>}
                                            {selectedTagId === tag.id && (
                                                <div className="mt-3 flex gap-2">
                                                    <button
                                                        type="button"
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            openEditTag(tag);
                                                        }}
                                                        className="flex-1 py-1.5 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 text-xs font-semibold rounded"
                                                    >
                                                        Edit
                                                    </button>
                                                    <button
                                                        type="button"
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            if (editingTagId === tag.id) setEditingTagId(null);
                                                            setSelectedTagId(null);
                                                            onRemoveTag(tag.id);
                                                        }}
                                                        className="flex-1 py-1.5 bg-red-50 border border-red-200 hover:bg-red-100 text-red-700 text-xs font-semibold rounded"
                                                    >
                                                        Delete
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {mode !== 'code' && (
                            <div className="w-80 bg-slate-100 flex flex-col justify-center items-center border-l border-slate-200 p-8 text-center text-slate-500">
                                Switch to Code mode to add and edit qualitative codes.
                            </div>
                        )}
                    </div>
                    {showSavedToast && (
                        <div className="absolute right-5 bottom-5 z-30 px-4 py-2 rounded-lg bg-ink text-white text-sm shadow-soft border border-slate-700">
                            Saved to this device
                        </div>
                    )}
                </div>
            );
        }

        function AnalysisBoard({ tags, canvases, onUpdate, artifacts, transcripts, participants, observations, observationTags, sourceFilterPresets, onSaveSourceFilterPreset, onDeleteSourceFilterPreset }) {
            const [newCanvasName, setNewCanvasName] = useState('');
            const [activeCanvasId, setActiveCanvasId] = useState(canvases[0]?.id || null);
            const [newThemeName, setNewThemeName] = useState('');
            const [editingThemeId, setEditingThemeId] = useState(null);
            const [editThemeName, setEditThemeName] = useState('');
            const [selectedFolders, setSelectedFolders] = useState([]);
            const [selectedSourceIds, setSelectedSourceIds] = useState([]);
            const [showExportMenu, setShowExportMenu] = useState(false);
            const hasInitializedSourceFilter = useRef(false);

            const csvEscape = (value) => {
                const text = String(value ?? '');
                if (/[",\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
                return text;
            };

            const downloadCsv = (filename, lines) => {
                const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            const downloadWordDoc = (filename, htmlContent) => {
                const wrapped = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body>${htmlContent}</body></html>`;
                const blob = new Blob([wrapped], { type: 'application/msword;charset=utf-8' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
                URL.revokeObjectURL(link.href);
            };

            const escapeForHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            const buildApaTableHtml = (tableNumber, title, columns, rows, noteText) => {
                const header = columns.map(col => `<th style="text-align:left;padding:6px;border-bottom:1.5px solid #000;font-weight:700;">${escapeForHtml(col)}</th>`).join('');
                const body = rows.map(row => `<tr>${row.map(cell => `<td style="padding:6px;border-bottom:1px solid #d1d5db;vertical-align:top;">${escapeForHtml(cell)}</td>`).join('')}</tr>`).join('');

                return `
                    <div style="font-family:'Times New Roman',serif;font-size:12pt;line-height:1.35;margin-bottom:24px;">
                        <div style="font-weight:700;">Table ${tableNumber}</div>
                        <div style="font-style:italic;margin:4px 0 10px 0;">${escapeForHtml(title)}</div>
                        <table style="width:100%;border-collapse:collapse;border-top:1.5px solid #000;">
                            <thead><tr>${header}</tr></thead>
                            <tbody>${body || `<tr><td colspan="${columns.length}" style="padding:6px;">No rows available.</td></tr>`}</tbody>
                        </table>
                        <div style="margin-top:6px;"><span style="font-style:italic;">Note.</span> ${escapeForHtml(noteText)}</div>
                    </div>
                `;
            };

            useEffect(() => {
                if (!activeCanvasId && canvases[0]) setActiveCanvasId(canvases[0].id);
            }, [canvases, activeCanvasId]);

            const transcriptById = useMemo(() => {
                const out = {};
                transcripts.forEach(t => { out[t.id] = t; });
                return out;
            }, [transcripts]);

            const participantCodeById = useMemo(() => {
                const out = {};
                (participants || []).forEach(p => { out[p.id] = p.pseudonym || p.id; });
                return out;
            }, [participants]);

            const sourceFilterGroups = useMemo(() => ([
                {
                    type: 'transcript',
                    label: sourceFilterTypeLabels.transcript,
                    items: (transcripts || []).map((transcript) => ({
                        filterId: buildSourceFilterId('transcript', transcript.id),
                        label: transcript.title || `Transcript ${String(transcript.id).slice(-4)}`,
                        meta: transcript.folder || 'Uncategorized'
                    }))
                },
                {
                    type: 'artifact',
                    label: sourceFilterTypeLabels.artifact,
                    items: (artifacts || []).map((artifact) => ({
                        filterId: buildSourceFilterId('artifact', artifact.id),
                        label: artifact.name || `Artifact ${String(artifact.id).slice(-4)}`,
                        meta: artifact.folder || 'Uncategorized'
                    }))
                },
                {
                    type: 'observation',
                    label: sourceFilterTypeLabels.observation,
                    items: (observations || []).map((observation) => ({
                        filterId: buildSourceFilterId('observation', observation.id),
                        label: observation.title || `Observation ${String(observation.id).slice(-4)}`,
                        meta: [observation.location || 'Onsite Observation', observation.date].filter(Boolean).join(' • ')
                    }))
                }
            ]), [transcripts, artifacts, observations]);

            useEffect(() => {
                const allIds = sourceFilterGroups.flatMap((group) => group.items.map((item) => item.filterId));
                setSelectedSourceIds((prev) => {
                    if (!hasInitializedSourceFilter.current) {
                        hasInitializedSourceFilter.current = true;
                        return allIds;
                    }
                    const prevSet = new Set(prev);
                    const retained = prev.filter((id) => allIds.includes(id));
                    const added = allIds.filter((id) => !prevSet.has(id));
                    return [...retained, ...added];
                });
            }, [sourceFilterGroups]);

            const selectedSourceSet = useMemo(() => new Set(selectedSourceIds), [selectedSourceIds]);

            const toggleSourceItem = (filterId) => {
                setSelectedSourceIds((prev) => prev.includes(filterId)
                    ? prev.filter((id) => id !== filterId)
                    : [...prev, filterId]
                );
            };

            const handleSelectAllSources = () => {
                setSelectedSourceIds(sourceFilterGroups.flatMap((group) => group.items.map((item) => item.filterId)));
            };

            const handleClearAllSources = () => {
                setSelectedSourceIds([]);
            };

            const handleApplyPreset = (resolvedIds) => {
                setSelectedSourceIds(resolvedIds);
            };

            const handleToggleSourceGroup = (type) => {
                const group = sourceFilterGroups.find((entry) => entry.type === type);
                if (!group) return;
                const groupIds = group.items.map((item) => item.filterId);
                setSelectedSourceIds((prev) => {
                    const hasAll = groupIds.every((id) => prev.includes(id));
                    return hasAll
                        ? prev.filter((id) => !groupIds.includes(id))
                        : [...new Set([...prev, ...groupIds])];
                });
            };

            const availableFolders = useMemo(() => {
                const set = new Set();
                transcripts.forEach(t => set.add(t.folder || 'Uncategorized'));
                (artifacts || []).forEach(a => set.add(a.folder || 'Uncategorized'));
                (observations || []).forEach(o => set.add(o.location || 'Onsite Observation'));
                return Array.from(set).sort((a, b) => a.localeCompare(b));
            }, [transcripts, artifacts, observations]);

            useEffect(() => {
                if (selectedFolders.length === 0 && availableFolders.length > 0) {
                    setSelectedFolders(availableFolders);
                }
            }, [availableFolders, selectedFolders.length]);

            const selectedFolderSet = useMemo(() => new Set(selectedFolders), [selectedFolders]);

            const codeDetails = useMemo(() => {
                const map = {};
                tags.forEach(t => {
                    const parent = transcriptById[t.transcriptId];
                    const folder = parent?.folder || 'Uncategorized';
                    if (!selectedSourceSet.has(buildSourceFilterId('transcript', t.transcriptId))) return;
                    if (!selectedFolderSet.has(folder)) return;
                    if (!map[t.tagName]) {
                        map[t.tagName] = {
                            name: t.tagName,
                            category: t.category || 'Uncategorized',
                            count: 0,
                            sourceSet: new Set(),
                            quotes: [],
                            folders: new Set()
                        };
                    }
                    map[t.tagName].count += 1;
                    map[t.tagName].sourceSet.add('transcript');
                    map[t.tagName].folders.add(folder);
                    const participantCode = parent?.participantId ? (participantCodeById[parent.participantId] || parent.participantId) : null;
                    map[t.tagName].quotes.push({
                        source: 'Transcript',
                        folder,
                        ref: participantCode || `Transcript ${String(t.transcriptId).slice(-4)}`,
                        text: t.textSnippet || ''
                    });
                });

                (artifacts || []).forEach(art => {
                    const folder = art.folder || 'Uncategorized';
                    if (!selectedSourceSet.has(buildSourceFilterId('artifact', art.id))) return;
                    if (!selectedFolderSet.has(folder)) return;
                    (art.codes || []).forEach(codeName => {
                        if (!map[codeName]) {
                            map[codeName] = {
                                name: codeName,
                                category: 'Artifact',
                                count: 0,
                                sourceSet: new Set(),
                                quotes: [],
                                folders: new Set()
                            };
                        }
                        map[codeName].sourceSet.add('artifact');
                        map[codeName].folders.add(folder);
                        if (art.notes && art.notes.trim()) {
                            map[codeName].quotes.push({
                                source: 'Artifact',
                                folder,
                                ref: art.name,
                                text: art.notes
                            });
                        }
                    });
                });

                (observationTags || []).forEach(t => {
                    const parent = (observations || []).find(o => o.id === t.observationId);
                    const folder = parent?.location || 'Onsite Observation';
                    if (!selectedSourceSet.has(buildSourceFilterId('observation', t.observationId))) return;
                    if (!selectedFolderSet.has(folder)) return;
                    if (!map[t.tagName]) {
                        map[t.tagName] = {
                            name: t.tagName,
                            category: t.category || 'Uncategorized',
                            count: 0,
                            sourceSet: new Set(),
                            quotes: [],
                            folders: new Set()
                        };
                    }
                    map[t.tagName].count += 1;
                    map[t.tagName].sourceSet.add('observation');
                    map[t.tagName].folders.add(folder);
                    map[t.tagName].quotes.push({
                        source: 'Observation',
                        folder,
                        ref: parent ? parent.title : `Observation ${String(t.observationId).slice(-4)}`,
                        text: t.textSnippet || ''
                    });
                });

                return Object.values(map)
                    .map((c) => ({
                        ...c,
                        source: (() => {
                            const s = c.sourceSet;
                            const count = [s.has('transcript'), s.has('artifact'), s.has('observation')].filter(Boolean).length;
                            if (count > 1) return 'multiple';
                            if (s.has('artifact')) return 'artifact';
                            if (s.has('observation')) return 'observation';
                            return 'transcript';
                        })()
                    }))
                    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
            }, [tags, artifacts, observationTags, observations, transcriptById, selectedFolderSet, participantCodeById, selectedSourceSet]);

            const activeCanvas = canvases.find(c => c.id === activeCanvasId) || null;
            const uniqueCodeCount = useMemo(() => new Set(codeDetails.map(c => (c.name || '').trim()).filter(Boolean)).size, [codeDetails]);
            const uniqueCategoryCount = useMemo(() => new Set(codeDetails.map(c => (c.category || 'Uncategorized').trim() || 'Uncategorized')).size, [codeDetails]);
            const uniqueThemeCount = useMemo(() => {
                if (!activeCanvas) return 0;
                return new Set((activeCanvas.themes || []).map(t => (t.name || '').trim()).filter(Boolean)).size;
            }, [activeCanvas]);

            const createCanvas = () => {
                if (!newCanvasName.trim()) return;
                const c = { id: Date.now().toString(), name: newCanvasName.trim(), themes: [] };
                onUpdate([c, ...canvases]);
                setActiveCanvasId(c.id);
                setNewCanvasName('');
            };

            const deleteCanvas = (canvasId) => {
                if (confirm('Delete this canvas and all its themes?')) {
                    const updated = canvases.filter(c => c.id !== canvasId);
                    onUpdate(updated);
                    if (activeCanvasId === canvasId) setActiveCanvasId(updated[0]?.id || null);
                }
            };

            const renameCanvas = (canvasId) => {
                const newName = prompt('Enter new canvas name:');
                if (newName && newName.trim()) {
                    onUpdate(canvases.map(c => c.id === canvasId ? { ...c, name: newName.trim() } : c));
                }
            };

            const addTheme = () => {
                if (!activeCanvas || !newThemeName.trim()) return;
                const updated = { ...activeCanvas, themes: [...activeCanvas.themes, { id: Date.now().toString(), name: newThemeName.trim(), codes: [] }] };
                onUpdate(canvases.map(c => c.id === updated.id ? updated : c));
                setNewThemeName('');
            };

            const deleteTheme = (themeId) => {
                if (!activeCanvas) return;
                if (confirm('Delete this theme?')) {
                    const updated = { ...activeCanvas, themes: activeCanvas.themes.filter(t => t.id !== themeId) };
                    onUpdate(canvases.map(c => c.id === updated.id ? updated : c));
                }
            };

            const startEditTheme = (theme) => {
                setEditingThemeId(theme.id);
                setEditThemeName(theme.name);
            };

            const saveEditTheme = () => {
                if (!activeCanvas || !editingThemeId) return;
                const updated = { ...activeCanvas, themes: activeCanvas.themes.map(t => t.id === editingThemeId ? { ...t, name: editThemeName.trim() } : t) };
                onUpdate(canvases.map(c => c.id === updated.id ? updated : c));
                setEditingThemeId(null);
                setEditThemeName('');
            };

            const moveCodeToTheme = (themeId, codeName) => {
                if (!activeCanvas) return;
                const nextThemes = activeCanvas.themes.map(t => ({ ...t, codes: t.codes.filter(c => c !== codeName) }));
                const idx = nextThemes.findIndex(t => t.id === themeId);
                if (idx >= 0 && !nextThemes[idx].codes.includes(codeName)) nextThemes[idx].codes.push(codeName);
                const updated = { ...activeCanvas, themes: nextThemes };
                onUpdate(canvases.map(c => c.id === updated.id ? updated : c));
            };

            const removeCodeFromTheme = (themeId, codeName) => {
                if (!activeCanvas) return;
                const updated = {
                    ...activeCanvas,

            const assignedCodes = new Set((activeCanvas?.themes || []).flatMap(t => t.codes));
            const unassigned = codeDetails.filter(c => !assignedCodes.has(c.name));

            const codeDetailByName = useMemo(() => {

            const buildCanvasTableRows = (canvas) => {

                (canvas.themes || []).forEach((theme) => {

                        rows.push({

            const tableRows = useMemo(() => buildCanvasTableRows(activeCanvas), [activeCanvas, codeDetailByName]);

            const exportCanvasCsv = () => {

            const exportAllCanvasTablesCsv = () => {

                canvases.forEach((canvas) => {
                    const rows = buildCanvasTableRows(canvas);
                    rows.forEach((r) => {

                        lines.push([
                            csvEscape(canvas.name),

                            csvEscape(r.code),
                            csvEscape(r.category),
                            csvEscape(r.quoteCount),
                            csvEscape(quotes)

            const exportCanvasApaDoc = () => {

            const exportAllCanvasApaDoc = () => {

                        rows.map((row) => [

                downloadWordDoc(`QualiApp_APA7_All_Analysis_Canvas_Tables_${new Date().toISOString().slice(0, 10)}.doc`, html);
            };

            const toggleFolder = (folder) => {

            return (
                <div className="p-8 h-full overflow-y-auto">
                    <div className="max-w-7xl mx-auto space-y-6">
                        <div className="bg-white border rounded-2xl p-6 shadow-soft">
                            <h2 className="text-3xl font-display">Analysis Canvases</h2>

                        </div>

                        <SourceItemFilterPanel

                        <div className="bg-white border rounded-2xl p-5 shadow-soft grid md:grid-cols-3 gap-4">

                                <input value={newCanvasName} onChange={e => setNewCanvasName(e.target.value)} placeholder="New canvas name" className="flex-1 border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-tide" />

                                                    <button type="button" onClick={() => { exportCanvasCsv(); setShowExportMenu(false); }} className="w-full text-left px-2 py-2 rounded hover:bg-slate-100 text-sm text-slate-700">Canvas table (.csv)</button>
                                                    <button type="button" onClick={() => { exportAllCanvasTablesCsv(); setShowExportMenu(false); }} className="w-full text-left px-2 py-2 rounded hover:bg-slate-100 text-sm text-slate-700">All canvas tables (.csv)</button>
                                                    <div className="my-1 border-t" />
                                                    <p className="px-2 py-1 text-[11px] uppercase font-bold tracking-wide text-slate-500">APA7 Word (.doc)</p>
                                                    <button type="button" onClick={() => { exportCanvasApaDoc(); setShowExportMenu(false); }} className="w-full text-left px-2 py-2 rounded hover:bg-slate-100 text-sm text-slate-700">Canvas table APA7 (.doc)</button>
                                                    <button type="button" onClick={() => { exportAllCanvasApaDoc(); setShowExportMenu(false); }} className="w-full text-left px-2 py-2 rounded hover:bg-slate-100 text-sm font-semibold text-ink">All canvas tables APA7 (.doc)</button>
                                                </div>

                                    {tableRows.length === 0 ? (

                                    ) : (

                                                                        {row.quotes.length === 0 && <p className="text-xs text-slate-400">No quote text available.</p>}
                                                                        {row.quotes.map((q, qIdx) => (
                                                                            <div key={`${row.code}_${qIdx}`} className="text-xs bg-slate-50 border rounded p-2">
                                                                                <p className="font-semibold text-slate-600">[{q.source}] {q.ref} • {q.folder}</p>
                                                                                <p className="text-slate-700 italic">"{q.text}"</p>
